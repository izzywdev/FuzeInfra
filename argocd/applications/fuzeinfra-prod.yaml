# ArgoCD Application — Contabo production server (k3s)
# Applied by terraform/contabo/provisioning.tf during `terraform apply`.
# ArgoCD auto-syncs helm/fuzeinfra from the main branch whenever it changes.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fuzeinfra-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fuzeinfra
  source:
    repoURL: https://github.com/izzywdev/FuzeInfra.git
    targetRevision: main
    path: helm/fuzeinfra
    helm:
      # Pin the Helm release name to "fuzeinfra" (not the default app name
      # "fuzeinfra-prod"). The chart's selectorLabels now derive instance from
      # {{ .Release.Name }}; the LIVE StatefulSets carry instance=fuzeinfra (the
      # old hardcoded value) and that label is IMMUTABLE, so the release name MUST
      # render "fuzeinfra" to keep this a no-op. Verified: helm template with
      # release "fuzeinfra" is byte-identical to the previous output.
      releaseName: fuzeinfra
      valueFiles:
        - values-contabo.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: fuzeinfra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # Annotate the Argo-created `fuzeinfra` namespace so CRIT-log alerts from
    # infra services resolve to this repo explicitly (grafana-crit-fix.yml reads
    # fuzeinfra.io/owner-repo off the emitting namespace to pick the issue repo).
    managedNamespaceMetadata:
      annotations:
        fuzeinfra.io/owner-repo: izzywdev/FuzeInfra
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
