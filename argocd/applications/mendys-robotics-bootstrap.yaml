# ---------------------------------------------------------------------------
# MendysRobotics — ArgoCD app-of-apps bootstrap root.
#
# IMPORTANT: this Application is applied to the MENDYS k3s cluster, NOT to
# FuzeInfra's own cluster. FuzeInfra owns the execution (terraform applies it
# during provisioning, and deploy-mendys-contabo.yml registers/syncs it), but
# the manifests it points at are DECLARED in izzywdev/MendysRobotics.
#
# It reads deploy/argocd/applications/ (recurse) from the Mendys repo, which
# contains the child Applications: mendys-platform (Helm), mendys-wp (Kustomize),
# and fuzeinfra (data services). Self-heal + prune keep the cluster matching git.
# ---------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mendys-robotics-bootstrap
  namespace: argocd
  annotations:
    mendys.io/owner-repo: izzywdev/MendysRobotics
    fuzeinfra.io/executed-by: izzywdev/FuzeInfra
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/izzywdev/MendysRobotics.git
    targetRevision: main
    path: deploy/argocd/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
