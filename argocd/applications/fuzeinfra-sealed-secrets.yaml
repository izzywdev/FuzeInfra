# ArgoCD Application — reconcile FuzeInfra-owned SealedSecrets into `fuzeinfra`.
#
# WHY THIS EXISTS (issue #228 — production data-loss risk):
#   The per-service DB *password* secrets (`<service>-db-credentials`, key
#   `password`) live in the `fuzeinfra` namespace and are read by the
#   service-DB provisioning Job (helm/fuzeinfra/templates/service-db-provisioning.yaml,
#   secretKeyRef with Optional:false). If the `fuzeinfra` namespace is deleted or
#   the cluster is re-provisioned from scratch, and nothing re-applies those
#   secrets, the single provisioning-Job pod wedges with CreateContainerConfigError
#   and blocks EVERY enabled service (this happened for ~4 days).
#
#   Committing the SealedSecrets to git (deploy/sealed-secrets/) is necessary but
#   NOT sufficient — until #228 there was no GitOps app pointing at that directory,
#   so the committed manifests were orphaned and the live Secrets were created
#   ad-hoc with `kubectl create secret`. THIS Application closes that loop: Argo
#   self-heals the SealedSecrets onto the cluster, the sealed-secrets controller
#   decrypts them into real Secrets, and the provisioning Job always finds them —
#   including after a full namespace re-create.
#
# Kept SEPARATE from fuzeinfra-prod (which syncs helm/fuzeinfra) on purpose: the
# secrets must exist independently of, and ideally before, the Helm release's
# post-sync provisioning Job. Argo's retry/self-heal makes the two apps converge.
#
# Registered on the live cluster the same way as the other FuzeInfra apps
# (terraform/contabo/provisioning.tf kubectl-applies it); thereafter Argo owns it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fuzeinfra-sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fuzeinfra
  source:
    repoURL: https://github.com/izzywdev/FuzeInfra.git
    targetRevision: main
    path: deploy/sealed-secrets
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: fuzeinfra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # The `fuzeinfra` namespace is normally created by fuzeinfra-prod, but on a
      # brand-new cluster this app may sync first — let it create the namespace so
      # it never blocks on ordering.
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
