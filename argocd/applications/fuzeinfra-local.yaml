# Argo CD Application for a LOCAL (kind) cluster.
# Deploys helm/fuzeinfra with the local overlay into the fuzeinfra namespace.
# Apply on the kind cluster only:  kubectl apply -f argocd/applications/fuzeinfra-local.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fuzeinfra-local
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fuzeinfra
  source:
    repoURL: https://github.com/izzywdev/FuzeInfra.git
    targetRevision: main
    path: helm/fuzeinfra
    helm:
      # Pin release name to "fuzeinfra" — the chart derives the (immutable)
      # instance selector label from {{ .Release.Name }}; existing deployments
      # carry instance=fuzeinfra, so the release name must render "fuzeinfra".
      releaseName: fuzeinfra
      valueFiles:
        - values-local.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: fuzeinfra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
