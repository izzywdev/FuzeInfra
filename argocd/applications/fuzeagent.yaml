# Root "app of apps" for FuzeAgent — registered ONCE by FuzeInfra.
# Thereafter Argo CD reconciles everything under
# deploy/argocd/applications in the FuzeAgent repo automatically.
# The `fuzeagent` AppProject (argocd/projects/fuzeagent.yaml) must exist first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fuzeagent-apps
  namespace: argocd
spec:
  project: fuzeagent
  source:
    repoURL: https://github.com/izzywdev/FuzeAgent.git
    targetRevision: main
    path: deploy/argocd/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
