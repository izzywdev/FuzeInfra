# ArgoCD Application — Bitnami Sealed Secrets controller (cluster-wide)
#
# Owns the secrets-management methodology for every FuzeOne consumer:
#   - The controller holds the PRIVATE key and is the ONLY thing that can decrypt.
#     It runs here, in the shared cluster — consumers never get cluster access.
#   - Its PUBLIC cert is published at a stable, Access-bypassed URL so consumers
#     can seal OFFLINE and commit only ciphertext:
#         https://sealed-secrets.prod.fuzefront.com/v1/cert.pem
#     (wildcard *.prod.fuzefront.com already routes to Traefik; the Ingress below
#      gives Traefik the host rule, and terraform/contabo/cloudflare.tf bypasses
#      Cloudflare Access for this one public endpoint.)
#
# See docs/SECRETS_MANAGEMENT.md for the full methodology and rotation runbook.
#
# Applied once by terraform/contabo/provisioning.tf (and re-synced when this file
# changes). project: default so it can install a cluster-scoped controller into
# kube-system without loosening the restrictive `fuzeinfra` AppProject.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    # Pin the chart; bump deliberately. 2.16.x ships controller v0.27.x.
    targetRevision: 2.16.0
    helm:
      releaseName: sealed-secrets
      values: |
        # kubeseal defaults to controller name "sealed-secrets-controller" in
        # kube-system; match it so operators' `kubeseal --fetch-cert` and
        # decrypt commands work with zero extra flags.
        fullnameOverride: sealed-secrets-controller

        # Publish the public cert. Traefik already receives *.prod.fuzefront.com
        # from the Cloudflare tunnel; this Ingress adds the host rule. The
        # controller serves the cert at /v1/cert.pem on the http port.
        ingress:
          enabled: true
          ingressClassName: traefik
          hostname: sealed-secrets.prod.fuzefront.com
          path: /v1/cert.pem
          pathType: Exact
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web

        # Modest footprint on the shared single-node cluster.
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

        # Surface controller metrics to the shared Prometheus.
        metrics:
          serviceMonitor:
            enabled: false
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8081"
          prometheus.io/path: "/metrics"
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
