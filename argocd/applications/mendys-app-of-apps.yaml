apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mendys-apps
  namespace: argocd
spec:
  project: fuzeinfra
  source:
    repoURL: https://github.com/izzywdev/MendysRobotics.git
    targetRevision: main
    path: deploy/argocd/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
