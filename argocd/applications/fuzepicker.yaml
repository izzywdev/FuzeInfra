# Root "app of apps" for FuzePicker — registered ONCE by FuzeInfra.
# Thereafter Argo CD reconciles everything under
# deploy/argocd/applications in the FuzePicker repo automatically.
# The `fuzepicker` AppProject (argocd/projects/fuzepicker.yaml) must exist first.
#
# NOTE: FuzePicker's default branch is `master` (not `main`).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fuzepicker-apps
  namespace: argocd
spec:
  project: fuzepicker
  source:
    repoURL: https://github.com/izzywdev/FuzePicker.git
    targetRevision: master
    path: deploy/argocd/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
