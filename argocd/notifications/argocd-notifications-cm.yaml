# =============================================================================
# argocd-notifications-cm — fire a GitHub repository_dispatch on app state
# changes. Two paths, both via the same webhook (Telegram token stays in GitHub
# secrets — only a github token is needed in-cluster):
#   • UNHEALTHY (OutOfSync / Degraded / Unknown-ComparisonError) → event_type
#     argo-out-of-sync → argo-outofsync-autofix.yml: Telegram 🔴 alert + a
#     devops-engineer Claude auto-fix run.
#   • DEPLOYED  (sync Succeeded + Healthy) → event_type argo-deployed →
#     argo-deploy-notify.yml: Telegram ✅ "deploy finished" message.
#
# Secret: argocd-notifications-secret must hold `github-token` (a PAT/OAuth token
# with repo scope to POST .../dispatches).
#
# Coverage note (why three triggers): Argo only reaches `OutOfSync` when it can
# RENDER the manifests and finds live != desired. If rendering itself fails
# (bad values/kustomize) the app goes `Unknown` (ComparisonError) and OutOfSync
# never fires — so on-sync-unknown is required to catch render breakage. Runtime
# failures (ImagePullBackOff / CrashLoop) show as `Degraded` health with sync
# often still Synced — so on-health-degraded is required to catch those.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ---- service: POST a repository_dispatch to this repo --------------------
  service.webhook.github-dispatch: |
    url: https://api.github.com/repos/izzywdev/FuzeInfra/dispatches
    headers:
      - name: Authorization
        value: token $github-token
      - name: Accept
        value: application/vnd.github+json
      - name: User-Agent
        value: argocd-notifications

  # ---- template: the dispatch body (app/sync/health/repo/conditions) -------
  # app name is validated to a k8s-name charset by the workflow before use.
  # All interpolations use toJson so status messages containing quotes or
  # newlines cannot corrupt the JSON body. `repo` + `conditions` let the
  # workflow route to the owning repo and hand the real error to the fixer.
  template.app-unhealthy: |
    webhook:
      github-dispatch:
        method: POST
        body: |
          {
            "event_type": "argo-out-of-sync",
            "client_payload": {
              "app": {{.app.metadata.name | toJson}},
              "sync": {{.app.status.sync.status | toJson}},
              "health": {{.app.status.health.status | toJson}},
              "repo": {{.app.spec.source.repoURL | toJson}},
              "conditions": {{.app.status.conditions | toJson}}
            }
          }

  # ---- template: the SUCCESS dispatch body (green "deploy finished") -------
  # Fires argo-deployed → .github/workflows/argo-deploy-notify.yml sends a
  # Telegram ✅ message. Same webhook service + same GH-secret-only Telegram
  # token model as the unhealthy path (nothing extra in-cluster). `revision` is
  # the synced commit so the message can show what shipped.
  template.app-deployed: |
    webhook:
      github-dispatch:
        method: POST
        body: |
          {
            "event_type": "argo-deployed",
            "client_payload": {
              "app": {{.app.metadata.name | toJson}},
              "sync": {{.app.status.sync.status | toJson}},
              "health": {{.app.status.health.status | toJson}},
              "revision": {{.app.status.sync.revision | toJson}},
              "repo": {{.app.spec.source.repoURL | toJson}}
            }
          }

  # ---- triggers: fire once per state transition (not on every refresh) -----
  # Deployed: a sync operation SUCCEEDED and the app is Healthy — i.e. a deploy
  # actually finished and the pods are up. oncePer the synced revision so it
  # fires once per shipped commit, not on every periodic refresh.
  trigger.on-deployed: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      oncePer: app.status.sync.revision
      send: [app-deployed]
  # OutOfSync: live drifted from a renderable desired state.
  trigger.on-out-of-sync: |
    - when: app.status.sync.status == 'OutOfSync'
      oncePer: app.status.sync.status
      send: [app-unhealthy]
  # Unknown: manifest generation failed (ComparisonError) — render is broken.
  trigger.on-sync-unknown: |
    - when: app.status.sync.status == 'Unknown'
      oncePer: app.status.sync.status
      send: [app-unhealthy]
  # Degraded: rendered + applied, but the running workload is unhealthy
  # (ImagePullBackOff, CrashLoopBackOff, failed hooks, unready pods).
  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      oncePer: app.status.health.status
      send: [app-unhealthy]

  # ---- default subscription: all apps in this Argo instance ---------------
  subscriptions: |
    - recipients:
        - github-dispatch
      triggers:
        - on-deployed
        - on-out-of-sync
        - on-sync-unknown
        - on-health-degraded
