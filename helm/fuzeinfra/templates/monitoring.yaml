{{- /* ===================== Grafana ===================== */ -}}
{{- if .Values.grafana.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fuzeinfra-grafana
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.selectorLabels" (dict "component" "grafana") | nindent 4 }}
spec:
  selector:
    {{- include "fuzeinfra.selectorLabels" (dict "component" "grafana") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.grafana.port }}
      targetPort: 3000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fuzeinfra-grafana
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
spec:
  serviceName: fuzeinfra-grafana
  replicas: 1
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "grafana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "grafana") | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzeinfra.secretName" . }}
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_FEATURE_TOGGLES_DASHBOARDNEWLAYOUTS
              value: "false"
            - name: GF_FEATURE_TOGGLES_DASHBOARDDEFAULTLAYOUTSELECTOR
              value: "false"
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "true"
            - name: CRIT_BRIDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzeinfra.secretName" . }}
                  key: CRIT_BRIDGE_TOKEN
                  optional: true
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provisioning
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: alerting
              mountPath: /etc/grafana/provisioning/alerting
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: fuzeinfra-grafana-datasources
        - name: dashboard-provisioning
          configMap:
            name: fuzeinfra-grafana-dashboard-provisioning
        - name: dashboards
          projected:
            sources:
              - configMap:
                  name: fuzeinfra-grafana-dashboard-cluster-overview
              - configMap:
                  name: fuzeinfra-grafana-dashboard-kubernetes-nodes
              - configMap:
                  name: fuzeinfra-grafana-dashboard-kubernetes-pods
              - configMap:
                  name: fuzeinfra-grafana-dashboard-fuzeinfra-services
              - configMap:
                  name: fuzeinfra-grafana-dashboard-logs-explorer
        - name: alerting
          configMap:
            name: fuzeinfra-grafana-alerting
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "fuzeinfra.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.grafana.storage }}
{{- end }}

