{{- /* ===================== Promtail (DaemonSet) ===================== */ -}}
{{- if .Values.promtail.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fuzeinfra-promtail
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "promtail") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "promtail") | nindent 8 }}
    spec:
      serviceAccountName: fuzeinfra-monitoring
      containers:
        - name: promtail
          image: {{ .Values.promtail.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          args: ["-config.file=/etc/promtail/config.yml"]
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: run
              mountPath: /run/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: fuzeinfra-promtail-config
        - name: run
          hostPath:
            path: /run/promtail
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
{{- end }}

{{- /* ===================== Node Exporter (DaemonSet) ===================== */ -}}
{{- if .Values.nodeExporter.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fuzeinfra-node-exporter
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.selectorLabels" (dict "component" "node-exporter") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "fuzeinfra.selectorLabels" (dict "component" "node-exporter") | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.nodeExporter.port }}
      targetPort: 9100
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fuzeinfra-node-exporter
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "node-exporter") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "node-exporter") | nindent 8 }}
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name: node-exporter
          image: {{ .Values.nodeExporter.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          args:
            - '--path.procfs=/host/proc'
            - '--path.sysfs=/host/sys'
            - '--path.rootfs=/host/root'
            - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
          ports:
            - containerPort: 9100
              name: metrics
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
{{- end }}
