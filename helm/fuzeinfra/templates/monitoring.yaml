{{- /* ===================== RBAC for Prometheus & Promtail SD ===================== */ -}}
{{- if or .Values.prometheus.enabled .Values.promtail.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fuzeinfra-monitoring
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-fuzeinfra-monitoring
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "nodes/stats", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-fuzeinfra-monitoring
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-fuzeinfra-monitoring
subjects:
  - kind: ServiceAccount
    name: fuzeinfra-monitoring
    namespace: {{ .Release.Namespace }}
{{- end }}

{{- /* ===================== Prometheus ===================== */ -}}
{{- if .Values.prometheus.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fuzeinfra-prometheus
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.selectorLabels" (dict "component" "prometheus") | nindent 4 }}
spec:
  selector:
    {{- include "fuzeinfra.selectorLabels" (dict "component" "prometheus") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.prometheus.port }}
      targetPort: 9090
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fuzeinfra-prometheus
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
spec:
  serviceName: fuzeinfra-prometheus
  replicas: 1
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "prometheus") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "prometheus") | nindent 8 }}
    spec:
      serviceAccountName: fuzeinfra-monitoring
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.enable-lifecycle'
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: fuzeinfra-prometheus-config
        - name: rules
          configMap:
            name: fuzeinfra-prometheus-rules
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "fuzeinfra.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.prometheus.storage }}
{{- end }}

