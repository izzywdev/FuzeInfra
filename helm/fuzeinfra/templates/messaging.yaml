{{- /* ===================== Kafka (KRaft, no ZooKeeper) ===================== */ -}}
{{- if .Values.kafka.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: fuzeinfra-kafka
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.selectorLabels" (dict "component" "kafka") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "fuzeinfra.selectorLabels" (dict "component" "kafka") | nindent 4 }}
  ports:
    - name: broker
      port: {{ .Values.kafka.port }}
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fuzeinfra-kafka
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
spec:
  serviceName: fuzeinfra-kafka
  replicas: 1
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "kafka") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "kafka") | nindent 8 }}
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          env:
            # --- KRaft single-node config (broker + controller in one process) ---
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            # Combined broker+controller in same JVM → use localhost for quorum
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://fuzeinfra-kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            # Single-node replication factors must be 1.
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            # cp-kafka auto-formats KRaft storage when CLUSTER_ID is provided.
            - name: CLUSTER_ID
              value: {{ .Values.kafka.clusterId | quote }}
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 9093
              name: controller
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "fuzeinfra.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.kafka.storage }}
{{- end }}

{{- /* ===================== Kafka UI ===================== */ -}}
{{- if and .Values.kafkaUi.enabled .Values.kafka.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fuzeinfra-kafka-ui
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.selectorLabels" (dict "component" "kafka-ui") | nindent 4 }}
spec:
  selector:
    {{- include "fuzeinfra.selectorLabels" (dict "component" "kafka-ui") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.kafkaUi.port }}
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzeinfra-kafka-ui
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "kafka-ui") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "kafka-ui") | nindent 8 }}
    spec:
      containers:
        - name: kafka-ui
          image: {{ .Values.kafkaUi.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: "local"
            # KRaft mode: bootstrap servers only, no ZooKeeper.
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "fuzeinfra-kafka:9092"
            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 10
{{- end }}

{{- /* ===================== RabbitMQ ===================== */ -}}
{{- if .Values.rabbitmq.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fuzeinfra-rabbitmq
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.selectorLabels" (dict "component" "rabbitmq") | nindent 4 }}
spec:
  selector:
    {{- include "fuzeinfra.selectorLabels" (dict "component" "rabbitmq") | nindent 4 }}
  ports:
    - name: amqp
      port: {{ .Values.rabbitmq.amqpPort }}
      targetPort: 5672
    - name: management
      port: {{ .Values.rabbitmq.managementPort }}
      targetPort: 15672
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fuzeinfra-rabbitmq
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
spec:
  serviceName: fuzeinfra-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "rabbitmq") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "rabbitmq") | nindent 8 }}
    spec:
      containers:
        - name: rabbitmq
          image: {{ .Values.rabbitmq.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzeinfra.secretName" . }}
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzeinfra.secretName" . }}
                  key: RABBITMQ_PASSWORD
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi }
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "fuzeinfra.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.rabbitmq.storage }}
{{- end }}

{{- /* ===================== Mongo Express ===================== */ -}}
{{- if and .Values.mongoExpress.enabled .Values.mongodb.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fuzeinfra-mongo-express
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.selectorLabels" (dict "component" "mongo-express") | nindent 4 }}
spec:
  selector:
    {{- include "fuzeinfra.selectorLabels" (dict "component" "mongo-express") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.mongoExpress.port }}
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzeinfra-mongo-express
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "mongo-express") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "mongo-express") | nindent 8 }}
    spec:
      containers:
        - name: mongo-express
          image: {{ .Values.mongoExpress.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          env:
            - name: ME_CONFIG_MONGODB_ADMINUSERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzeinfra.secretName" . }}
                  key: MONGODB_USER
            - name: ME_CONFIG_MONGODB_ADMINPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzeinfra.secretName" . }}
                  key: MONGODB_PASSWORD
            - name: ME_CONFIG_MONGODB_URL
              value: "mongodb://$(ME_CONFIG_MONGODB_ADMINUSERNAME):$(ME_CONFIG_MONGODB_ADMINPASSWORD)@fuzeinfra-mongodb:27017/"
            - name: ME_CONFIG_BASICAUTH_USERNAME
              value: "admin"
            - name: ME_CONFIG_BASICAUTH_PASSWORD
              value: "admin"
          ports:
            - containerPort: 8081
              name: http
{{- end }}
