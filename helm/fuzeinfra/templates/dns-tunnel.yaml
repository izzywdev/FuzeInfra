{{- /* ===================== dnsmasq (optional local DNS) ===================== */ -}}
{{- if .Values.dnsmasq.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: fuzeinfra-dnsmasq-config
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
data:
  dnsmasq.conf: |
    # dnsmasq for FuzeInfra - resolves the wildcard dev domain.
    # In-cluster service discovery is handled by CoreDNS; this serves
    # *.{{ .Values.global.domain }} for host-side / external resolution.
    port=53
    no-resolv
    server=8.8.8.8
    server=8.8.4.4
    # Wildcard: *.{{ .Values.global.domain }} -> configured target
    address=/{{ .Values.global.domain }}/{{ .Values.dnsmasq.wildcardTarget }}
    cache-size=1000
    no-hosts
    bind-interfaces
    listen-address=0.0.0.0
    domain={{ .Values.global.domain }}
---
apiVersion: v1
kind: Service
metadata:
  name: fuzeinfra-dnsmasq
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.selectorLabels" (dict "component" "dnsmasq") | nindent 4 }}
spec:
  type: {{ .Values.dnsmasq.serviceType }}
  selector:
    {{- include "fuzeinfra.selectorLabels" (dict "component" "dnsmasq") | nindent 4 }}
  ports:
    - name: dns-udp
      port: {{ .Values.dnsmasq.dnsPort }}
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: {{ .Values.dnsmasq.dnsPort }}
      targetPort: 53
      protocol: TCP
    - name: http
      port: {{ .Values.dnsmasq.webPort }}
      targetPort: 8080
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzeinfra-dnsmasq
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "dnsmasq") | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the config changes.
        checksum/config: {{ .Values.global.domain | printf "%s-%s" .Values.dnsmasq.wildcardTarget | sha256sum }}
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "dnsmasq") | nindent 8 }}
    spec:
      containers:
        - name: dnsmasq
          image: {{ .Values.dnsmasq.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: HTTP_USER
              value: "admin"
            - name: HTTP_PASS
              value: {{ .Values.dnsmasq.adminPassword | quote }}
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/dnsmasq.conf
              subPath: dnsmasq.conf
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: fuzeinfra-dnsmasq-config
{{- end }}

{{- /* ===================== cloudflare-tunnel (optional) ===================== */ -}}
{{- if .Values.cloudflareTunnel.enabled }}
{{- if .Values.cloudflareTunnel.tunnelId }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fuzeinfra-cloudflared-config
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
data:
  config.yaml: |
    tunnel: {{ .Values.cloudflareTunnel.tunnelId }}
    credentials-file: /etc/cloudflared/creds.json
    metrics: 0.0.0.0:{{ .Values.cloudflareTunnel.metricsPort }}
    no-autoupdate: true
    ingress:
      - hostname: argocd.{{ .Values.global.domain }}
        service: http://argocd-server.argocd.svc.cluster.local:80
      - hostname: "*.{{ .Values.global.domain }}"
        service: http://traefik.kube-system.svc.cluster.local:80
      - hostname: {{ .Values.global.domain }}
        service: http://traefik.kube-system.svc.cluster.local:80
      - service: http_status:404
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzeinfra-cloudflare-tunnel
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.cloudflareTunnel.replicas }}
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "cloudflare-tunnel") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "cloudflare-tunnel") | nindent 8 }}
      annotations:
        checksum/tunnel-id: {{ .Values.cloudflareTunnel.tunnelId | sha256sum }}
    spec:
      containers:
        - name: cloudflared
          image: {{ .Values.cloudflareTunnel.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          {{- if .Values.cloudflareTunnel.tunnelId }}
          # Local-config mode: ingress rules are in the ConfigMap above.
          # Credentials (tunnel secret) come from CLOUDFLARE_TUNNEL_CREDENTIALS in the cluster secret.
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yaml
            - run
          {{- else }}
          # Token mode: ingress routes are managed in the Cloudflare Zero Trust dashboard.
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:{{ .Values.cloudflareTunnel.metricsPort }}
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fuzeinfra-tunnel-secrets
                  key: CLOUDFLARE_TUNNEL_TOKEN
                  optional: true
          {{- end }}
          ports:
            - containerPort: {{ .Values.cloudflareTunnel.metricsPort }}
              name: metrics
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          {{- if .Values.cloudflareTunnel.tunnelId }}
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
            - name: credentials
              mountPath: /etc/cloudflared/creds.json
              subPath: creds.json
          {{- end }}
      {{- if .Values.cloudflareTunnel.tunnelId }}
      volumes:
        - name: config
          configMap:
            name: fuzeinfra-cloudflared-config
        - name: credentials
          secret:
            secretName: fuzeinfra-tunnel-secrets
            items:
              - key: CLOUDFLARE_TUNNEL_CREDENTIALS
                path: creds.json
      {{- end }}
{{- end }}
