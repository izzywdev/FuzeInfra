{{- /*
============================ Per-service MongoDB provisioning ============================
Declarative, GitOps-reconciled, idempotent provisioning of per-service MongoDB
users on the shared `fuzeinfra-mongodb` server.

For each entry in `.Values.serviceMongoDatabases` (that is `enabled`) this Job:
  1. Waits until the MongoDB pod is ready (mongosh ping loop).
  2. Ensures the user exists in its auth database and holds the requested roles.
     - The user record lives in `authDatabase` (default: `database`) — this is
       the client's `authSource`.
     - Roles come from `roles` (a list of `{role, db}`); default is
       `[{ role: readWrite, db: <database> }]`. This lets a single user hold
       `readWrite` on a database whose name differs from its auth database
       (e.g. user `mendys_app` whose home/auth db is `mendys`, granted
       `readWrite` on `robot_catalog` — issue #238).
  3. Password handling is controlled by `managePassword` (default: `true`):
     - `true`  — create the user with the sealed password if missing, and sync
       the password via `updateUser` on every run (rotation propagates).
     - `false` — never touch the password; only grant roles to a pre-existing
       user via `grantRolesToUser`, and NO per-service `passwordSecret` is
       mounted (so the Job doesn't fail if that Secret is absent). Use this when
       the user was created out-of-band and FuzeInfra's sealed secret may not
       match its password, so a working authentication is never broken by a
       rotation.
     Roles are always ensured additively with `grantRolesToUser`, so re-runs are
     idempotent and never revoke a role the app depends on.

Design notes:
  - Runs in the `fuzeinfra` namespace. Admin credentials (`MONGODB_USER` /
    `MONGODB_PASSWORD`) are sourced from the chart-managed `fuzeinfra-secrets`
    Secret and never committed in plaintext.
  - The per-service password is read via `secretKeyRef` from a SealedSecret
    the provisioning workflow seals for this namespace.
  - post-install/post-upgrade + Argo PostSync hooks: runs after MongoDB is up.
  - Idempotent: `db.createUser` guarded by `db.getUser`; uses `db.updateUser`
    to sync the password on every run — re-runs cannot fail.
*/ -}}
{{- if .Values.serviceMongoDatabases }}
{{- $enabled := list -}}
{{- range .Values.serviceMongoDatabases }}
  {{- if .enabled }}{{- $enabled = append $enabled . }}{{- end }}
{{- end }}
{{- if $enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: fuzeinfra-service-mongo-provision
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "argocd.argoproj.io/hook": PostSync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "service-mongo-provision" "root" $) | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: provision
          image: {{ .Values.mongodb.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          env:
            - name: MONGO_HOST
              value: {{ .Values.serviceMongoProvisioning.host | default "fuzeinfra-mongodb" | quote }}
            - name: MONGO_PORT
              value: {{ .Values.mongodb.port | quote }}
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzeinfra.secretName" . }}
                  key: MONGODB_USER
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzeinfra.secretName" . }}
                  key: MONGODB_PASSWORD
            {{- range $enabled }}
            {{- if or (not (hasKey . "managePassword")) .managePassword }}
            - name: SVC_PW_{{ .name | upper | replace "-" "_" }}
              valueFrom:
                secretKeyRef:
                  name: {{ required (printf "serviceMongoDatabases[%s].passwordSecret.name is required" .name) .passwordSecret.name }}
                  key: {{ required (printf "serviceMongoDatabases[%s].passwordSecret.key is required" .name) .passwordSecret.key }}
            {{- end }}
            {{- end }}
          command:
            - bash
            - -c
            - |
              set -euo pipefail

              MONGO_URI="mongodb://${ADMIN_USER}:${ADMIN_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/admin?authSource=admin"

              echo "Waiting for MongoDB at ${MONGO_HOST}:${MONGO_PORT} ..."
              until mongosh --quiet "$MONGO_URI" --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
                sleep 3
              done
              echo "MongoDB is ready."

              # provision <authDb> <user> <password> <rolesJson> <managePassword>
              # Values are passed via env so the JS never has shell-interpolated
              # quotes (rolesJson is real JSON with double quotes).
              provision() {
                export MP_AUTHDB="$1" MP_USER="$2" MP_PW="$3" MP_ROLES="$4" MP_MANAGEPW="$5"
                echo "== Provisioning user='$MP_USER' authDb='$MP_AUTHDB' roles=$MP_ROLES (managePassword=$MP_MANAGEPW) =="
                mongosh --quiet "$MONGO_URI" --eval '
                  var adb = db.getSiblingDB(process.env.MP_AUTHDB);
                  var user = process.env.MP_USER;
                  var roles = JSON.parse(process.env.MP_ROLES);
                  var managePw = process.env.MP_MANAGEPW === "true";
                  var existing = adb.getUser(user);
                  if (!existing) {
                    if (managePw) {
                      adb.createUser({ user: user, pwd: process.env.MP_PW, roles: roles });
                      print("created: " + user);
                    } else {
                      print("WARN: user " + user + " not found in " + process.env.MP_AUTHDB +
                            " and managePassword=false; cannot create without setting a password. " +
                            "Create it out-of-band or set managePassword: true. Skipping.");
                    }
                  } else {
                    if (managePw) {
                      adb.updateUser(user, { pwd: process.env.MP_PW });
                      print("password synced: " + user);
                    }
                    adb.grantRolesToUser(user, roles);
                    print("roles ensured on " + user + ": " + JSON.stringify(roles));
                  }
                '
                echo "== Done user='$MP_USER' =="
              }

              {{- range $enabled }}
              provision '{{ .authDatabase | default .database }}' '{{ .user }}' "${SVC_PW_{{ .name | upper | replace "-" "_" }}:-}" '{{ .roles | default (list (dict "role" "readWrite" "db" .database)) | toJson }}' '{{ if hasKey . "managePassword" }}{{ if .managePassword }}true{{ else }}false{{ end }}{{ else }}true{{ end }}'
              {{- end }}

              echo "All MongoDB users provisioned."
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 128Mi }
{{- end }}
{{- end }}
