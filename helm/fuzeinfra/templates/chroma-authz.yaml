{{- if .Values.chromadb.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: fuzeinfra-chromadb-authz
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
data:
  fuzeinfra_chroma_authz.py: |
    """Resource-aware tenant/database authorization for OSS Chroma."""
    from uuid import UUID

    from fastapi import HTTPException
    from overrides import override
    from chromadb.auth import ServerAuthorizationProvider
    from chromadb.config import DEFAULT_DATABASE, DEFAULT_TENANT
    from chromadb.db.system import SysDB

    WRITE_ACTIONS = {
        "tenant:get_tenant", "db:get_database", "db:list_collections",
        "db:count_collections", "db:create_collection",
        "db:get_or_create_collection", "collection:get_collection",
        "collection:delete_collection", "collection:update_collection",
        "collection:add", "collection:delete", "collection:get",
        "collection:query", "collection:count", "collection:update",
        "collection:upsert",
    }

    class TenantDatabaseAuthorizationProvider(ServerAuthorizationProvider):
        def __init__(self, system):
            super().__init__(system)
            self._sysdb = system.instance(SysDB)

        def _resource_scope(self, action_name, resource):
            # Chroma 0.5.23's Collection object omits its client's tenant and
            # database on v2 item requests (upsert/get/etc.), so those URLs use
            # the defaults. Resolve the immutable collection UUID in SysDB
            # instead of trusting that broken path. This also prevents a token
            # from using a known collection UUID to cross an allocation boundary.
            if (
                action_name.startswith("collection:")
                and resource.collection
                and resource.tenant == DEFAULT_TENANT
                and resource.database == DEFAULT_DATABASE
            ):
                try:
                    collections = self._sysdb.get_collections(
                        id=UUID(resource.collection)
                    )
                except (TypeError, ValueError):
                    return None, None
                if len(collections) != 1:
                    return None, None
                return collections[0]["tenant"], collections[0]["database"]
            return resource.tenant, resource.database

        @override
        def authorize_or_raise(self, user, action, resource):
            if user.user_id == "fuzeinfra-chroma-admin":
                return
            action_name = getattr(action, "value", str(action))
            tenant_only = action_name == "tenant:get_tenant"
            resource_tenant, resource_database = self._resource_scope(
                action_name, resource
            )
            allowed = (
                action_name in WRITE_ACTIONS
                and user.tenant
                and user.tenant != "*"
                and resource_tenant == user.tenant
                and user.databases
                and len(user.databases) == 1
                and (tenant_only or resource_database == user.databases[0])
            )
            if not allowed:
                raise HTTPException(status_code=403, detail="Forbidden")
{{- end }}
