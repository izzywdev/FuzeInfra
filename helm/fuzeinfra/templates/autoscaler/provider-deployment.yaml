{{- if .Values.clusterAutoscaler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzeinfra-contabo-ca-provider
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.selectorLabels" (dict "component" "contabo-ca-provider" "root" $) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fuzeinfra.selectorLabels" (dict "component" "contabo-ca-provider" "root" $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.selectorLabels" (dict "component" "contabo-ca-provider" "root" $) | nindent 8 }}
    spec:
      containers:
        - name: provider
          image: {{ .Values.clusterAutoscaler.provider.image }}
          imagePullPolicy: Always # :latest must re-pull to pick up rebuilds
          ports:
            - name: grpc
              containerPort: 8086
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Values.clusterAutoscaler.provider.existingSecret }}
          env:
            - name: PRODUCT_ID
              value: {{ .Values.clusterAutoscaler.provider.productId | quote }}
            - name: IMAGE_ID
              value: {{ .Values.clusterAutoscaler.provider.imageId | quote }}
            - name: REGION
              value: {{ .Values.clusterAutoscaler.provider.region | quote }}
            - name: K3S_SERVER_URL
              value: {{ .Values.clusterAutoscaler.provider.k3sServerUrl | quote }}
            - name: ELASTIC_TAG
              value: {{ .Values.clusterAutoscaler.provider.elasticTag | quote }}
            - name: ELASTIC_NAME_PREFIX
              value: {{ .Values.clusterAutoscaler.provider.elasticNamePrefix | quote }}
            - name: MIN_SIZE
              value: {{ .Values.clusterAutoscaler.provider.minSize | quote }}
            - name: MAX_SIZE
              value: {{ .Values.clusterAutoscaler.provider.maxSize | quote }}
            - name: GRPC_LISTEN
              value: {{ .Values.clusterAutoscaler.provider.grpcListen | quote }}
            - name: USER_DATA_TEMPLATE_B64
              value: {{ .Values.clusterAutoscaler.provider.userDataTemplateB64 | quote }}
            # Best-effort provisioning-warning email (see internal/notify).
            # NOTIFY_SMTP_USER/NOTIFY_SMTP_PASS are intentionally NOT set
            # here — if the SMTP relay needs auth, add those two keys to the
            # existingSecret Secret above (envFrom already imports every key
            # in it as an env var), never as a plain Helm value.
            - name: NOTIFY_EMAIL_ENABLED
              value: {{ .Values.clusterAutoscaler.provider.notifyEmailEnabled | quote }}
            - name: NOTIFY_SMTP_HOST
              value: {{ .Values.clusterAutoscaler.provider.notifySmtpHost | quote }}
            - name: NOTIFY_SMTP_PORT
              value: {{ .Values.clusterAutoscaler.provider.notifySmtpPort | quote }}
            - name: NOTIFY_EMAIL_FROM
              value: {{ .Values.clusterAutoscaler.provider.notifyEmailFrom | quote }}
            - name: NOTIFY_EMAIL_TO
              value: {{ .Values.clusterAutoscaler.provider.notifyEmailTo | quote }}
            # Same before-provision warning, delivered via the Telegram Bot
            # API instead of email (see internal/notify.Telegram). Takes
            # precedence over the email notifier above when both are
            # enabled. NOTIFY_TELEGRAM_BOT_TOKEN is intentionally NOT set
            # here as a plain Helm value — it must be a KEY in the
            # existingSecret Secret above (envFrom already imports every key
            # in it as an env var), sourced from @BotFather via SealedSecret.
            - name: NOTIFY_TELEGRAM_ENABLED
              value: {{ .Values.clusterAutoscaler.provider.notifyTelegramEnabled | quote }}
            - name: NOTIFY_TELEGRAM_CHAT_ID
              value: {{ .Values.clusterAutoscaler.provider.notifyTelegramChatId | quote }}
            # Order the paid Contabo Private Networking add-on on every created
            # elastic node (so it can attach to the private VLAN without a
            # separate /upgrade — the missing add-on is what returns HTTP 402).
            # Default false: enable ONLY during the coordinated private-VLAN
            # cutover — a node on private-only flannel cannot join a still-public
            # control plane. See internal/contabo createAddOns.
            - name: CONTABO_PRIVATE_NETWORKING
              value: {{ .Values.clusterAutoscaler.provider.privateNetworking | quote }}
            # The private-network id created elastic nodes are ATTACHED to
            # (membership), once the add-on above grants the capability. Both are
            # needed for a zero-touch VLAN node. 0/"" = no attach.
            - name: CONTABO_PRIVATE_NETWORK_ID
              value: {{ .Values.clusterAutoscaler.provider.privateNetworkId | quote }}
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: contabo-ca-provider
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.selectorLabels" (dict "component" "contabo-ca-provider" "root" $) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 8086
      targetPort: grpc
      protocol: TCP
  selector:
    {{- include "fuzeinfra.selectorLabels" (dict "component" "contabo-ca-provider" "root" $) | nindent 4 }}
{{- end }}
