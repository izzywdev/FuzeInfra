{{- if .Values.clusterAutoscaler.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fuzeinfra-cluster-autoscaler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.clusterAutoscaler.selectorLabels" $ | nindent 4 }}
---
# Canonical upstream Cluster Autoscaler RBAC, mirrored from the official
# kubernetes/autoscaler cluster-autoscaler Helm chart (cluster-role.yaml /
# cluster-role-binding.yaml / role.yaml / role-binding.yaml) for CA v1.30.x.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-fuzeinfra-cluster-autoscaler
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.clusterAutoscaler.selectorLabels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["events", "endpoints"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["endpoints"]
    resourceNames: ["cluster-autoscaler"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["watch", "list", "get", "update", "patch"]
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - services
      - replicationcontrollers
      - persistentvolumeclaims
      - persistentvolumes
    verbs: ["watch", "list", "get"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "replicasets", "statefulsets", "deployments"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - csinodes
      - csidrivers
      - csistoragecapacities
      - volumeattachments
    verbs: ["watch", "list", "get"]
  - apiGroups: ["batch", "extensions"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resourceNames: ["cluster-autoscaler"]
    resources: ["leases"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["cluster-autoscaler-status", "cluster-autoscaler-priority-expander"]
    verbs: ["delete", "get", "update", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-fuzeinfra-cluster-autoscaler
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.clusterAutoscaler.selectorLabels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-fuzeinfra-cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: fuzeinfra-cluster-autoscaler
    namespace: {{ .Release.Namespace }}
---
# Namespaced Role for leader-election (coordination.k8s.io Leases + the
# ConfigMap fallback) scoped to the release namespace, per upstream chart.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fuzeinfra-cluster-autoscaler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.clusterAutoscaler.selectorLabels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames:
      - cluster-autoscaler-status
      - cluster-autoscaler-priority-expander
    verbs: ["delete", "get", "update", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resourceNames: ["cluster-autoscaler"]
    resources: ["leases"]
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fuzeinfra-cluster-autoscaler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.clusterAutoscaler.selectorLabels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fuzeinfra-cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: fuzeinfra-cluster-autoscaler
    namespace: {{ .Release.Namespace }}
---
# externalgrpc cloud-config: points the CA at the Contabo provider gRPC Service
# (Task 12). Plaintext in-cluster — no TLS key/cert/cacert since traffic never
# leaves the pod network.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fuzeinfra-ca-cloud-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.clusterAutoscaler.selectorLabels" $ | nindent 4 }}
data:
  cloud-config.yaml: |
    address: "contabo-ca-provider.{{ .Release.Namespace }}.svc.cluster.local:8086"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzeinfra-cluster-autoscaler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fuzeinfra.labels" . | nindent 4 }}
    {{- include "fuzeinfra.clusterAutoscaler.selectorLabels" $ | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fuzeinfra.clusterAutoscaler.selectorLabels" $ | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fuzeinfra.labels" . | nindent 8 }}
        {{- include "fuzeinfra.clusterAutoscaler.selectorLabels" $ | nindent 8 }}
    spec:
      serviceAccountName: fuzeinfra-cluster-autoscaler
      priorityClassName: system-cluster-critical
      containers:
        - name: cluster-autoscaler
          image: {{ .Values.clusterAutoscaler.image }}
          imagePullPolicy: {{ include "fuzeinfra.pullPolicy" . }}
          command:
            - ./cluster-autoscaler
          args:
            - --cloud-provider=externalgrpc
            - --cloud-config=/etc/ca/cloud-config.yaml
            - --nodes={{ .Values.clusterAutoscaler.nodeGroup.minSize }}:{{ .Values.clusterAutoscaler.nodeGroup.maxSize }}:elastic
            - --scale-down-enabled=true
            - --scale-down-unneeded-time={{ .Values.clusterAutoscaler.scaleDownUnneededTime | default "45m" }}
            - --scale-down-delay-after-add={{ .Values.clusterAutoscaler.scaleDownDelayAfterAdd | default "20m" }}
            - --max-node-provision-time={{ .Values.clusterAutoscaler.maxNodeProvisionTime | default "15m" }}
            - --max-total-unready-percentage={{ .Values.clusterAutoscaler.maxTotalUnreadyPercentage | default 45 }}
            - --expander={{ .Values.clusterAutoscaler.expander | default "least-waste" }}
            - --balance-similar-node-groups=false
            - --v=4
          volumeMounts:
            - name: cloud-config
              mountPath: /etc/ca
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              cpu: 200m
              memory: 300Mi
      volumes:
        - name: cloud-config
          configMap:
            name: fuzeinfra-ca-cloud-config
{{- end }}
