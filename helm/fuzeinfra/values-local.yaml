# =============================================================================
# Local (kind) overlay.
#   helm upgrade --install fuzeinfra helm/fuzeinfra \
#     -n fuzeinfra --create-namespace -f helm/fuzeinfra/values-local.yaml
# =============================================================================
global:
  storageClass: "standard"   # kind's default dynamic provisioner
  domain: dev.local
  imagePullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  # TLS for *.dev.local via the local CA ClusterIssuer. cert-manager + this
  # issuer are installed by `make kind-up` (k8s/cert-manager/setup-cert-manager.sh
  # local). Trust the root CA once to remove browser warnings — the setup script
  # prints the steps. See docs/cert-management.md.
  tls:
    enabled: true
    clusterIssuer: fuzeinfra-local-ca
    secretName: fuzeinfra-tls

# Smaller footprint for laptops.
elasticsearch:
  javaOpts: "-Xms256m -Xmx256m"
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits:   { cpu: 500m, memory: 1Gi }

airflow:
  workerReplicas: 1

# Optional local DNS server for *.dev.local. Exposed in-cluster; query it via the
# dnsmasq Service. CoreDNS still handles in-cluster service names.
dnsmasq:
  enabled: true
  wildcardTarget: "127.0.0.1"
  serviceType: ClusterIP

# cloudflare-tunnel stays off locally (needs a real tunnel token). To enable:
#   cloudflareTunnel.enabled=true and set credentials.cloudflare.tunnelToken
cloudflareTunnel:
  enabled: false
