# =============================================================================
# Local (kind) overlay.
#   helm upgrade --install fuzeinfra helm/fuzeinfra \
#     -n fuzeinfra --create-namespace -f helm/fuzeinfra/values-local.yaml
# =============================================================================
global:
  storageClass: "standard"   # kind's default dynamic provisioner
  domain: dev.local
  imagePullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  tls:
    enabled: false

# Smaller footprint for laptops.
elasticsearch:
  javaOpts: "-Xms256m -Xmx256m"
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits:   { cpu: 500m, memory: 1Gi }

airflow:
  workerReplicas: 1

# Optional local DNS server for *.dev.local. Exposed in-cluster; query it via the
# dnsmasq Service. CoreDNS still handles in-cluster service names.
dnsmasq:
  enabled: true
  wildcardTarget: "127.0.0.1"
  serviceType: ClusterIP

# cloudflare-tunnel stays off locally (needs a real tunnel token). To enable:
#   cloudflareTunnel.enabled=true and set credentials.cloudflare.tunnelToken
cloudflareTunnel:
  enabled: false

# Cluster Autoscaler / Contabo provider / overprovisioning stay off on kind —
# there's no Contabo API to call locally. kind uses fake-mode node scaling
# (see Task 17), not this stack. Base chart defaults already set these to
# false; listed here explicitly so the overlay stays self-documenting.
clusterAutoscaler:
  enabled: false

overprovisioning:
  enabled: false
