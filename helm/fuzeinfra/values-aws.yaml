# =============================================================================
# AWS (EKS) overlay.
#   helm upgrade --install fuzeinfra helm/fuzeinfra \
#     -n fuzeinfra --create-namespace -f helm/fuzeinfra/values-aws.yaml
#
# Prereqs on the cluster (see terraform/eks + docs/kubernetes-migration.md):
#   - aws-ebs-csi-driver with a "gp3" StorageClass
#   - ingress-nginx controller (creates an AWS NLB)
# =============================================================================
global:
  storageClass: "gp3"
  # Replace with your real domain; point a wildcard *.infra.<domain> at the
  # ingress-nginx load balancer (Route53 / Cloudflare).
  domain: infra.fuzefront.com
  imagePullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  # Real TLS via Let's Encrypt. First install cert-manager + the ACME issuers:
  #   ACME_EMAIL=you@example.com ./k8s/cert-manager/setup-cert-manager.sh prod
  # then set enabled: true. Requires public DNS (*.<domain>) pointing at the
  # ingress load balancer and ports 80/443 reachable for the HTTP-01 challenge.
  # See docs/cert-management.md.
  tls:
    enabled: false
    clusterIssuer: letsencrypt-prod
    secretName: fuzeinfra-tls

# Production-leaning sizing. Tune to your node group.
postgres:
  storage: 20Gi
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "2",  memory: 2Gi }

elasticsearch:
  storage: 30Gi
  javaOpts: "-Xms1g -Xmx1g"
  resources:
    requests: { cpu: 500m, memory: 2Gi }
    limits:   { cpu: "2",  memory: 3Gi }

kafka:
  storage: 20Gi

prometheus:
  storage: 30Gi

airflow:
  workerReplicas: 2

# DNS & external access on EKS:
# - dnsmasq is usually unnecessary on AWS (use Route53 / Cloudflare for the real
#   domain). Leave it off. Enable only if you want an in-cluster resolver.
dnsmasq:
  enabled: false

# - cloudflare-tunnel gives secure external access without a public LB. To enable,
#   set cloudflareTunnel.enabled=true and provide the token (prefer an existing
#   Secret via credentials.existingSecret).
cloudflareTunnel:
  enabled: false
  # replicas: 2   # run multiple replicas for HA once enabled

# NOTE: The "managed services later" path - when you are ready to move
# stateful services to RDS/ElastiCache/MSK/OpenSearch, disable them here
# (e.g. postgres.enabled: false) and point apps/airflow at the managed
# endpoints via the credentials/secret. See docs/kubernetes-migration.md.
