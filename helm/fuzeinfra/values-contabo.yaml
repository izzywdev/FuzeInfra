# =============================================================================
# Contabo VPS (k3s single-node) overlay
#
#   helm upgrade --install fuzeinfra helm/fuzeinfra \
#     -n fuzeinfra --create-namespace -f helm/fuzeinfra/values-contabo.yaml
#
# k3s ships with:
#   - local-path provisioner as default StorageClass
#   - Traefik as the default ingress controller (className: traefik)
#
# Domain: defaults to <server-ip>.nip.io (free wildcard DNS).
# Replace with a real domain once you have DNS pointing at the server.
# =============================================================================
global:
  storageClass: "local-path"
  # Cloudflare tunnel routes *.prod.fuzefront.com → Traefik → these Ingress rules.
  # Change back to <ip>.nip.io if the tunnel is disabled for debugging.
  domain: "prod.fuzefront.com"
  imagePullPolicy: IfNotPresent
ingress:
  enabled: true
  className: traefik
  tls:
    enabled: false # enable once cert-manager is wired up
# Sizing for 4 vCPU / 8 GB RAM single node.
# Leave headroom for k3s, ArgoCD, and system processes (~2 GB).
postgres:
  storage: 20Gi
  resources:
    requests: {cpu: 250m, memory: 512Mi}
    limits: {cpu: "1", memory: 1Gi}
mongodb:
  storage: 10Gi
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 512Mi}
redis:
  storage: 2Gi
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 256Mi}
# TEMPORARY headroom reduction for the saturated single control-plane node (#93).
# elasticsearch / rabbitmq / airflow are scaled to 0 pods. Their StatefulSets and
# PVCs are RETAINED (no prune, no data loss) — set replicas back to 1 to restore.
# mongo / neo4j / postgres / redis / kafka / chromadb / monitoring stay running.
elasticsearch:
  replicas: 0
  storage: 20Gi
  javaOpts: "-Xms512m -Xmx512m"
  resources:
    requests: {cpu: 250m, memory: 1Gi}
    limits: {cpu: "1", memory: 1536Mi}
rabbitmq:
  replicas: 0 # TEMP headroom (#93) — restore to 1 when the node has capacity
kafka:
  storage: 10Gi
prometheus:
  storage: 20Gi
  # Let downstream apps ship Prometheus alert/recording rules from their own
  # namespaces via ConfigMaps labeled `prometheus_rule: "1"`.
  ruleSidecar:
    enabled: true
grafana:
  # Auto-load dashboards from any namespace via ConfigMaps labeled
  # `grafana_dashboard: "1"`.
  dashboardSidecar:
    enabled: true
# Alertmanager: wire real notification receivers here. Example webhook receiver:
# alertmanager:
#   config:
#     receiver: ops
#   receivers:
#     - name: default
#     - name: ops
#       webhook_configs:
#         - url: https://example.com/hooks/alerts
#           send_resolved: true
#   routes:
#     - match:
#         severity: critical
#       receiver: ops
#       repeat_interval: 1h

# Loki S3 backend (Contabo Object Storage) — keeps logs off the node disk.
# 1. Create the bucket in Contabo Object Storage.
# 2. Create a Secret with the credentials, e.g.:
#      kubectl -n fuzeinfra create secret generic loki-s3 \
#        --from-literal=LOKI_S3_ACCESS_KEY_ID=<key> \
#        --from-literal=LOKI_S3_SECRET_ACCESS_KEY=<secret>
# 3. Uncomment and fill in:
# loki:
#   s3:
#     enabled: true
#     endpoint: "eu2.contabostorage.com"
#     region: "default"
#     bucket: "fuzeinfra-loki"
#     s3ForcePathStyle: true
#     existingSecret: "loki-s3"
airflow:
  replicas: 0 # TEMP headroom (#93): webserver/scheduler/flower -> 0 pods
  workerReplicas: 0 # TEMP headroom (#93): celery worker -> 0 pods
  # 4 vCPU / 8 GB node — cap concurrency and memory to stop the worker from
  # crowding out CoreDNS/Postgres under memory pressure.
  celeryWorkerConcurrency: 4
  workerResources:
    requests: {cpu: 500m, memory: 512Mi}
    limits: {cpu: "2", memory: 1536Mi}
# Cloudflare tunnel: all traffic enters via the named tunnel; no host-level
# ports 80/443 need to be open.  The tunnel token lives in fuzeinfra-secrets
# (key: CLOUDFLARE_TUNNEL_TOKEN) which is patched by terraform/cloudflare or
# scripts/setup-cloudflare-tunnel.sh — it is NEVER committed to git.
# Routing rules (hostname → service) are managed via terraform/cloudflare.
cloudflareTunnel:
  enabled: true
  # Token mode: cloudflared connects via CLOUDFLARE_TUNNEL_TOKEN in fuzeinfra-secrets.
  # Ingress rules are managed by Terraform in cloudflare_zero_trust_tunnel_cloudflared_config.
  # (tunnelId would switch to local-config mode requiring CLOUDFLARE_TUNNEL_CREDENTIALS JSON
  # which we don't provision — omitting it keeps the simpler token-based connection.)
# Handoff MCP server — exposed at mcp-handoff.prod.fuzefront.com through the CF tunnel
# (Ingress in helm/fuzeinfra/templates/handoff-mcp.yaml) with a more-specific CF Access
# "bypass" app (terraform/contabo/cloudflare.tf, var handoff_mcp_access_enabled) so
# Anthropic's machine calls skip the *.prod email-OTP wildcard and the app bearer
# (HANDOFF_MCP_TOKEN) is the gate.
#
# GITOPS GATE: keep enabled:false until BOTH land in the SAME change —
#   1. deploy/sealed-secrets/handoff-mcp-secret.yaml (ANTHROPIC_API_KEY + HANDOFF_MCP_TOKEN),
#      sealed via scripts/seal-secret.sh, and
#   2. helm/fuzeinfra/files/handoff-state/*.json (the provisioned ids).
# Enabling before the secret exists CrashLoops the pod (CreateContainerConfigError).
handoffMcp:
  enabled: false
# dnsmasq not needed on a remote server (use real DNS / nip.io)
dnsmasq:
  enabled: false
# -----------------------------------------------------------------------------
# Cluster Autoscaler elastic pool (Contabo).
# Maintains an elastic node pool sized 0:2 (min:max) via the externalgrpc
# provider (Task 12) + upstream Cluster Autoscaler (this task). This is up to 2
# elastic nodes ADDED ON TOP of the existing (floating) baseline — the
# control-plane plus however many worker nodes consumer repos have currently
# dispatched via infra-request-handler. There is no fixed baseline count here;
# the elastic pool only ever adds/removes the nodes it tagged itself
# (`fuzeinfra-elastic`) and never touches the baseline. Overprovisioning pause
# pods hold a headroom buffer so the CA has something to evict/scale against
# before real workloads go unschedulable — bumping overprovisioning replicas
# raises how much of the 0:2 elastic pool is proactively reserved.
# -----------------------------------------------------------------------------
# NOTE: kept DISABLED on main. Prod is Argo auto-synced (selfHeal) from main, so
# enabling here before the fuzeinfra-ca-provider SealedSecret + real product/image/
# k3sServerUrl + canonical elastic userDataTemplateB64 exist would CrashLoop the
# provider into prod. Flip to true ONLY as part of the gated Task 18 cutover.
clusterAutoscaler:
  enabled: true
  # Billing-aware model: Contabo only terminates a canceled instance at the
  # end of its paid month, so utilization scale-down is disabled — the
  # reaper CronJob below owns releasing idle elastic capacity instead.
  scaleDownEnabled: false
  provider:
    # TODO: replace with the published image once fuzeinfra-contabo-ca-provider
    # has a tagged release (see cluster-autoscaler/contabo-externalgrpc).
    image: ghcr.io/izzywdev/fuzeinfra-contabo-ca-provider:latest
    existingSecret: fuzeinfra-ca-provider
    # TODO: fill in the Contabo product/image IDs for the elastic node flavor
    # (contabo API: GET /v1/compute/instances/images, /v1/pricing).
    productId: "V92"
    imageId: "d64d5c6c-9dda-4e38-8174-0ee282474d8a"
    region: EU
    # TODO: set to the k3s server URL the elastic nodes join
    # (e.g. https://<contabo-server-ip>:6443).
    k3sServerUrl: "https://161.97.118.134:6443"
    # TODO: base64 of cluster-autoscaler/contabo-externalgrpc/deploy/elastic-userdata.template
    # (the canonical elastic-node cloud-init template) — e.g.
    # `base64 -w0 cluster-autoscaler/contabo-externalgrpc/deploy/elastic-userdata.template`.
    # See that file's header for the template vars (.NodeName/.K3SServerURL/.K3SNodeToken)
    # and why --kubelet-arg=provider-id=contabo://{{.NodeName}} is load-bearing for scale-down.
    userDataTemplateB64: ""
  # Billing-aware reaper -- releases an idle elastic instance only within 24h
  # of its projected monthly renewal (see cmd/reaper). billingPeriod matches
  # the chart default (720h/~30d); set explicitly here so prod release window
  # is self-documenting rather than relying on an inherited default.
  reaper:
    enabled: true
    schedule: "0 * * * *"
    releaseWindow: 24h
    billingPeriod: 720h
overprovisioning:
  # Enabled together with clusterAutoscaler during the gated Task 18 cutover.
  enabled: true
# Per-service Postgres provisioning (issue #153) — PROD.
#
# The provisioning hook Job reads each role password via `secretKeyRef` from a
# Secret the consumer repo seals FOR the `fuzeinfra` namespace. Helm replaces
# (does NOT deep-merge) lists, so the full list is restated here.
#
# GITOPS GATE: each service stays `enabled: false` until its per-service
# credentials Secret is present in the `fuzeinfra` namespace. This is a HARD
# gate: the provisioning hook is a SINGLE Job pod that mounts every enabled
# service's password via `secretKeyRef` (Optional: false), so ONE missing
# secret fails the whole pod with CreateContainerConfigError, blocks ALL
# entries (including ones whose secret DOES exist), and degrades the Argo
# PostSync hook. (Observed: the Job sat in CreateContainerConfigError for
# ~3.7 days because fuzesales/fuzecontact/fuzeservice were flipped on before
# their secrets landed.) Flip each to `true` in the SAME change that lands its
# secret — never before.
#   - mendys      -> Secret `mendys-db-credentials` key `password`
#                    (DONE, issue #183: applied as a hand-off Secret in the
#                     `fuzeinfra` namespace via the FuzeKeys #136 precedent, so
#                     `mendys` below is enabled)
#   - fuzesales   -> Secret `fuzesales-db-credentials`   key `password`  (present)
#   - fuzecontact -> Secret `fuzecontact-db-credentials` key `password`  (present)
#   - fuzeservice -> Secret `fuzeservice-db-credentials` key `password`  (present)
serviceDatabases:
  - name: fuzesales
    enabled: true
    role: fuzesales_svc
    database: fuzesales
    passwordSecret:
      name: fuzesales-db-credentials
      key: password
  - name: fuzecontact
    enabled: true
    role: fuzecontact_svc
    database: fuzecontact
    passwordSecret:
      name: fuzecontact-db-credentials
      key: password
  - name: fuzeservice
    enabled: true
    role: fuzeservice_svc
    database: fuzeservice
    passwordSecret:
      name: fuzeservice-db-credentials
      key: password
  # Enabled: `mendys-db-credentials` (key `password`) is present in the
  # `fuzeinfra` namespace as a hand-off Secret (issue #183, FuzeKeys #136
  # precedent — annotated `fuzeinfra.dev/consumer: izzywdev/MendysRobotics`).
  # The role/db were also provisioned imperatively with the same password, so
  # this hook Job idempotently adopts and re-syncs them on the next Argo sync.
  - name: mendys
    enabled: true
    role: mendys_svc
    database: mendys
    passwordSecret:
      name: mendys-db-credentials
      key: password
  # The provisioning workflow flips this gate only in the same PR that adds
  # the strict-scoped fuzeinfra password SealedSecret.
  - name: fuzequality
    enabled: true
    role: fuzequality_user
    database: fuzequality
    passwordSecret:
      name: fuzequality-db-credentials
      key: password
# Per-service MongoDB provisioning (Helm REPLACES lists, so the full set must be
# declared here — the base values default every entry to enabled: false).
#
# MendysRobotics prod (FuzeInfra #238): the backend reads/writes database
# `robot_catalog` (MONGODB_DATABASE=robot_catalog). Verified against the live
# cluster, the backend's actual MONGODB_URL authenticates as user `mendys_app`
# whose user record lives in — and whose authSource is — the `mendys` database
# (NOT `admin`; that is the only mendys user in the whole deployment). It was
# created out-of-band (#124) with readWrite on `mendys` only, so every
# find/aggregate/createIndexes on `robot_catalog` failed with code 13
# (Unauthorized).
#
# This entry grants that existing `mendys.mendys_app` user readWrite on the
# databases it uses, via the idempotent PostSync provisioning Job
# (grantRolesToUser). managePassword: false — FuzeInfra does not own this user's
# password, so the Job must NOT rotate it (which would break the working auth)
# and mounts no per-service Secret; it only reconciles the role grants. (The
# same grant was applied imperatively to unblock prod immediately; this Job
# re-applies it idempotently and makes it durable across syncs/rebuilds.)
serviceMongoDatabases:
  - name: mendys
    enabled: true
    user: mendys_app
    authDatabase: mendys
    managePassword: false
    database: robot_catalog
    roles:
      - {role: readWrite, db: robot_catalog}
      - {role: readWrite, db: mendys}
  # FuzePicker backend (issue #242). FuzeInfra creates the least-privilege user
  # `fuzepicker_svc` on the shared mongo server with readWrite on its own
  # `fuzepicker` database. managePassword defaults true, so the provisioning Job
  # creates the user (if missing) and syncs its password from the sealed
  # `fuzepicker-db-credentials` secret
  # (deploy/sealed-secrets/fuzepicker-db-credentials.yaml, key `password`).
  - name: fuzepicker
    enabled: true
    database: fuzepicker
    user: fuzepicker_svc
    passwordSecret:
      name: fuzepicker-db-credentials
      key: password
# Chroma allocations are enabled only with a matching strict-scoped
# SealedSecret in deploy/sealed-secrets. Chroma binds each bearer token to the
# declared tenant/database; the NetworkPolicy also admits only the named pods.
serviceChromaCollections:
  - name: fuzeplan-repo-digester
    enabled: true
    tenant: fuzeplan
    database: repo-digester
    credentialSecret:
      name: fuzeplan-repo-digester-chroma-credentials
      key: token
    networkPolicy:
      namespace: fuzeplan
      podLabels:
        app.kubernetes.io/name: repo-digester
    collections:
      - repo_digester_ready
  - name: fuzequality
    enabled: true
    tenant: fuzequality
    database: fuzequality
    credentialSecret:
      name: fuzequality-chroma-credentials
      key: token
    networkPolicy:
      namespace: fuzequality
      podLabels:
        app.kubernetes.io/name: fuzequality
    collections:
      - fuzequality_ready
