# =============================================================================
# Contabo VPS (k3s single-node) overlay
#
#   helm upgrade --install fuzeinfra helm/fuzeinfra \
#     -n fuzeinfra --create-namespace -f helm/fuzeinfra/values-contabo.yaml
#
# k3s ships with:
#   - local-path provisioner as default StorageClass
#   - Traefik as the default ingress controller (className: traefik)
#
# Domain: defaults to <server-ip>.nip.io (free wildcard DNS).
# Replace with a real domain once you have DNS pointing at the server.
# =============================================================================
global:
  storageClass: "local-path"
  # Cloudflare tunnel routes *.prod.fuzefront.com → Traefik → these Ingress rules.
  # Change back to <ip>.nip.io if the tunnel is disabled for debugging.
  domain: "prod.fuzefront.com"
  imagePullPolicy: IfNotPresent

ingress:
  enabled: true
  className: traefik
  tls:
    enabled: false   # enable once cert-manager is wired up

# Sizing for 4 vCPU / 8 GB RAM single node.
# Leave headroom for k3s, ArgoCD, and system processes (~2 GB).
postgres:
  storage: 20Gi
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "1",  memory: 1Gi }

mongodb:
  storage: 10Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 512Mi }

redis:
  storage: 2Gi
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

# TEMPORARY headroom reduction for the saturated single control-plane node (#93).
# elasticsearch / rabbitmq / airflow are scaled to 0 pods. Their StatefulSets and
# PVCs are RETAINED (no prune, no data loss) — set replicas back to 1 to restore.
# mongo / neo4j / postgres / redis / kafka / chromadb / monitoring stay running.
elasticsearch:
  replicas: 0
  storage: 20Gi
  javaOpts: "-Xms512m -Xmx512m"
  resources:
    requests: { cpu: 250m, memory: 1Gi }
    limits:   { cpu: "1",  memory: 1536Mi }

rabbitmq:
  replicas: 0   # TEMP headroom (#93) — restore to 1 when the node has capacity

kafka:
  storage: 10Gi

prometheus:
  storage: 20Gi
  # Let downstream apps ship Prometheus alert/recording rules from their own
  # namespaces via ConfigMaps labeled `prometheus_rule: "1"`.
  ruleSidecar:
    enabled: true

grafana:
  # Auto-load dashboards from any namespace via ConfigMaps labeled
  # `grafana_dashboard: "1"`.
  dashboardSidecar:
    enabled: true

# Alertmanager: wire real notification receivers here. Example webhook receiver:
# alertmanager:
#   config:
#     receiver: ops
#   receivers:
#     - name: default
#     - name: ops
#       webhook_configs:
#         - url: https://example.com/hooks/alerts
#           send_resolved: true
#   routes:
#     - match:
#         severity: critical
#       receiver: ops
#       repeat_interval: 1h

# Loki S3 backend (Contabo Object Storage) — keeps logs off the node disk.
# 1. Create the bucket in Contabo Object Storage.
# 2. Create a Secret with the credentials, e.g.:
#      kubectl -n fuzeinfra create secret generic loki-s3 \
#        --from-literal=LOKI_S3_ACCESS_KEY_ID=<key> \
#        --from-literal=LOKI_S3_SECRET_ACCESS_KEY=<secret>
# 3. Uncomment and fill in:
# loki:
#   s3:
#     enabled: true
#     endpoint: "eu2.contabostorage.com"
#     region: "default"
#     bucket: "fuzeinfra-loki"
#     s3ForcePathStyle: true
#     existingSecret: "loki-s3"

airflow:
  replicas: 0          # TEMP headroom (#93): webserver/scheduler/flower -> 0 pods
  workerReplicas: 0    # TEMP headroom (#93): celery worker -> 0 pods
  # 4 vCPU / 8 GB node — cap concurrency and memory to stop the worker from
  # crowding out CoreDNS/Postgres under memory pressure.
  celeryWorkerConcurrency: 4
  workerResources:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: "2",  memory: 1536Mi }

# Cloudflare tunnel: all traffic enters via the named tunnel; no host-level
# ports 80/443 need to be open.  The tunnel token lives in fuzeinfra-secrets
# (key: CLOUDFLARE_TUNNEL_TOKEN) which is patched by terraform/cloudflare or
# scripts/setup-cloudflare-tunnel.sh — it is NEVER committed to git.
# Routing rules (hostname → service) are managed via terraform/cloudflare.
cloudflareTunnel:
  enabled: true
  # Token mode: cloudflared connects via CLOUDFLARE_TUNNEL_TOKEN in fuzeinfra-secrets.
  # Ingress rules are managed by Terraform in cloudflare_zero_trust_tunnel_cloudflared_config.
  # (tunnelId would switch to local-config mode requiring CLOUDFLARE_TUNNEL_CREDENTIALS JSON
  # which we don't provision — omitting it keeps the simpler token-based connection.)

# dnsmasq not needed on a remote server (use real DNS / nip.io)
dnsmasq:
  enabled: false

# -----------------------------------------------------------------------------
# Cluster Autoscaler elastic pool (Contabo).
# Maintains an elastic node pool sized 0:2 (min:max) via the externalgrpc
# provider (Task 12) + upstream Cluster Autoscaler (this task). Overprovisioning
# pause pods hold a headroom "ceiling" so the CA has something to evict/scale
# against before real workloads go unschedulable — bumping overprovisioning
# replicas raises the effective ceiling (documented target: up to 5 nodes worth
# of slack against the 0:2 elastic pool + the always-on base node).
# -----------------------------------------------------------------------------
# NOTE: kept DISABLED on main. Prod is Argo auto-synced (selfHeal) from main, so
# enabling here before the fuzeinfra-ca-provider SealedSecret + real product/image/
# k3sServerUrl + canonical elastic userDataTemplateB64 exist would CrashLoop the
# provider into prod. Flip to true ONLY as part of the gated Task 18 cutover.
clusterAutoscaler:
  enabled: false
  provider:
    # TODO: replace with the published image once fuzeinfra-contabo-ca-provider
    # has a tagged release (see cluster-autoscaler/contabo-externalgrpc).
    image: ghcr.io/izzywdev/fuzeinfra-contabo-ca-provider:latest
    existingSecret: fuzeinfra-ca-provider
    # TODO: fill in the Contabo product/image IDs for the elastic node flavor
    # (contabo API: GET /v1/compute/instances/images, /v1/pricing).
    productId: ""
    imageId: ""
    region: EU
    # TODO: set to the k3s server URL the elastic nodes join
    # (e.g. https://<contabo-server-ip>:6443).
    k3sServerUrl: ""

overprovisioning:
  # Enabled together with clusterAutoscaler during the gated Task 18 cutover.
  enabled: false
