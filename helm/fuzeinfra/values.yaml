# =============================================================================
# FuzeInfra Helm chart - default values (in-cluster everything)
#
# These defaults run the full stack with StatefulSets for stateful services.
# Override per environment with values-local.yaml (kind) or values-aws.yaml (EKS).
# =============================================================================

global:
  # Namespace is taken from the Helm release namespace (`helm -n fuzeinfra`).
  # Storage class for PersistentVolumeClaims:
  #   - kind:  "standard" (default kind storage class)
  #   - EKS:   "gp3" (provided by the aws-ebs-csi-driver / values-aws.yaml)
  storageClass: "standard"

  # Base domain used to build Ingress hostnames, e.g. grafana.dev.local.
  # Local:  dev.local   (resolve via /etc/hosts or dnsmasq -> 127.0.0.1)
  # AWS:    set to your real domain in values-aws.yaml
  domain: dev.local

  # imagePullPolicy applied to every workload.
  imagePullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Credentials. For real environments, override these or supply an existing
# Secret via `existingSecret`. Defaults mirror the docker-compose dev values.
# -----------------------------------------------------------------------------
credentials:
  # If set, the chart will NOT create a Secret and instead reads keys from this one.
  existingSecret: ""
  postgres:
    user: fuzeinfra
    password: fuzeinfra_secure_password
    db: fuzeinfra_db
  mongodb:
    user: admin
    password: admin123
  neo4j:
    user: neo4j
    password: password123
  rabbitmq:
    user: admin
    password: admin123
  grafana:
    adminPassword: admin
  airflow:
    adminUser: admin
    adminPassword: admin
    # Fernet key for Airflow connection encryption. Generate a real one with:
    #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    fernetKey: "Zp9p8x0Q3y0sJpQ8m2nq3l4F6tH9wXyZ1aB2cD3eF4="
  cloudflare:
    # Tunnel token from the Cloudflare Zero Trust dashboard. Required only when
    # cloudflareTunnel.enabled=true. Prefer supplying via an existing Secret.
    tunnelToken: ""

# -----------------------------------------------------------------------------
# Per-service Postgres provisioning (issue #153).
#
# Declaratively provisions per-service roles + databases on the shared
# `fuzeinfra-postgres` server via an idempotent, GitOps-reconciled hook Job
# (templates/service-db-provisioning.yaml). This is the declarative successor
# to the imperative runner-side recipe in governance/datastore-provisioning.md.
#
# CROSS-NAMESPACE SECRET CONTRACT (important):
#   The provisioning Job runs in the `fuzeinfra` namespace so the Postgres
#   SUPERUSER creds (`fuzeinfra-secrets`) never leave this namespace and never
#   land in git. The role password MUST equal the password the consuming
#   service already sealed for its own DATABASE_URL. A Job pod can only read
#   Secrets in its OWN namespace, so each consuming repo must ALSO ship a
#   SealedSecret of its DB credentials sealed FOR the `fuzeinfra` namespace
#   (precedent: `fuzekeys-db-credentials`, `fuzesocial-app-db-credentials`
#   already exist in `fuzeinfra`). The Job reads that per-service password via
#   `secretKeyRef` (below) and syncs it onto the role. No plaintext credential
#   is ever committed here — only Secret NAMES + KEYS.
#
# Off by default (base/local/aws): the referenced per-service Secrets only
# exist on prod. Enable per env in the overlay (see values-contabo.yaml).
serviceDbProvisioning:
  image: postgres:15          # matches the server; ships psql/pg_isready
  host: fuzeinfra-postgres    # in-namespace DNS of the shared Postgres Service
  # Superuser used to create roles/dbs. Defaults to the chart-managed admin
  # secret (fuzeinfra-secrets). Never referenced by value — only by key.
  adminSecret:
    name: ""                  # "" -> fuzeinfra.secretName (fuzeinfra-secrets)
    userKey: POSTGRES_USER
    passwordKey: POSTGRES_PASSWORD

# List of services to provision. Each entry gates itself via `enabled`.
#   name:     logical service name (used to derive the password env var)
#   role:     Postgres LOGIN role to ensure (issue #153 convention: <svc>_svc)
#   database: database to ensure, owned by `role`
#   passwordSecret.{name,key}: the per-service Secret (sealed for the
#     `fuzeinfra` namespace by the consumer repo) holding the role password.
# Defaults are OFF; prod overlay flips `enabled: true` once the SealedSecrets
# are present in the `fuzeinfra` namespace.
serviceDatabases:
  - name: fuzesales
    enabled: false
    role: fuzesales_svc
    database: fuzesales
    passwordSecret:
      name: fuzesales-db-credentials
      key: password
  - name: fuzecontact
    enabled: false
    role: fuzecontact_svc
    database: fuzecontact
    passwordSecret:
      name: fuzecontact-db-credentials
      key: password
  - name: fuzeservice
    enabled: false
    role: fuzeservice_svc
    database: fuzeservice
    passwordSecret:
      name: fuzeservice-db-credentials
      key: password
  # MendysRobotics app DB — enabled in values-contabo.yaml once the
  # mendys-db-credentials SealedSecret is present in the fuzeinfra namespace.
  - name: mendys
    enabled: false
    role: mendys_svc
    database: mendys
    passwordSecret:
      name: mendys-db-credentials
      key: password
  - name: fuzequality
    enabled: false
    role: fuzequality_user
    database: fuzequality
    passwordSecret:
      name: fuzequality-db-credentials
      key: password

# MongoDB admin connection config for serviceMongoProvisioning Jobs.
serviceMongoProvisioning:
  host: fuzeinfra-mongodb    # in-namespace DNS of the shared MongoDB Service

# List of MongoDB users to provision per-service. Same gate pattern as
# serviceDatabases: disabled by default; prod overlay flips enabled: true once
# the per-service SealedSecret is present in the fuzeinfra namespace.
#   name:     logical service name (used to derive the password env var)
#   database: MongoDB database the user will own (default target for the role)
#   user:     MongoDB username to create / sync
#   passwordSecret.{name,key}: SealedSecret in fuzeinfra namespace holding the password
#   authDatabase:   OPTIONAL — database the user record lives in / authenticates
#                   against (default: `database`). Set to `admin` when the app
#                   connects with authSource=admin.
#   roles:          OPTIONAL — list of {role, db} to ensure on the user (default:
#                   [{role: readWrite, db: <database>}]). Lets one user hold
#                   readWrite on a database whose name differs from its auth db.
#   managePassword: OPTIONAL bool (default: true). When false, the Job never
#                   touches the password (no createUser/updateUser) and only
#                   grants roles to a pre-existing user — use for users created
#                   out-of-band whose password FuzeInfra does not own.
serviceMongoDatabases:
  # mendys_app's user record lives in the `mendys` db (authSource=mendys) and is
  # provisioned out-of-band; FuzeInfra only reconciles its readWrite grants
  # (incl. `robot_catalog`, the DB the backend uses). Enabled in the contabo
  # overlay. See #238. managePassword:false ⇒ no passwordSecret required.
  - name: mendys
    enabled: false
    user: mendys_app
    authDatabase: mendys
    managePassword: false
    database: robot_catalog
    roles:
      - { role: readWrite, db: robot_catalog }
      - { role: readWrite, db: mendys }

# Authenticated, isolated ChromaDB allocations. Each enabled consumer is bound
# server-side to exactly one tenant/database by its sealed bearer token.
# `credentialSecret` must exist in the fuzeinfra namespace before enabling an
# allocation. Network selectors are an additional boundary, not a replacement
# for Chroma authorization. Only bootstrap collections belong in this list.
serviceChromaCollections: []

# -----------------------------------------------------------------------------
# Ingress (replaces the docker-compose nginx reverse proxy). Web UIs are exposed
# at <service>.<global.domain>. Requires an ingress controller (ingress-nginx),
# installed by the bootstrap scripts for kind and as an EKS addon path.
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  # TLS via cert-manager / secrets is left to the environment overlay.
  tls:
    enabled: false

# =============================================================================
# Service definitions. Each block: enabled, image, resources, storage size.
# =============================================================================

postgres:
  enabled: true
  image: postgres:15
  port: 5432
  storage: 5Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 1Gi }

mongodb:
  enabled: true
  image: mongo:7
  port: 27017
  storage: 5Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 1Gi }

mongoExpress:
  enabled: true
  image: mongo-express:latest
  port: 8081

redis:
  enabled: true
  image: redis:7-alpine
  port: 6379
  storage: 2Gi
  # Per-app ACL persistence. When enabled, redis runs with `--aclfile
  # /data/users.acl` and a bootstrap initContainer seeds that file (on the PVC)
  # with the shared no-auth `default` user so existing consumers are unaffected.
  # Per-app least-privilege ACL users (created imperatively during consumer
  # onboarding, e.g. `fuzekeys` with `~fuzekeys:* +@all -@admin -@dangerous`)
  # are written to the file via `ACL SAVE` and survive pod restarts. Passwords
  # live only on the PVC as hashes — never in git. See
  # governance/datastore-allocations.md for the per-app allocation registry.
  acl:
    enabled: true
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 500m, memory: 512Mi }

neo4j:
  enabled: true
  image: neo4j:5
  httpPort: 7474
  boltPort: 7687
  storage: 5Gi
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: "1",  memory: 2Gi }

elasticsearch:
  enabled: true
  image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
  port: 9200
  storage: 10Gi
  javaOpts: "-Xms512m -Xmx512m"
  resources:
    requests: { cpu: 250m, memory: 1Gi }
    limits:   { cpu: "1",  memory: 2Gi }

chromadb:
  enabled: true
  # 0.5.23 is the last OSS release with the built-in token auth provider used
  # below. Never use `latest`: auth behavior and client/server APIs must match.
  image: chromadb/chroma:0.5.23@sha256:18e67eecc172abbcd9413d751bde64983b3d167fe497c98f979083eb24c0c942
  port: 8000
  storage: 5Gi
  auth:
    adminSecret:
      name: chromadb-admin-credentials
      key: token
  networkPolicy:
    enabled: true

# Kafka in KRaft mode (no ZooKeeper) - fixes the ZooKeeper startup races and
# deprecation warnings from the docker-compose ZooKeeper-based setup.
kafka:
  enabled: true
  image: confluentinc/cp-kafka:7.6.1
  port: 9092
  storage: 5Gi
  # Fixed cluster id so the StatefulSet can re-format storage deterministically.
  clusterId: "j7z6bP_dQ8-uF_3Dp5tiXw"
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "1",  memory: 1Gi }

kafkaUi:
  enabled: true
  image: provectuslabs/kafka-ui:latest
  port: 8080

rabbitmq:
  enabled: true
  image: rabbitmq:3-management
  amqpPort: 5672
  managementPort: 15672
  storage: 2Gi

# -----------------------------------------------------------------------------
# Monitoring & logging
# -----------------------------------------------------------------------------
prometheus:
  enabled: true
  image: prom/prometheus:latest
  port: 9090
  storage: 10Gi
  # Discover alert/recording rules from labeled ConfigMaps in ANY namespace.
  # Opt-in: runs a k8s-sidecar that watches ConfigMaps with the configured label
  # and writes their data into Prometheus' rules dir, then triggers a reload.
  # Consumers add rules without forking the chart by creating a ConfigMap labeled
  # `prometheus_rule: "1"` whose keys are *.yml Prometheus rule files.
  ruleSidecar:
    enabled: false
    image: kiwigrid/k8s-sidecar:1.27.4
    label: prometheus_rule
    labelValue: "1"
    # ALL = watch every namespace. Set to a specific namespace to scope it.
    searchNamespace: ALL
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { cpu: 100m, memory: 128Mi }

grafana:
  enabled: true
  image: grafana/grafana:latest
  port: 3000
  # Datasources (Prometheus, Loki), dashboards and alerting are all provisioned
  # from ConfigMaps, so Grafana is stateless by default and can be rescheduled
  # onto any node without depending on node-pinned local-path storage.
  persistence:
    # Off by default → Grafana's SQLite DB lives in an emptyDir. Set to true to
    # retain runtime state (manually-created users/dashboards) across restarts
    # via a PVC. Note: a PVC pins the pod to a node when using local-path.
    enabled: false
  # PVC size, used only when persistence.enabled=true.
  storage: 2Gi
  # Scheduling controls (default empty → no change to single-node behaviour).
  # Populate these to move Grafana onto a chosen node, e.g. to offload the
  # primary node:
  #   nodeSelector:
  #     kubernetes.io/hostname: worker-2
  #   tolerations:
  #     - key: dedicated
  #       operator: Equal
  #       value: monitoring
  #       effect: NoSchedule
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # Discover dashboards from labeled ConfigMaps in ANY namespace.
  # Opt-in: runs a k8s-sidecar that watches ConfigMaps with the configured label
  # and writes their JSON into a Grafana provisioning folder. Consumers ship
  # dashboards without forking the chart by creating a ConfigMap labeled
  # `grafana_dashboard: "1"` whose keys are *.json dashboard models.
  dashboardSidecar:
    enabled: false
    image: kiwigrid/k8s-sidecar:1.27.4
    label: grafana_dashboard
    labelValue: "1"
    # ALL = watch every namespace. Set to a specific namespace to scope it.
    searchNamespace: ALL
    # Grafana folder discovered dashboards are filed under.
    folderName: "Discovered"
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { cpu: 100m, memory: 128Mi }

alertmanager:
  enabled: true
  image: prom/alertmanager:latest
  port: 9093
  storage: 1Gi
  # Alertmanager routing/notification config. Defaults preserve the previous
  # behavior: a single no-op `default` receiver (alerts group but go nowhere).
  # Operators wire notifications by overriding `receivers` and `routes`, e.g. a
  # webhook/Telegram/Slack receiver — no chart fork required.
  config:
    resolveTimeout: 5m
    groupBy: ['alertname', 'namespace']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 3h
    # Name of the root (catch-all) receiver. Must exist in `receivers` below.
    receiver: default
    # Extra top-level global keys (e.g. smtp_*, slack_api_url) merged verbatim.
    global: {}
  # Receivers. Default is a single no-op receiver named `default`.
  # Example webhook receiver:
  #   - name: ops
  #     webhook_configs:
  #       - url: https://example.com/alerts
  receivers:
    - name: default
  # Child routes under the root route (rendered as route.routes). Default keeps
  # the previous critical->default route with a faster repeat interval.
  routes:
    - match:
        severity: critical
      receiver: default
      repeat_interval: 1h
  # Inhibition rules (silence warnings when a matching critical is firing).
  inhibitRules:
    - source_match:
        severity: critical
      target_match:
        severity: warning
      equal: ['alertname', 'namespace']

loki:
  enabled: true
  image: grafana/loki:3.2.0
  port: 3100
  storage: 5Gi
  # Optional S3-compatible object store backend for Loki chunks + index.
  # When disabled (default) Loki uses on-disk filesystem storage (the PVC above).
  # When enabled, chunk+index storage moves to the configured bucket — keeping
  # node disk free. Tested against Contabo Object Storage (S3-compatible).
  #
  # Credentials are read from a referenced Secret (never inlined in values), with
  # `-config.expand-env=true` substituting them into the Loki config at runtime.
  s3:
    enabled: false
    # S3 endpoint host (no scheme), e.g. eu2.contabostorage.com or s3.amazonaws.com
    endpoint: ""
    region: ""
    bucket: ""
    # Path-style access (required by most non-AWS S3 providers like Contabo/MinIO).
    s3ForcePathStyle: true
    # Set true only for plain-HTTP endpoints (not recommended).
    insecure: false
    # Existing Secret holding the access/secret keys. REQUIRED when s3.enabled.
    existingSecret: ""
    accessKeyIdKey: LOKI_S3_ACCESS_KEY_ID
    secretAccessKeyKey: LOKI_S3_SECRET_ACCESS_KEY

promtail:
  enabled: true
  image: grafana/promtail:3.2.0

nodeExporter:
  enabled: true
  image: prom/node-exporter:latest
  port: 9100

kubeStateMetrics:
  enabled: true
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.10.1
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits:   { cpu: 250m, memory: 128Mi }

# -----------------------------------------------------------------------------
# Airflow (CeleryExecutor) - workflow orchestration for data pipelines.
# Reuses the in-cluster Postgres (metadata DB) and Redis (Celery broker).
# -----------------------------------------------------------------------------
airflow:
  enabled: true
  image: apache/airflow:2.9.1
  webPort: 8080
  flowerPort: 5555
  # Number of Celery worker pods (scale data pipeline throughput here).
  workerReplicas: 1
  # Celery prefork concurrency per worker pod. Default Celery uses nproc (can
  # be 16+ on a 4-core node), consuming 1.5 GB+ of RAM. Set explicitly.
  celeryWorkerConcurrency: 4
  # Resource envelope for the worker pod. Unset = unbounded (dangerous on
  # single-node clusters). Override per environment in values-<env>.yaml.
  workerResources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "2",  memory: 1Gi }
  # Mount DAGs from a ConfigMap built from airflow-shared/dags? For real use,
  # prefer git-sync or a baked image. Default: empty dir + example DAG ConfigMap.
  loadExamples: false

# -----------------------------------------------------------------------------
# DNS & external access
# -----------------------------------------------------------------------------
# dnsmasq: optional in-cluster DNS server that resolves the wildcard dev domain
# (*.<global.domain>) to a single target. In-cluster service discovery is already
# handled by CoreDNS, so this is OFF by default and mainly useful for kind where
# you want *.dev.local resolution served from the cluster.
dnsmasq:
  enabled: false
  image: jpillora/dnsmasq:latest
  dnsPort: 53
  webPort: 8080
  # Where *.<global.domain> resolves to. For host-side resolution keep 127.0.0.1;
  # set to the ingress controller address to route into the cluster.
  wildcardTarget: "127.0.0.1"
  adminPassword: admin123
  # ClusterIP | NodePort | LoadBalancer. Use LoadBalancer/NodePort to use this as
  # an actual DNS server from outside the cluster.
  serviceType: ClusterIP

# cloudflare-tunnel: optional cloudflared Deployment for secure external access.
# Two modes:
#   Local-config (preferred): set tunnelId to the Named Tunnel UUID.
#     cloudflared uses CLOUDFLARE_TUNNEL_CREDENTIALS from the cluster secret and
#     a generated config.yaml with ingress rules — no dashboard config needed.
#   Token mode (legacy): leave tunnelId empty.
#     cloudflared uses CLOUDFLARE_TUNNEL_TOKEN from the cluster secret and
#     fetches routing from the Cloudflare Zero Trust dashboard.
cloudflareTunnel:
  enabled: false
  image: cloudflare/cloudflared:latest
  metricsPort: 2000
  replicas: 1
  # Named Tunnel UUID (from `cloudflared tunnel list` or Terraform output).
  # When set, switches to local-config mode with inline ingress rules.
  tunnelId: ""

# -----------------------------------------------------------------------------
# Cluster Autoscaler overprovisioning
# Maintains spare capacity on elastic node pools via low-priority pause pods.
# Disabled by default; enable in environment overlays that use elastic autoscaling.
# -----------------------------------------------------------------------------
overprovisioning:
  enabled: false
  replicas: 1
  image: registry.k8s.io/pause:3.9
  resources:
    cpu: "1"
    memory: 2Gi

# Cluster Autoscaler Contabo provider
# Runs as a standalone gRPC server that scales elastic nodes on Contabo.
# Disabled by default; enable and configure in environment overlays.
# The existingSecret must contain: CONTABO_CLIENT_ID, CONTABO_CLIENT_SECRET,
# CONTABO_API_USER, CONTABO_API_PASSWORD, K3S_NODE_TOKEN, SSH_KEY_ID.
# (Non-secret values are templated from the provider block below.)
# -----------------------------------------------------------------------------
clusterAutoscaler:
  enabled: false
  image: registry.k8s.io/autoscaling/cluster-autoscaler:v1.30.3
  nodeGroup:
    minSize: 0
    maxSize: 2
  scaleDownUnneededTime: 45m
  scaleDownDelayAfterAdd: 20m
  maxNodeProvisionTime: 15m
  maxTotalUnreadyPercentage: 45
  expander: least-waste
  provider:
    image: ghcr.io/izzywdev/fuzeinfra-contabo-ca-provider:latest
    existingSecret: fuzeinfra-ca-provider
    productId: ""
    imageId: ""
    region: EU
    k3sServerUrl: ""
    elasticTag: fuzeinfra-elastic
    elasticNamePrefix: fuzeinfra-elastic
    minSize: 0
    maxSize: 2
    grpcListen: ":8086"
    userDataTemplateB64: ""

# -----------------------------------------------------------------------------
# Handoff MCP server — agent-to-agent orchestration carrier for the FuzeOne
# Managed-Agents fleet (agent-templates/orchestration/handoff_mcp).
# OFF by default. Enable per-overlay in the SAME change that lands the sealed
# secret deploy/sealed-secrets/handoff-mcp-secret.yaml (ANTHROPIC_API_KEY +
# HANDOFF_MCP_TOKEN) and populates helm/fuzeinfra/files/handoff-state/*.json.
# Exposed at mcp-handoff.<domain> (Ingress here + CF Access bypass in Terraform).
# -----------------------------------------------------------------------------
handoffMcp:
  enabled: false
  image: ghcr.io/izzywdev/fuzeinfra/agent-handoff
  tag: latest
  replicas: 1
  imagePullSecrets: []
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
