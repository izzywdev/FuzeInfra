# cluster-query — self-service READ-ONLY introspection of the prod cluster for
# agent sessions. Dispatch with a kubectl read command (and/or a public URL to
# curl); read the result from the job log. Replaces the fragile human/Cowork
# relay for "what's happening in the cluster" without handing any session the
# raw kubeconfig.
#
# SECURITY: an allowed READ verb must appear as a token, AND no mutating/exec
# token may appear (apply/delete/edit/patch/replace/exec/attach/cp/scale/
# rollout/annotate/label/drain/cordon/proxy/port-forward/run/create/set).
#
# Secret: KUBE_CONFIG (base64 kubeconfig) — same secret used by
# apply-cluster-config.yml / argo-outofsync-autofix.yml.
name: cluster-query

on:
  workflow_dispatch:
    inputs:
      kubectl_args:
        description: 'kubectl args, e.g. "-n mendys-prod get pods -o wide". Must contain a read verb (get/describe/logs/…).'
        required: false
        default: 'get nodes'
      curl_url:
        description: 'Optional https URL to probe (only *.mendysrobotics.com / *.prod.fuzefront.com).'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: cluster-query
  cancel-in-progress: false

jobs:
  query:
    runs-on: [self-hosted, staging]
    steps:
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Configure kubectl
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then echo "::error::KUBE_CONFIG unset"; exit 1; fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Run read-only kubectl
        env:
          ARGS: ${{ github.event.inputs.kubectl_args }}
        run: |
          set -u
          [ -z "${ARGS// }" ] && { echo "no kubectl_args"; exit 0; }
          # An allowed read verb must be present as a token (order-independent).
          read_ok=0
          for tok in $ARGS; do
            case "$tok" in
              get|describe|logs|top|events|version|api-resources|api-versions|explain|cluster-info|config) read_ok=1;;
            esac
          done
          if [ "$read_ok" != 1 ]; then
            echo "::error::No read verb in args. Allowed: get describe logs top events version api-resources api-versions explain cluster-info config."
            exit 1
          fi
          # Reject any mutating/exec token anywhere in the args.
          for tok in $ARGS; do
            case "$tok" in
              exec|attach|cp|port-forward|proxy|run|delete|apply|edit|patch|replace|scale|rollout|cordon|drain|annotate|label|set|create|taint|uncordon|debug)
                echo "::error::Rejected mutating/exec token: '$tok'."; exit 1;;
            esac
          done
          echo "### kubectl $ARGS"
          # shellcheck disable=SC2086
          kubectl $ARGS 2>&1 | head -c 200000

      - name: Probe public URL
        if: ${{ github.event.inputs.curl_url != '' }}
        env:
          URL: ${{ github.event.inputs.curl_url }}
        run: |
          case "$URL" in
            https://*.mendysrobotics.com|https://*.mendysrobotics.com/*|https://*.prod.fuzefront.com|https://*.prod.fuzefront.com/*)
              echo "### curl -sSIL $URL"
              curl -sSIL --max-time 20 "$URL" 2>&1 | head -c 20000;;
            *)
              echo "::error::URL not allowlisted (only *.mendysrobotics.com / *.prod.fuzefront.com): $URL"; exit 1;;
          esac
