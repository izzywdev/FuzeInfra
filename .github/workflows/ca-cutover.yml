# =============================================================================
# ca-cutover — GATED Contabo cluster-autoscaler PROD CUTOVER (Task 18 runbook,
# docs/runbooks/contabo-autoscaling-cutover.md, steps 3-6).
# =============================================================================
# This workflow automates turning autoscaling ON in PROD. It is safety-first
# and fail-closed by construction:
#
#   1. A literal safety-interlock input (`confirm` must equal "CUTOVER") gates
#      the ENTIRE job — anything else exits immediately, before checkout even.
#   2. Two non-destructive GATES run against the LIVE Contabo API before any
#      file is written:
#        GATE A — the live catalog spec for the resolved product_id must match
#                 the coded `productSpecs` entry in template.go EXACTLY (vCPU +
#                 RAM). A mismatch means Cluster Autoscaler's scale-from-zero
#                 simulation would lie about node capacity — this is the guard
#                 called out in the runbook and in template.go's own comments.
#        GATE B — the imageId must exist, and a Contabo SSH key matching
#                 NODE_SSH_PUBLIC_KEY must be resolvable. Both are read-only
#                 GETs; NOTHING is created. See GATE B's own comment below for
#                 why we deliberately do NOT canary-create a real instance here
#                 — that is ca-spike-test.yml's job, because it can roll back.
#   3. Credentials NEVER leave CI: every Contabo/K3s/SSH secret is consumed
#      only as an env var inside this job, no secret is ever echoed, and the
#      SealedSecret is generated by piping an in-memory Secret manifest
#      straight into `kubeseal` — the plaintext manifest is never written to
#      disk or logged. This mirrors rotate-sealed-secret.yml exactly (same
#      kubeseal install, same scripts/seal-secret.sh, same OFFLINE public
#      cert — https://sealed-secrets.prod.fuzefront.com/v1/cert.pem — so
#      sealing needs zero cluster access).
#   4. `dry_run` (default true) runs every gate and renders the SealedSecret +
#      values diff as a workflow artifact WITHOUT opening a PR. Only an
#      explicit `dry_run=false` (on top of the CUTOVER interlock) opens the
#      real cutover PR.
#   5. This workflow NEVER pushes to main directly. It opens a PR; the repo's
#      green-required ruleset + auto-merge.yml (admin bypass) handle the
#      actual merge, same as every other automated-PR workflow in this repo
#      (rotate-sealed-secret.yml, terraform-plan-apply.yml, ...). Merging that
#      PR is what actually flips autoscaling on in prod (Argo selfHeal syncs
#      on merge to main) — run ca-spike-test.yml AFTER Argo syncs cleanly to
#      validate the cutover end-to-end (runbook step 7).
#
# Idempotency: re-running with dry_run=false always produces a fresh,
# uniquely-branched PR (automated/ca-cutover-<run_id>) that converges
# values-contabo.yaml + the SealedSecret to the same correct desired state —
# safe to re-run (e.g. to pick up a rotated K3S_NODE_TOKEN) without corrupting
# anything. It never mutates a previous PR or main directly.
#
# Required secrets (all already exist in this repo — see the header of
# terraform-plan-apply.yml for how most of these are also used there):
#   CONTABO_CLIENT_ID, CONTABO_CLIENT_SECRET, CONTABO_API_USER,
#   CONTABO_API_PASSWORD, CONTABO_IMAGE_ID, CONTABO_PRODUCT_ID (fallback for
#   the product_id input), K3S_NODE_TOKEN, K3S_SERVER_URL,
#   NODE_SSH_PUBLIC_KEY, GH_TF_TOKEN (falls back to GITHUB_TOKEN) for the PR.
# =============================================================================
name: ca-cutover

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Safety interlock — type the literal word CUTOVER to proceed. Anything else aborts immediately.'
        required: true
        default: ''
      product_id:
        description: 'Contabo product SKU for elastic nodes (e.g. V45). Leave blank to fall back to the CONTABO_PRODUCT_ID secret.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run: run both gates + render the SealedSecret/values as an artifact, but do NOT open the enable PR.'
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  # Shared with ca-spike-test.yml's rollback path — both can mutate
  # values-contabo.yaml and must never race each other.
  group: ca-values-contabo
  cancel-in-progress: false

env:
  NAMESPACE: fuzeinfra
  SECRET_NAME: fuzeinfra-ca-provider
  SEALED_SECRET_PATH: helm/fuzeinfra/templates/autoscaler/sealed-secret-ca-provider.yaml
  VALUES_PATH: helm/fuzeinfra/values-contabo.yaml
  TEMPLATE_GO_PATH: cluster-autoscaler/contabo-externalgrpc/internal/provider/template.go
  USERDATA_TEMPLATE_PATH: cluster-autoscaler/contabo-externalgrpc/deploy/elastic-userdata.template

jobs:
  cutover:
    runs-on: ubuntu-latest
    steps:
      # -----------------------------------------------------------------
      # 1. Interlock — first step, before checkout, so a wrong/blank
      #    confirm value burns as little runner time as possible and the
      #    job fails loudly and immediately.
      # -----------------------------------------------------------------
      - name: Safety interlock — require confirm == CUTOVER
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "CUTOVER" ]; then
            echo "::error::Safety interlock failed — the 'confirm' input must equal the literal string CUTOVER (got a blank or different value). This workflow turns autoscaling ON in PROD; refusing to proceed without the explicit interlock."
            exit 1
          fi
          echo "Interlock passed (confirm=CUTOVER)."

      - uses: actions/checkout@v7

      # -----------------------------------------------------------------
      # 2. Resolve product_id — workflow_dispatch inputs cannot default to
      #    a secret expression, so resolve input-overrides-secret here.
      # -----------------------------------------------------------------
      - name: Resolve product_id (input overrides secret; fail if both blank)
        env:
          INPUT_PRODUCT_ID: ${{ inputs.product_id }}
          SECRET_PRODUCT_ID: ${{ secrets.CONTABO_PRODUCT_ID }}
        run: |
          set -euo pipefail
          PID="${INPUT_PRODUCT_ID:-$SECRET_PRODUCT_ID}"
          if [ -z "$PID" ]; then
            echo "::error::product_id input is blank AND the CONTABO_PRODUCT_ID secret is empty — nothing to resolve. Fail-closed."
            exit 1
          fi
          echo "PRODUCT_ID=$PID" >> "$GITHUB_ENV"
          if [ -n "$INPUT_PRODUCT_ID" ]; then
            echo "Resolved product_id=${PID} (from workflow input)."
          else
            echo "Resolved product_id=${PID} (from CONTABO_PRODUCT_ID secret)."
          fi

      # -----------------------------------------------------------------
      # 3. Tooling — kubeseal (same version/mechanism as rotate-sealed-secret.yml)
      #    and yq (structured YAML edits, never sed, so values-contabo.yaml's
      #    formatting/comments elsewhere in the file survive untouched).
      # -----------------------------------------------------------------
      - name: Install kubeseal
        run: |
          set -euo pipefail
          VER="0.27.1"
          curl -fsSL -o /tmp/ks.tgz \
            "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${VER}/kubeseal-${VER}-linux-amd64.tar.gz"
          tar -xzf /tmp/ks.tgz -C /tmp kubeseal
          sudo install -m0755 /tmp/kubeseal /usr/local/bin/kubeseal
          kubeseal --version

      - name: Install yq
        run: |
          set -euo pipefail
          YQ_VER="v4.44.3"
          curl -fsSL -o /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VER}/yq_linux_amd64"
          sudo install -m0755 /tmp/yq /usr/local/bin/yq
          yq --version

      # -----------------------------------------------------------------
      # 4. Contabo auth — OAuth2 password-grant against the real Contabo
      #    Keycloak realm token endpoint. Fail-closed on any non-200.
      #    NOTE: internal/contabo/client.go's token() posts JSON to
      #    "{authURL}/oauth/token" (a different shape/path than the real
      #    documented Contabo flow below) — that looks like a latent bug in
      #    the Go client (untested against the real API, only exercised via
      #    FAKE_CLOUD in tests). This step deliberately uses the real,
      #    documented Contabo OAuth2 flow (form-encoded password grant
      #    against the realm token endpoint) so the live gates below
      #    actually work — it is NOT a copy of client.go's request shape.
      #    Flagged here for whoever eventually fixes client.go.
      # -----------------------------------------------------------------
      - name: Contabo OAuth2 auth (masked, fail-closed)
        env:
          CONTABO_CLIENT_ID: ${{ secrets.CONTABO_CLIENT_ID }}
          CONTABO_CLIENT_SECRET: ${{ secrets.CONTABO_CLIENT_SECRET }}
          CONTABO_API_USER: ${{ secrets.CONTABO_API_USER }}
          CONTABO_API_PASSWORD: ${{ secrets.CONTABO_API_PASSWORD }}
        run: |
          set -euo pipefail
          for v in CONTABO_CLIENT_ID CONTABO_CLIENT_SECRET CONTABO_API_USER CONTABO_API_PASSWORD; do
            val="${!v:-}"
            [ -n "$val" ] || { echo "::error::$v secret is empty — cannot authenticate. Fail-closed."; exit 1; }
          done
          RESP="$(mktemp)"; trap 'rm -f "$RESP"' EXIT
          HTTP_CODE=$(curl -sS -o "$RESP" -w '%{http_code}' -X POST \
            "https://auth.contabo.com/auth/realms/contabo/protocol/openid-connect/token" \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode "client_id=${CONTABO_CLIENT_ID}" \
            --data-urlencode "client_secret=${CONTABO_CLIENT_SECRET}" \
            --data-urlencode "username=${CONTABO_API_USER}" \
            --data-urlencode "password=${CONTABO_API_PASSWORD}" \
            --data-urlencode "grant_type=password")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Contabo OAuth2 token request failed (HTTP $HTTP_CODE). Fail-closed — not proceeding without a valid token."
            exit 1
          fi
          TOKEN=$(jq -r '.access_token // empty' "$RESP")
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Contabo token response had no access_token. Fail-closed."
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          echo "CONTABO_TOKEN=${TOKEN}" >> "$GITHUB_ENV"
          echo "Contabo OAuth2 auth OK (token acquired, masked, never logged)."

      # -----------------------------------------------------------------
      # 5. GATE A — productSpecs match (definitive, non-destructive).
      # -----------------------------------------------------------------
      - name: GATE A — productSpecs match (live catalog vs template.go)
        run: |
          set -euo pipefail
          : "${CONTABO_TOKEN:?Contabo auth step must run first}"
          RESP="$(mktemp)"; trap 'rm -f "$RESP"' EXIT
          REQ_ID="$(openssl rand -hex 16 2>/dev/null || date +%s%N)"
          HTTP_CODE=$(curl -sS -o "$RESP" -w '%{http_code}' \
            -H "Authorization: Bearer ${CONTABO_TOKEN}" \
            -H "x-request-id: ${REQ_ID}" \
            "https://api.contabo.com/v1/pricing?productId=${PRODUCT_ID}")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::GATE A: Contabo pricing lookup for productId=${PRODUCT_ID} failed (HTTP $HTTP_CODE) via GET /v1/pricing. Fail-closed — refusing to proceed without a verified live spec."
            exit 1
          fi

          # Contabo's product/pricing payload should carry hardware specs on the
          # matched product entry. Field names follow Contabo's established
          # instance-resource convention (cpuCores/ramMb) with a couple of
          # defensive aliases, since the exact /v1/pricing schema for spec
          # fields is not published in a stable OpenAPI doc as of writing. If
          # NONE of these match, we FAIL CLOSED rather than guess — the raw
          # (non-secret, public-catalog) response is dumped to the job summary
          # so the field-candidate list below can be extended to match reality.
          LIVE_VCPU=$(jq -r --arg pid "$PRODUCT_ID" '
            [.. | objects | select((.productId? // .id? // empty) == $pid)][0] as $p
            | ($p.cpuCores // $p.vCpuCores // $p.specs.cpuCores // $p.cpu // empty)
          ' "$RESP")
          LIVE_RAM_MB=$(jq -r --arg pid "$PRODUCT_ID" '
            [.. | objects | select((.productId? // .id? // empty) == $pid)][0] as $p
            | ($p.ramMb // $p.memoryMb // $p.specs.ramMb // $p.ram // empty)
          ' "$RESP")
          if [ -z "$LIVE_VCPU" ] || [ -z "$LIVE_RAM_MB" ] || [ "$LIVE_VCPU" = "null" ] || [ "$LIVE_RAM_MB" = "null" ]; then
            {
              echo "### GATE A — FAILED (schema extraction)"
              echo "Could not extract cpuCores/ramMb for productId=\`${PRODUCT_ID}\` from the live Contabo pricing response. Raw matched entry (non-secret catalog data):"
              echo '```json'
              jq -c --arg pid "$PRODUCT_ID" '[.. | objects | select((.productId? // .id? // empty) == $pid)][0] // .' "$RESP" | head -c 4000
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::GATE A: could not extract cpuCores/ramMb for productId=${PRODUCT_ID}. Fail-closed — see the job summary for the raw response and extend the jq field candidates in this step."
            exit 1
          fi
          LIVE_RAM_GI=$(( (LIVE_RAM_MB + 1023) / 1024 ))
          echo "GATE A: live catalog for ${PRODUCT_ID}: vCPU=${LIVE_VCPU} RAM=${LIVE_RAM_GI}Gi (raw ${LIVE_RAM_MB}MB)"

          LINE=$(grep -E "\"${PRODUCT_ID}\":[[:space:]]*\{VCPU:" "$TEMPLATE_GO_PATH" || true)
          if [ -z "$LINE" ]; then
            echo "::error::GATE A: productId=${PRODUCT_ID} is NOT present in productSpecs (${TEMPLATE_GO_PATH}). Add it there first — an unlisted SKU makes NodeGroupTemplateNodeInfo refuse, and Cluster Autoscaler cannot scale from zero for it. Fail-closed."
            exit 1
          fi
          CODE_VCPU=$(echo "$LINE" | sed -E 's/.*VCPU:[[:space:]]*([0-9]+).*/\1/')
          CODE_RAM_GI=$(echo "$LINE" | sed -E 's/.*MemGi:[[:space:]]*([0-9]+).*/\1/')
          echo "GATE A: coded productSpecs[${PRODUCT_ID}] = vCPU=${CODE_VCPU} MemGi=${CODE_RAM_GI}"

          {
            echo "### GATE A — productSpecs match"
            echo "productId=\`${PRODUCT_ID}\`: live vCPU=${LIVE_VCPU} RAM=${LIVE_RAM_GI}Gi vs coded vCPU=${CODE_VCPU} RAM=${CODE_RAM_GI}Gi"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$LIVE_VCPU" != "$CODE_VCPU" ] || [ "$LIVE_RAM_GI" != "$CODE_RAM_GI" ]; then
            echo "::error::GATE A FAILED — live Contabo catalog for ${PRODUCT_ID} (vCPU=${LIVE_VCPU}, RAM=${LIVE_RAM_GI}Gi) does NOT match the coded productSpecs entry (vCPU=${CODE_VCPU}, RAM=${CODE_RAM_GI}Gi) in ${TEMPLATE_GO_PATH}. A mismatch here means Cluster Autoscaler's scale-from-zero simulation lies about node capacity. Fix productSpecs (or the product_id input) and re-run. Refusing to proceed."
            echo "GATE A RESULT: FAIL" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "GATE A RESULT: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "GATE A PASSED: live catalog matches coded productSpecs for ${PRODUCT_ID}."

      # -----------------------------------------------------------------
      # 6. GATE B — API sanity (non-destructive). imageId exists; a Contabo
      #    SSH key matching NODE_SSH_PUBLIC_KEY resolves. Both are read-only
      #    GETs — nothing is created.
      #
      #    WHY THIS GATE STOPS SHORT OF A REAL CANARY: the only way to fully
      #    prove the tag-assignment body shape (internal/contabo/client.go's
      #    POST /v1/compute/instances/{id}/tag-assignments with {"tags":
      #    [names]}) is to actually create+tag+list-by-tag+delete a real
      #    instance. Doing that here — inside the gate that runs even in
      #    dry_run — would create/destroy a real prod-account Contabo VPS on
      #    every dry run, which is the opposite of non-destructive. That real
      #    proof deliberately lives in ca-spike-test.yml instead, which runs
      #    ONLY after the cutover PR has merged and Argo has synced, and
      #    which has an automatic rollback if anything's wrong.
      # -----------------------------------------------------------------
      - name: GATE B — API sanity (image exists, SSH key resolves)
        id: gateb
        env:
          IMAGE_ID: ${{ secrets.CONTABO_IMAGE_ID }}
          NODE_SSH_PUBLIC_KEY: ${{ secrets.NODE_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          : "${CONTABO_TOKEN:?Contabo auth step must run first}"
          [ -n "$IMAGE_ID" ] || { echo "::error::CONTABO_IMAGE_ID secret is empty. Fail-closed."; exit 1; }
          [ -n "$NODE_SSH_PUBLIC_KEY" ] || { echo "::error::NODE_SSH_PUBLIC_KEY secret is empty. Fail-closed."; exit 1; }

          # --- image exists (read-only GET) ---------------------------------
          IMG_RESP="$(mktemp)"
          IMG_CODE=$(curl -sS -o "$IMG_RESP" -w '%{http_code}' \
            -H "Authorization: Bearer ${CONTABO_TOKEN}" \
            "https://api.contabo.com/v1/compute/images/${IMAGE_ID}")
          if [ "$IMG_CODE" != "200" ]; then
            echo "::error::GATE B: imageId=${IMAGE_ID} lookup failed (HTTP $IMG_CODE) via GET /v1/compute/images/{id}. Fail-closed — the image must exist before it's referenced in values-contabo.yaml."
            rm -f "$IMG_RESP"
            exit 1
          fi
          rm -f "$IMG_RESP"
          echo "GATE B: imageId=${IMAGE_ID} exists."

          # --- SSH key resolves (read-only list + local match, never creates) -
          KEYS_RESP="$(mktemp)"
          KEYS_CODE=$(curl -sS -o "$KEYS_RESP" -w '%{http_code}' \
            -H "Authorization: Bearer ${CONTABO_TOKEN}" \
            "https://api.contabo.com/v1/compute/ssh-keys")
          if [ "$KEYS_CODE" != "200" ]; then
            echo "::error::GATE B: SSH key list failed (HTTP $KEYS_CODE) via GET /v1/compute/ssh-keys. Fail-closed. NOTE: current Contabo docs reference a 'Secrets Management API' for SSH keys — if this consistently 404s, the endpoint may have moved to /v1/secrets; update this gate accordingly."
            rm -f "$KEYS_RESP"
            exit 1
          fi
          NORM_WANT=$(printf '%s' "$NODE_SSH_PUBLIC_KEY" | tr -d '[:space:]')
          SSH_KEY_ID=$(jq -r --arg want "$NORM_WANT" '
            (.data // .)[]?
            | select(((.value // .publicKey // .sshKey // "") | gsub("\\s"; "")) == $want)
            | (.secretId // .id // .sshKeyId // empty)
          ' "$KEYS_RESP" | head -1)
          rm -f "$KEYS_RESP"
          if [ -z "$SSH_KEY_ID" ]; then
            echo "::error::GATE B: no Contabo SSH key matches NODE_SSH_PUBLIC_KEY (compared against GET /v1/compute/ssh-keys). Fail-closed — the key must already be registered in Contabo before elastic nodes can be created with it."
            exit 1
          fi
          echo "ssh_key_id=${SSH_KEY_ID}" >> "$GITHUB_OUTPUT"
          echo "GATE B: SSH key resolved to id=${SSH_KEY_ID}."
          {
            echo "### GATE B — API sanity"
            echo "imageId=\`${IMAGE_ID}\` exists; SSH key resolved (id known, not printed here as a precaution)."
            echo "GATE B RESULT: PASS"
          } >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------
      # 7. Generate the fuzeinfra-ca-provider SealedSecret — same offline
      #    mechanism as rotate-sealed-secret.yml: kubeseal already installed
      #    above, scripts/seal-secret.sh builds the plaintext Secret manifest
      #    IN MEMORY (never on disk, never logged) and pipes it straight into
      #    kubeseal against FuzeInfra's published public cert (no cluster
      #    access needed to seal). Each secret value is staged to a 0600 temp
      #    file (never argv, never a log line) and passed as KEY=@file.
      # -----------------------------------------------------------------
      - name: Generate the fuzeinfra-ca-provider SealedSecret (offline, public cert)
        env:
          CONTABO_CLIENT_ID: ${{ secrets.CONTABO_CLIENT_ID }}
          CONTABO_CLIENT_SECRET: ${{ secrets.CONTABO_CLIENT_SECRET }}
          CONTABO_API_USER: ${{ secrets.CONTABO_API_USER }}
          CONTABO_API_PASSWORD: ${{ secrets.CONTABO_API_PASSWORD }}
          K3S_NODE_TOKEN: ${{ secrets.K3S_NODE_TOKEN }}
          SSH_KEY_ID: ${{ steps.gateb.outputs.ssh_key_id }}
        run: |
          set -euo pipefail
          umask 077
          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "$TMPDIR"' EXIT
          printf '%s' "$CONTABO_CLIENT_ID"     > "$TMPDIR/CONTABO_CLIENT_ID"
          printf '%s' "$CONTABO_CLIENT_SECRET" > "$TMPDIR/CONTABO_CLIENT_SECRET"
          printf '%s' "$CONTABO_API_USER"      > "$TMPDIR/CONTABO_API_USER"
          printf '%s' "$CONTABO_API_PASSWORD"  > "$TMPDIR/CONTABO_API_PASSWORD"
          printf '%s' "$K3S_NODE_TOKEN"        > "$TMPDIR/K3S_NODE_TOKEN"
          printf '%s' "$SSH_KEY_ID"            > "$TMPDIR/SSH_KEY_ID"
          mkdir -p "$(dirname "$SEALED_SECRET_PATH")"
          bash scripts/seal-secret.sh "${NAMESPACE}/${SECRET_NAME}" \
            "CONTABO_CLIENT_ID=@${TMPDIR}/CONTABO_CLIENT_ID" \
            "CONTABO_CLIENT_SECRET=@${TMPDIR}/CONTABO_CLIENT_SECRET" \
            "CONTABO_API_USER=@${TMPDIR}/CONTABO_API_USER" \
            "CONTABO_API_PASSWORD=@${TMPDIR}/CONTABO_API_PASSWORD" \
            "K3S_NODE_TOKEN=@${TMPDIR}/K3S_NODE_TOKEN" \
            "SSH_KEY_ID=@${TMPDIR}/SSH_KEY_ID" \
            --out "$SEALED_SECRET_PATH"
          echo "Sealed secret written to ${SEALED_SECRET_PATH} (ciphertext only — safe to commit)."

      # -----------------------------------------------------------------
      # 8. Fill clusterAutoscaler.provider.* values via yq (structured edit,
      #    never sed — the file has extensive comments elsewhere that must
      #    survive untouched). Shell values are passed through env vars and
      #    read in the yq expression via strenv(), never interpolated
      #    directly into the expression string, to avoid injection.
      # -----------------------------------------------------------------
      - name: Fill clusterAutoscaler.provider values (productId/imageId/k3sServerUrl/userDataTemplateB64)
        env:
          IMAGE_ID: ${{ secrets.CONTABO_IMAGE_ID }}
          K3S_SERVER_URL_RAW: ${{ secrets.K3S_SERVER_URL }}
        run: |
          set -euo pipefail
          [ -n "$K3S_SERVER_URL_RAW" ] || { echo "::error::K3S_SERVER_URL secret is empty. Fail-closed."; exit 1; }

          # Normalize whatever form K3S_SERVER_URL is stored in (bare host,
          # host:port, or a full https://host[:port] URL) to the canonical
          # https://<host>:6443 the k3s server URL new elastic nodes join.
          HOST=$(printf '%s' "$K3S_SERVER_URL_RAW" | sed -E 's#^https?://##; s#:[0-9]+$##; s#/.*$##')
          K3S_URL="https://${HOST}:6443"

          USERDATA_B64=$(base64 -w0 "$USERDATA_TEMPLATE_PATH")
          # Sanity round-trip (mirrors the runbook's manual check) before writing.
          if ! diff -q <(printf '%s' "$USERDATA_B64" | base64 -d) "$USERDATA_TEMPLATE_PATH" >/dev/null; then
            echo "::error::base64 round-trip of ${USERDATA_TEMPLATE_PATH} did not match — refusing to write a corrupted userDataTemplateB64. Fail-closed."
            exit 1
          fi

          PRODUCT_ID="$PRODUCT_ID" IMAGE_ID="$IMAGE_ID" K3S_URL="$K3S_URL" USERDATA_B64="$USERDATA_B64" \
            yq -i '
              .clusterAutoscaler.provider.productId = strenv(PRODUCT_ID) |
              .clusterAutoscaler.provider.imageId = strenv(IMAGE_ID) |
              .clusterAutoscaler.provider.k3sServerUrl = strenv(K3S_URL) |
              .clusterAutoscaler.provider.userDataTemplateB64 = strenv(USERDATA_B64)
            ' "$VALUES_PATH"
          echo "Filled clusterAutoscaler.provider.{productId,imageId,k3sServerUrl,userDataTemplateB64} in ${VALUES_PATH} (k3sServerUrl=${K3S_URL})."

      # -----------------------------------------------------------------
      # 9. Flip the two enabled gates together, exactly as the runbook
      #    requires ("in one PR ... together").
      # -----------------------------------------------------------------
      - name: Flip enabled flags (clusterAutoscaler + overprovisioning)
        run: |
          set -euo pipefail
          yq -i '
            .clusterAutoscaler.enabled = true |
            .overprovisioning.enabled = true
          ' "$VALUES_PATH"
          echo "Flipped clusterAutoscaler.enabled=true, overprovisioning.enabled=true in ${VALUES_PATH}."
          {
            echo "### Rendered values-contabo.yaml diff (clusterAutoscaler / overprovisioning only)"
            echo '```diff'
            git --no-pager diff -- "$VALUES_PATH" | head -c 6000
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------
      # 10a. dry_run == true: render only, upload as an artifact, no PR.
      # -----------------------------------------------------------------
      - name: dry_run — stage rendered files for artifact upload
        if: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/ca-cutover-dry-run
          cp "$SEALED_SECRET_PATH" /tmp/ca-cutover-dry-run/
          cp "$VALUES_PATH" /tmp/ca-cutover-dry-run/
          git --no-pager diff -- "$VALUES_PATH" > /tmp/ca-cutover-dry-run/values-contabo.diff || true
          echo "DRY RUN: rendered SealedSecret + values-contabo.yaml only — no PR opened. Re-run with dry_run=false (and confirm=CUTOVER) to open the real cutover PR." | tee -a "$GITHUB_STEP_SUMMARY"

      - name: dry_run — upload artifact
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: ca-cutover-dry-run-${{ github.run_id }}
          path: /tmp/ca-cutover-dry-run
          retention-days: 14
          if-no-files-found: error

      # -----------------------------------------------------------------
      # 10b. dry_run == false: commit + push + open the real cutover PR.
      #      NEVER pushes to main directly — auto-merge.yml + the required
      #      status checks own the actual merge (see header comment).
      # -----------------------------------------------------------------
      - name: Open the cutover PR (real run only)
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GH_TF_TOKEN || secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          BRANCH="automated/ca-cutover-${RUN_ID}"
          git config user.name "FuzeInfra CA Cutover"
          git config user.email "ca-cutover@fuzeinfra"
          git checkout -b "$BRANCH"
          git add "$SEALED_SECRET_PATH" "$VALUES_PATH"
          {
            printf 'feat(ca): prod cutover — enable autoscaler stack (automated, gated)\n\n'
            printf 'Automated, gated Contabo cluster-autoscaler prod cutover (Task 18 runbook\n'
            printf 'docs/runbooks/contabo-autoscaling-cutover.md steps 3-6), triggered by\n'
            printf '@%s via workflow_dispatch (run %s).\n\n' "$ACTOR" "$RUN_URL"
            printf 'GATE A (productSpecs match) and GATE B (image + SSH key sanity) both\n'
            printf 'passed against the live Contabo API before this commit was created.\n\n'
            printf 'Co-Authored-By: FuzeInfra CA Cutover Workflow <ca-cutover@fuzeinfra>\n'
            printf 'Cutover-Run-Id: %s\n' "$RUN_ID"
          } > /tmp/commit_msg.txt
          git commit -F /tmp/commit_msg.txt
          git push origin "$BRANCH"
          # shellcheck disable=SC2016  # backticks below are literal markdown code-formatting, not command substitution
          {
            printf '%s\n\n' "Automated, GATED prod cutover for the Contabo cluster-autoscaler (docs/runbooks/contabo-autoscaling-cutover.md, steps 3-6)."
            printf -- '- Triggered by @%s — [run %s](%s)\n' "$ACTOR" "$RUN_ID" "$RUN_URL"
            printf -- '- **GATE A** (productSpecs match): live Contabo catalog spec for the resolved product_id matched the coded entry in `internal/provider/template.go` — PASS.\n'
            printf -- '- **GATE B** (API sanity): imageId exists; SSH key resolved from `NODE_SSH_PUBLIC_KEY` — PASS.\n'
            printf -- "- Adds/updates \`%s\` (ciphertext only — sealed offline against FuzeInfra's published public cert, same mechanism as rotate-sealed-secret.yml).\n" "$SEALED_SECRET_PATH"
            printf -- '- Fills `clusterAutoscaler.provider.{productId,imageId,k3sServerUrl,userDataTemplateB64}` and flips `clusterAutoscaler.enabled` + `overprovisioning.enabled` to `true` in `%s`.\n\n' "$VALUES_PATH"
            printf '%s\n' "Merging this PR is what actually turns autoscaling ON in prod (Argo selfHeal syncs on merge to main). Run ca-spike-test.yml AFTER Argo syncs cleanly to validate end-to-end (runbook step 7, GATE B's own comment explains why that real canary doesn't happen here). This repo auto-merges on green (auto-merge.yml, admin bypass) — hold/close this PR first if the cutover should wait for a maintenance window."
          } > /tmp/pr_body.md
          gh pr create --base main --head "$BRANCH" \
            --title "feat(ca): prod cutover — enable Contabo cluster-autoscaler (gated, run ${RUN_ID})" \
            --body-file /tmp/pr_body.md --label "ca-cutover" 2>/dev/null \
            || gh pr create --base main --head "$BRANCH" \
                 --title "feat(ca): prod cutover — enable Contabo cluster-autoscaler (gated, run ${RUN_ID})" \
                 --body-file /tmp/pr_body.md
          echo "Cutover PR opened on branch ${BRANCH}." >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------
      # 11. Final summary.
      # -----------------------------------------------------------------
      - name: Summarize
        if: always()
        run: |
          {
            echo "### ca-cutover — run ${{ github.run_id }}"
            echo "- product_id: \`${PRODUCT_ID:-<unresolved>}\`"
            echo "- dry_run: \`${{ inputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
