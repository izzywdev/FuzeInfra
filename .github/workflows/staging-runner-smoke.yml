name: staging-runner-smoke
# Verifies the shared Contabo ARC 'staging' runner fetches + runs jobs. ARC scale
# sets are targeted by the SCALE-SET NAME (runs-on: staging), NOT the classic
# [self-hosted, staging]. Dispatch before moving any gate off ubuntu-latest.
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  smoke:
    runs-on: staging
    timeout-minutes: 5
    steps:
      - name: Prove we ran on the staging VPS runner
        run: |
          echo "runner name : $RUNNER_NAME"
          echo "runner os   : $RUNNER_OS / $RUNNER_ARCH"
          echo "hostname    : $(hostname)"
          echo "staging runner OK"
