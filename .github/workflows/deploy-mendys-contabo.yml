name: Deploy MendysRobotics – Contabo

# FuzeInfra owns infrastructure EXECUTION for MendysRobotics. This pipeline
# provisions the dedicated Mendys Contabo VPS (terraform/mendys-contabo) and/or
# triggers ArgoCD to sync the Mendys apps declared in izzywdev/MendysRobotics.
#
# Two ways in:
#   - workflow_dispatch (mode = provision | sync)
#   - repository_dispatch [mendys-image-updated] → forced to sync-only
#     (MendysRobotics CI fires this after pushing a new image so prod rolls out
#      without a full terraform run).
on:
  repository_dispatch:
    types: [mendys-image-updated]
  workflow_dispatch:
    inputs:
      mode:
        description: 'provision (terraform + bootstrap) or sync (argocd sync only)'
        type: choice
        required: true
        default: sync
        options:
          - provision
          - sync

concurrency:
  group: deploy-mendys-contabo
  cancel-in-progress: false

env:
  TF_WORKDIR: terraform/mendys-contabo

jobs:
  # -----------------------------------------------------------------------
  # Decide which path to take. repository_dispatch is ALWAYS sync-only.
  # -----------------------------------------------------------------------
  resolve-mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.pick.outputs.mode }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "mode=sync" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          fi

  # -----------------------------------------------------------------------
  # PROVISION — terraform apply (VPS + k3s + ingress-nginx + cert-manager +
  # ArgoCD bootstrap). Only runs for an explicit workflow_dispatch provision.
  # -----------------------------------------------------------------------
  provision:
    needs: resolve-mode
    if: needs.resolve-mode.outputs.mode == 'provision'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform/mendys-contabo
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
      TF_VAR_contabo_client_id: ${{ secrets.CONTABO_CLIENT_ID }}
      TF_VAR_contabo_client_secret: ${{ secrets.CONTABO_CLIENT_SECRET }}
      TF_VAR_contabo_api_user: ${{ secrets.CONTABO_API_USER }}
      TF_VAR_contabo_api_password: ${{ secrets.CONTABO_API_PASSWORD }}
      TF_VAR_image_id: ${{ secrets.CONTABO_IMAGE_ID }}
      TF_VAR_product_id: ${{ secrets.CONTABO_PRODUCT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.NODE_SSH_PUBLIC_KEY }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: "3784bf88809ac135888856ab6183db00"
      TF_VAR_letsencrypt_email: ${{ vars.MENDYS_LETSENCRYPT_EMAIL || 'izzy.weinberg@gmail.com' }}
      # gh CLI token for null_resource.set_github_secret local-exec (matches FuzeInfra terraform/contabo pattern)
      TF_VAR_github_token: ${{ secrets.GH_TF_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TF_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      # The SSH private key is used only for kubeconfig extraction after apply
      # (null_resource.extract_kubeconfig local-exec). The full k3s + ArgoCD
      # bootstrap is in cloud-init (user_data) — no remote-exec runs from CI.
      - name: Load SSH private key
        run: |
          install -d -m 700 ~/.ssh
          echo "${{ secrets.NODE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "TF_VAR_ssh_private_key_path=$HOME/.ssh/id_ed25519" >> "$GITHUB_ENV"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        # null_resource.set_github_secret (in provisioning.tf) stores the kubeconfig
        # as MENDYS_KUBECONFIG via gh CLI local-exec — matching FuzeInfra's own
        # terraform/contabo/secrets.tf pattern. No post-apply step needed here.
        run: terraform apply -input=false -auto-approve tfplan

  # -----------------------------------------------------------------------
  # SYNC — register the bootstrap app + trigger an ArgoCD sync of all three
  # Mendys apps. Runs for workflow_dispatch sync OR repository_dispatch.
  # -----------------------------------------------------------------------
  sync:
    needs: resolve-mode
    if: needs.resolve-mode.outputs.mode == 'sync'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          if [ -z "${{ secrets.MENDYS_KUBECONFIG }}" ]; then
            echo "::error::MENDYS_KUBECONFIG secret not set — run the provision mode first."
            exit 1
          fi
          echo "${{ secrets.MENDYS_KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Install kubectl + argocd CLI
        run: |
          curl -sSLo /usr/local/bin/kubectl "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl
          curl -sSLo /usr/local/bin/argocd "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

      # Keep the bootstrap app registered (repo is source of truth — survives a
      # VPS rebuild where terraform applied it only on first provision).
      - name: Register bootstrap Application
        run: |
          kubectl apply -f argocd/applications/mendys-robotics-bootstrap.yaml \
            && echo "registered mendys-robotics-bootstrap" \
            || echo "::warning::failed to register bootstrap app"

      - name: Wait for argocd-server rollout
        run: kubectl -n argocd rollout status deployment/argocd-server --timeout=180s

      - name: ArgoCD login
        run: |
          kubectl -n argocd port-forward svc/argocd-server 8080:443 >/tmp/pf.log 2>&1 &
          for i in $(seq 1 20); do nc -z localhost 8080 && break; sleep 2; done
          argocd login localhost:8080 \
            --auth-token "${{ secrets.MENDYS_ARGOCD_AUTH_TOKEN }}" \
            --insecure --grpc-web

      - name: Sync Mendys apps
        run: |
          # Sync the bootstrap root first so child apps exist, then each child.
          for app in mendys-robotics-bootstrap mendys-platform mendys-wp fuzeinfra; do
            argocd app sync "$app" --grpc-web --timeout 300 \
              && echo "synced $app" \
              || echo "::warning::sync failed for $app (may not exist yet)"
          done

      # Smoke tests are NON-BLOCKING — on first provision the images / ingress
      # may not exist yet. Always exit 0; surface failures as warnings only.
      - name: Smoke test (non-blocking)
        run: |
          for host in live.mendysrobotics.com api.live.mendysrobotics.com marketplace.mendysrobotics.com wp.mendysrobotics.com; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "https://$host" || echo 000)
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              echo "OK   $host ($code)"
            else
              echo "::warning::smoke test for $host returned $code (expected on first provision)"
            fi
          done
          exit 0
