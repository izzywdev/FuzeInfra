name: ca-delete-instance
on:
  workflow_dispatch:
    inputs:
      instance_id:
        description: 'Contabo instance id to DELETE (e.g. an orphaned fuzeinfra-elastic node)'
        required: true
        default: ''
      confirm:
        description: 'Type DELETE to confirm'
        required: true
        default: ''
permissions:
  contents: read
jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Interlock
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          [ "$CONFIRM" = "DELETE" ] || { echo "::error::confirm must be the literal DELETE"; exit 1; }
      - name: Auth + delete instance
        env:
          CID: ${{ secrets.CONTABO_CLIENT_ID }}
          CSEC: ${{ secrets.CONTABO_CLIENT_SECRET }}
          CUSER: ${{ secrets.CONTABO_API_USER }}
          CPASS: ${{ secrets.CONTABO_API_PASSWORD }}
          IID: ${{ inputs.instance_id }}
        run: |
          set -euo pipefail
          [ -n "$IID" ] || { echo "::error::instance_id required"; exit 1; }
          RESP=$(mktemp)
          HTTP=$(curl -sS -o "$RESP" -w '%{http_code}' -X POST \
            "https://auth.contabo.com/auth/realms/contabo/protocol/openid-connect/token" \
            --data-urlencode "client_id=$CID" --data-urlencode "client_secret=$CSEC" \
            --data-urlencode "username=$CUSER" --data-urlencode "password=$CPASS" \
            --data-urlencode "grant_type=password")
          [ "$HTTP" = "200" ] || { echo "::error::Contabo auth failed (HTTP $HTTP)"; exit 1; }
          TOK=$(jq -r '.access_token // empty' "$RESP"); echo "::add-mask::$TOK"
          [ -n "$TOK" ] || { echo "::error::no access_token"; exit 1; }
          echo "Target instance (non-secret):"
          curl -sS -H "Authorization: Bearer $TOK" -H "x-request-id: $(cat /proc/sys/kernel/random/uuid)" \
            "https://api.contabo.com/v1/compute/instances/${IID}" | jq -r '.data[0] | "id=\(.instanceId) name=\(.displayName) status=\(.status)"' || true
          DCODE=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE \
            -H "Authorization: Bearer $TOK" -H "x-request-id: $(cat /proc/sys/kernel/random/uuid)" \
            "https://api.contabo.com/v1/compute/instances/${IID}")
          echo "DELETE instance ${IID} -> HTTP ${DCODE}"
          case "$DCODE" in
            200|204) echo "Deleted OK." ;;
            404) echo "::warning::instance already gone (404)"; ;;
            *) echo "::error::delete failed (HTTP $DCODE)"; exit 1 ;;
          esac
