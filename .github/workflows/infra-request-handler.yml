# ===========================================================================
# infra-request-handler
# ===========================================================================
# FuzeInfra is the SOLE credential holder. Consumer repos (FuzeFront, etc.)
# *declare* infra needs in git and dispatch `repository_dispatch
# (event_type: infra-request)` at this repo; this workflow reconciles them.
#
# This handler is TERRAFORM-ONLY. It reconciles a consumer's deploy/terraform —
# node (VPS) provisioning and, optionally, product DNS via the generic
# modules/cloudflare-dns module — and nothing else. ArgoCD owns the consumer's
# argo manifests after the one-time initial registration (see argocd-register.yml),
# so an ongoing argo-manifest edit must never reach this handler — and if one does
# dispatch (no `requests` payload) it is a clean no-op, never a gated PR.
#
# Flow:
#   1. Check out THIS repo (module + whitelist + scripts) and the REQUESTING
#      repo's deploy/terraform/. If client_payload.terraform_bundle is present
#      (private repos), extract inline — no cross-repo token needed.
#   2. Validate the request against config/infra-request-whitelist.json, which
#      yields a decision: skip | apply | gate.
#   3. skip   -> no infra `requests` in the payload; do nothing and exit.
#   4. apply  -> request is whitelisted: terraform apply (FuzeInfra creds + k3s
#      token + remote backend), then label the joined nodes.
#   5. gate   -> valid request, not whitelisted: open a PR carrying `terraform
#      plan` for manual approval. Never auto-apply.
#
# Required repo secrets (FuzeInfra CI only):
#   CONTABO_CLIENT_ID, CONTABO_CLIENT_SECRET, CONTABO_API_USER, CONTABO_API_PASSWORD
#   K3S_SERVER_URL, K3S_NODE_TOKEN
#   CONTABO_IMAGE_ID, NODE_SSH_PUBLIC_KEY
#   KUBE_CONFIG                  # base64 kubeconfig for the k3s server (node labeling backstop)
#   CLOUDFLARE_API_TOKEN         # DNS:Edit on every family zone; injected as cloudflare_dns_token
#                                # for consumers that declare the cloudflare-dns module (node-only
#                                # consumers ignore it — an undeclared tfvar is a harmless warning)
#   TF_STATE_* backend creds     # for the FuzeInfra-owned remote TF state backend
#
# Dispatch client_payload shape (sent by the consumer's infra-dispatch.yml):
#   { "repo": "izzywdev/FuzeFront", "ref": "main",
#     "requests": [ {name, product_id, region, role, labels}, ... ],
#     "terraform_bundle": "<base64-gzipped-tar-of-deploy/terraform>"  # optional; for private repos
#   }

name: infra-request-handler

on:
  repository_dispatch:
    types: [infra-request]

permissions:
  contents: write          # commit the PR branch for the gated path
  pull-requests: write     # open the gated PR

concurrency:
  # Serialize reconciliation per requesting repo so two dispatches don't race on
  # the same TF state.
  group: infra-request-${{ github.event.client_payload.repo }}
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: staging
    # AWS creds for the S3 remote backend — needed by EVERY terraform step
    # (init/plan/apply), not just init. Without these on the plan/apply steps the
    # S3 backend can't refresh state ("No valid credential sources found"), which
    # made every node-provisioning request's plan fail (so no VPS was ever created).
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
    steps:
      - name: Check out FuzeInfra (module + whitelist + scripts)
        uses: actions/checkout@v7
        with:
          path: fuzeinfra

      # ── Terraform source: inline bundle (private repos) OR git checkout ──────
      - name: Extract inline terraform bundle (repository_dispatch with terraform_bundle)
        if: github.event.client_payload.terraform_bundle != ''
        run: |
          mkdir -p consumer/deploy/terraform
          echo "${{ github.event.client_payload.terraform_bundle }}" \
            | base64 -d \
            | tar -xz -C consumer/deploy/terraform --strip-components=0
          echo "Extracted inline terraform bundle from ${{ github.event.client_payload.repo }}"

      - name: Check out requesting repo (deploy/terraform only)
        if: github.event.client_payload.terraform_bundle == ''
        uses: actions/checkout@v7
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: ${{ github.event.client_payload.ref || 'main' }}
          path: consumer
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            deploy/terraform

      - name: Write dispatch payload to file
        id: payload
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          printf '%s' "$PAYLOAD" > request.json
          echo "Requesting repo: ${{ github.event.client_payload.repo }}"
          # Strip terraform_bundle from the logged payload (too large to log usefully)
          python3 -c "import json,sys; p=json.load(open('request.json')); p.pop('terraform_bundle',None); print(json.dumps(p,indent=2))"

      - name: Validate against auto-apply whitelist
        id: validate
        run: |
          python3 fuzeinfra/scripts-tools/validate_infra_request.py \
            --whitelist fuzeinfra/config/infra-request-whitelist.json \
            --request request.json \
            --repo "${{ github.event.client_payload.repo }}" \
            --github-output "$GITHUB_OUTPUT"

      # Not an infra-request (no `requests` payload) -> clean no-op. This is the
      # backstop that keeps argo-only/unrelated dispatches from manufacturing a
      # gated PR. Every terraform step below is gated on decision != 'skip'.
      - name: No-op (not an infra-request)
        if: steps.validate.outputs.decision == 'skip'
        run: |
          echo "Decision: skip — ${{ steps.validate.outputs.reasons }}"
          echo "Nothing to reconcile. ArgoCD owns argo manifests; this handler is Terraform-only."

      - name: Set up Terraform
        if: steps.validate.outputs.decision != 'skip'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      # --- Pass the node requests + injected secrets to Terraform -------------
      - name: Generate handler tfvars
        if: steps.validate.outputs.decision != 'skip'
        working-directory: consumer/deploy/terraform
        env:
          REQUESTS_JSON: ${{ toJSON(github.event.client_payload.requests) }}
        run: |
          # Consumer declares `requests` (+ optionally the cloudflare-dns module);
          # FuzeInfra injects the credentials/join params + the Cloudflare DNS token
          # from CI secrets via an auto.tfvars the consumer never sees. A consumer
          # that doesn't declare cloudflare_dns_token just ignores it (harmless
          # "undeclared variable" warning).
          cat > handler.auto.tfvars.json <<JSON
          {
            "requests": ${REQUESTS_JSON},
            "contabo_client_id": "${{ secrets.CONTABO_CLIENT_ID }}",
            "contabo_client_secret": "${{ secrets.CONTABO_CLIENT_SECRET }}",
            "contabo_api_user": "${{ secrets.CONTABO_API_USER }}",
            "contabo_api_password": "${{ secrets.CONTABO_API_PASSWORD }}",
            "k3s_server_url": "${{ secrets.K3S_SERVER_URL }}",
            "k3s_node_token": "${{ secrets.K3S_NODE_TOKEN }}",
            "image_id": "${{ secrets.CONTABO_IMAGE_ID }}",
            "ssh_public_key": "${{ secrets.NODE_SSH_PUBLIC_KEY }}",
            "cloudflare_dns_token": "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          }
          JSON

      - name: Terraform init (FuzeInfra-owned remote backend)
        if: steps.validate.outputs.decision != 'skip'
        working-directory: consumer/deploy/terraform
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=infra-requests/${{ github.event.client_payload.repo }}.tfstate" \
            -backend-config="region=${TF_STATE_REGION}"

      # =====================================================================
      # WHITELISTED -> auto-apply
      # =====================================================================
      - name: Terraform apply (auto)
        if: steps.validate.outputs.decision == 'apply'
        working-directory: consumer/deploy/terraform
        run: terraform apply -auto-approve -input=false

      - name: Configure kubectl
        if: steps.validate.outputs.decision == 'apply'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Label joined nodes
        if: steps.validate.outputs.decision == 'apply'
        env:
          REQUESTS_JSON: ${{ toJSON(github.event.client_payload.requests) }}
        run: |
          # cloud-init labels nodes on join; this is a reconciling backstop in
          # case a node registered before its --node-label flags applied.
          echo "$REQUESTS_JSON" | python3 -c '
          import json,sys,subprocess,time
          for r in json.load(sys.stdin):
              name, role = r["name"], r.get("role","workload")
              for _ in range(30):
                  if subprocess.run(["kubectl","get","node",name]).returncode == 0:
                      break
                  time.sleep(10)
              labels = ["node-role=%s"%role, "fuzeinfra.io/role=%s"%role]
              for k,v in (r.get("labels") or {}).items():
                  labels.append("%s=%s"%(k,v))
              subprocess.run(["kubectl","label","node",name,*labels,"--overwrite"],check=True)
          '

      # NOTE: ArgoCD registration is intentionally NOT done here. A repo is
      # registered into the cluster's ArgoCD exactly once via the separate
      # argocd-register.yml (workflow_dispatch or repository_dispatch argocd-register);
      # thereafter ArgoCD self-syncs the consumer's deploy/argocd manifests.
      # This handler stays Terraform-only.

      # =====================================================================
      # GATE -> PR with terraform plan (manual approval)
      # =====================================================================
      - name: Terraform plan (gated)
        if: steps.validate.outputs.decision == 'gate'
        working-directory: consumer/deploy/terraform
        run: |
          terraform plan -input=false -no-color -out=tfplan | tee plan.txt
          terraform show -no-color tfplan > plan-show.txt || true

      - name: Open gated PR for manual approval
        if: steps.validate.outputs.decision == 'gate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd fuzeinfra
          REPO="${{ github.event.client_payload.repo }}"
          SLUG="$(echo "$REPO" | tr '/' '-')"
          BRANCH="infra-request/${SLUG}-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          mkdir -p infra-requests
          cp ../request.json "infra-requests/${SLUG}.json"
          cp ../consumer/deploy/terraform/plan.txt "infra-requests/${SLUG}.plan.txt" || true
          git add infra-requests
          git commit -m "infra-request: gated plan for ${REPO} (manual approval required)"
          git push origin "$BRANCH"
          {
            echo "Automated infra-request from **${REPO}** did NOT match the auto-apply whitelist."
            echo ""
            echo "**Validation reasons:** ${{ steps.validate.outputs.reasons }}"
            echo ""
            echo "Review the \`terraform plan\` below. **Merging this PR IS the approval** — it"
            echo "re-dispatches the request as approved and the handler APPLIES it (provisioning"
            echo "real infrastructure). Do not merge if unexpected. (These PRs are excluded from"
            echo "auto-merge precisely so a human approves them.)"
            echo ""
            echo '```'
            cat ../consumer/deploy/terraform/plan.txt || true
            echo '```'
          } > pr-body.md
          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$BRANCH" \
            --title "infra-request (gated): ${REPO}" \
            --body-file pr-body.md
