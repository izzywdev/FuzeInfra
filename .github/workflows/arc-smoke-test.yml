name: arc-smoke-test
on: [workflow_dispatch]
permissions:
  contents: read
jobs:
  smoke:
    runs-on: staging
    steps:
      - name: confirm runner
        run: |
          echo "=== Runner info ==="
          echo "hostname: $(hostname)"
          echo "whoami: $(whoami)"
          echo "GITHUB_RUNNER_NAME: ${RUNNER_NAME}"
          echo "GITHUB_RUN_ID: ${GITHUB_RUN_ID}"
          echo "GITHUB_WORKFLOW: ${GITHUB_WORKFLOW}"
          echo "date: $(date)"
          uname -a
