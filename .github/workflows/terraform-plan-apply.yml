# ===========================================================================
# terraform-plan-apply  —  merge-to-apply CD for FuzeInfra's OWN terraform/
# ===========================================================================
# The PR review IS the apply approval. There is no separate post-merge gate.
#
#   • Pull request touching terraform/**  → `terraform plan -out=tfplan`,
#     the plan is posted as a PR comment (visible diff) AND uploaded as an
#     artifact keyed by the PR head SHA. This job is a REQUIRED status check.
#   • Push to main (i.e. the PR merged) → download the EXACT saved plan that
#     was reviewed and `terraform apply tfplan`. We never re-plan-and-apply
#     blind. Terraform refuses a stale saved plan, so if state drifted since
#     review the apply fails loudly instead of doing something unreviewed.
#
# Safety:
#   • apply runs ONLY on push to main (never on PRs, never on forks).
#   • remote state + DynamoDB locking (see terraform/*/backend.tf) serialize
#     concurrent applies.
#   • least-privilege creds are injected from CI secrets as TF_VAR_* at apply
#     time; the Cloudflare token should be scoped to the zone, Contabo creds
#     to the project.
#
# ---------------------------------------------------------------------------
# This workflow is ACTIVE (.github/workflows/) and DEADLOCK-SAFE: the `plan` job
# always runs (no trigger paths filter) and self-filters on terraform/** via
# dorny/paths-filter, so non-terraform PRs pass it instantly. It is therefore
# SAFE to make `plan` a required status check on main — required is exactly what
# guarantees no apply touches infrastructure without a reviewed plan. (The apply
# job still triggers only on push to main touching terraform/**.)
# ---------------------------------------------------------------------------
#
# Required repo configuration:
#   Variables (Settings → Variables):
#     TF_ROOT                  # root module to manage, default terraform/contabo
#   Secrets (Settings → Secrets):
#     TF_STATE_BUCKET, TF_STATE_REGION, TF_STATE_LOCK_TABLE
#     TF_STATE_ACCESS_KEY_ID, TF_STATE_SECRET_ACCESS_KEY   # S3+DynamoDB backend
#     CONTABO_CLIENT_ID, CONTABO_CLIENT_SECRET, CONTABO_API_USER, CONTABO_API_PASSWORD
#     CONTABO_IMAGE_ID, CONTABO_PRODUCT_ID, NODE_SSH_PUBLIC_KEY
#     CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_ZONE_ID
#     GH_TF_TOKEN              # token TF uses to write the KUBE_CONFIG secret etc.

name: terraform-plan-apply

on:
  # DEADLOCK-SAFE: the plan job is a REQUIRED status check, so it must report a
  # conclusion on EVERY PR to main — therefore NO paths filter here. The job
  # self-filters on terraform/** internally (dorny/paths-filter): PRs that don't
  # touch terraform pass instantly, terraform PRs get a real plan. A paths filter
  # here would leave the required check pending forever on non-terraform PRs.
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths: ["terraform/**"]   # apply only when terraform actually changed

permissions:
  contents: read
  pull-requests: write   # post the plan comment

env:
  TF_ROOT: ${{ vars.TF_ROOT || 'terraform/contabo' }}
  # Must be >= the version that wrote the live state. The state was applied with
  # 1.15.x, so an older CLI (1.6.6) mis-plans random_bytes/tunnel as a phantom
  # secret rotation. Keep this in lockstep with whatever applies the state.
  TERRAFORM_VERSION: "1.15.6"
  # AWS creds for the S3/DynamoDB backend (used by every `terraform init`).
  AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
  # Provider inputs injected as TF_VAR_* (least-privilege, scoped creds).
  TF_VAR_contabo_client_id: ${{ secrets.CONTABO_CLIENT_ID }}
  TF_VAR_contabo_client_secret: ${{ secrets.CONTABO_CLIENT_SECRET }}
  TF_VAR_contabo_api_user: ${{ secrets.CONTABO_API_USER }}
  TF_VAR_contabo_api_password: ${{ secrets.CONTABO_API_PASSWORD }}
  TF_VAR_image_id: ${{ secrets.CONTABO_IMAGE_ID }}
  TF_VAR_product_id: ${{ secrets.CONTABO_PRODUCT_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.NODE_SSH_PUBLIC_KEY }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_github_token: ${{ secrets.GH_TF_TOKEN }}
  # crit-alert bridge token — MUST be wired, else the plan sees crit_bridge_token=""
  # and DESTROYS the crit-bridge CF worker/route/secret (count gates on it != "").
  TF_VAR_crit_bridge_token: ${{ secrets.CRIT_BRIDGE_TOKEN }}

jobs:
  # =========================================================================
  # PLAN — on every PR. Posts a visible diff; saves the exact plan for apply.
  # =========================================================================
  plan:
    if: github.event_name == 'pull_request'
    name: plan (${{ vars.TF_ROOT || 'terraform/contabo' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Deadlock-safe self-filter: this job ALWAYS runs (no trigger paths filter)
      # so it can be a required check, but only does real work when terraform/**
      # actually changed.
      - name: Detect terraform/** changes
        id: detect
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            tf:
              - 'terraform/**'

      - name: No terraform changes — nothing to plan
        if: steps.detect.outputs.tf != 'true'
        run: echo "No terraform/** files changed in this PR. Plan check passes (deadlock-safe)."

      # Fork PRs have no access to secrets — never run a creds-bearing plan there.
      # Report success with a note so branch protection isn't deadlocked; the
      # merge is still gated by review.
      - name: Fork PR — skip creds plan
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork == true
        run: echo "::notice::Fork PR touches terraform/** — a maintainer must run the plan from a trusted branch. Check passes to avoid deadlock; merge is still gated by review."

      - uses: hashicorp/setup-terraform@v3
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt check
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        working-directory: ${{ env.TF_ROOT }}
        run: terraform fmt -check -recursive || (echo "::warning::terraform fmt would reformat files" && true)

      - name: Terraform init (remote backend)
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        working-directory: ${{ env.TF_ROOT }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=fuzeinfra/$(basename "$TF_ROOT")/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Terraform validate
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        working-directory: ${{ env.TF_ROOT }}
        run: terraform validate -no-color

      - name: Terraform plan (saved)
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        id: plan
        working-directory: ${{ env.TF_ROOT }}
        run: |
          set +e
          # Materialized consumer declarations (generated data — the bare *.tf
          # setup is consumer-free by invariant). Loaded only if present so TF
          # roots without consumers are unaffected.
          VAR_FILES=""
          [ -f materialized/consumers.tfvars ] && VAR_FILES="-var-file=materialized/consumers.tfvars"
          terraform plan -input=false -lock-timeout=5m -no-color $VAR_FILES -out=tfplan
          plan_rc=$?
          set -e
          if [ "$plan_rc" -ne 0 ]; then
            echo "::error::terraform plan failed (exit $plan_rc)"
            exit 1
          fi
          terraform show -no-color tfplan > plan.txt
          # Trim the comment to GitHub's ~65k limit.
          head -c 60000 plan.txt > plan.trimmed.txt
          if [ "$(wc -c < plan.txt)" -gt 60000 ]; then
            printf '\n... (plan truncated — see the workflow log / artifact for the full plan)\n' >> plan.trimmed.txt
          fi
          # Robustly detect a non-empty plan from the SAVED plan JSON — does NOT rely
          # on -detailed-exitcode exit-code capture (which proved flaky in CI). True
          # iff any resource-change action is something other than "no-op".
          changes=$(terraform show -json tfplan | jq -r '[.resource_changes[]?.change.actions[]?] | any(. != "no-op")')
          echo "has_changes=${changes}" >> "$GITHUB_OUTPUT"
          echo "plan has changes: ${changes}"

      - name: Save the reviewed plan
        if: success() && steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        uses: actions/upload-artifact@v4
        with:
          # Keyed by PR head SHA so the merge job applies the EXACT reviewed plan.
          name: tfplan-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ env.TF_ROOT }}/tfplan
          retention-days: 14
          if-no-files-found: error

      - name: Post plan as PR comment
        if: always() && steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const root = process.env.TF_ROOT;
            let body;
            try {
              const plan = fs.readFileSync(`${root}/plan.trimmed.txt`, 'utf8');
              body = `### \`terraform plan\` — \`${root}\`\n` +
                     `Merging this PR applies **exactly this saved plan** (\`-out=tfplan\`). ` +
                     `Review it as the apply approval.\n\n` +
                     '<details><summary>Show plan</summary>\n\n```hcl\n' + plan + '\n```\n</details>';
            } catch (e) {
              body = `### \`terraform plan\` — \`${root}\`\n\n❌ Plan failed. See the [workflow log](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}).`;
            }
            const marker = `<!-- tf-plan:${root} -->`;
            body = marker + '\n' + body;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # Drift gate: a non-empty plan (has_changes=true) fails THIS check — loudly —
      # after the plan was saved + commented above. The artifact still exists, so you
      # can deliberately merge past the red check to apply the reviewed plan; but a
      # green plan check now guarantees "no changes" (state matches config).
      - name: Fail the check on a non-empty plan (drift)
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true && steps.plan.outputs.has_changes == 'true'
        run: |
          echo "::error::terraform plan is NON-EMPTY — config and live state differ (drift or unapplied changes). See the plan comment. Reconcile/import until clean, or merge deliberately to apply the reviewed plan."
          exit 1

  # =========================================================================
  # APPLY — on merge to main. Applies the SAVED plan that was reviewed.
  # =========================================================================
  apply:
    if: github.event_name == 'push'
    name: apply (saved plan)
    runs-on: ubuntu-latest
    concurrency:
      # Never let two applies touch state at once (backstops DynamoDB locking).
      group: terraform-apply-${{ vars.TF_ROOT || 'terraform/contabo' }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Resolve the merged PR + its head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The saved plan was uploaded keyed by the PR head SHA. Find the PR
          # that produced this merge commit and recover that SHA.
          PR=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
                 --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No associated PR for ${{ github.sha }} — refusing to apply without a reviewed plan."
            exit 1
          fi
          HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/$PR" --jq '.head.sha')
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "Merged PR #$PR, reviewed plan keyed by head SHA $HEAD_SHA"

      - name: Download the reviewed plan
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          name: tfplan-${{ steps.pr.outputs.head_sha }}
          # The plan was produced by a different workflow run (the PR check).
          workflow: terraform-plan-apply.yml
          commit: ${{ steps.pr.outputs.head_sha }}
          # CRITICAL: the plan job INTENTIONALLY fails (exit 1) when the plan is
          # non-empty (the drift gate) — which is exactly the case where we DO want
          # to apply on merge. dawidd6 defaults to workflow_conclusion=success and
          # would skip that failed run, so the saved plan artifact is "not found"
          # and merge-to-apply only ever worked for empty plans. Match ANY
          # conclusion (pinned by commit) so the reviewed plan is recoverable.
          workflow_conclusion: ""
          path: ${{ env.TF_ROOT }}
          if_no_artifact_found: fail

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init (remote backend)
        working-directory: ${{ env.TF_ROOT }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=fuzeinfra/$(basename "$TF_ROOT")/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Terraform apply (saved plan — exactly what was reviewed)
        working-directory: ${{ env.TF_ROOT }}
        run: terraform apply -input=false -lock-timeout=5m tfplan

      - name: Summarize
        if: always()
        run: |
          echo "### Terraform apply — PR #${{ steps.pr.outputs.pr }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Root: \`${{ env.TF_ROOT }}\` · reviewed plan SHA: \`${{ steps.pr.outputs.head_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
