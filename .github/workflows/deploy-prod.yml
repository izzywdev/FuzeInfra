name: Deploy FuzeInfra – Production

# Triggers on helm chart changes merged to main.
# ArgoCD (running on the Contabo k3s cluster) owns the actual Helm deployment.
# This workflow validates the chart and then triggers an immediate ArgoCD sync
# so the rollout starts seconds after merge rather than waiting for the poll cycle.
on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
      - 'argocd/applications/fuzeinfra-prod.yaml'
      - 'argocd/applications/sealed-secrets.yaml'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:

jobs:
  validate-and-sync:
    name: Validate → ArgoCD sync
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Helm lint (contabo values)
        run: helm lint helm/fuzeinfra -f helm/fuzeinfra/values-contabo.yaml

      - name: Helm template + kubeconform
        run: |
          helm template fuzeinfra helm/fuzeinfra \
            -f helm/fuzeinfra/values-contabo.yaml \
            --namespace fuzeinfra \
            | kubeconform -strict -ignore-missing-schemas || true
        continue-on-error: true   # kubeconform may not be pre-installed; lint above is the gate

      # Trigger an immediate ArgoCD sync via kubectl patch.
      # Requires KUBE_CONFIG secret (set by `terraform apply` in terraform/contabo/).
      # If the secret is absent the deploy is skipped with a warning.
      - name: Register standalone Argo apps + trigger sync
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "::warning::KUBE_CONFIG secret not set — ArgoCD sync not triggered."
            echo "Run 'terraform apply' in terraform/contabo/ to provision the server and set the secret."
            exit 0
          fi
          echo "$KUBE_CONFIG" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          # Register the standalone Application manifests idempotently on every prod
          # deploy. Terraform only applies them on first-provision, so on a VPS
          # rebuild (or if one was never registered — e.g. sealed-secrets, #88) they
          # would silently go missing. apply -f makes the repo the source of truth.
          for app in fuzeinfra-prod sealed-secrets; do
            kubectl apply -f "argocd/applications/$app.yaml" \
              && echo "registered $app" \
              || echo "::warning::failed to register $app"
          done

          # Kick an immediate sync so the rollout starts seconds after merge.
          for app in fuzeinfra-prod sealed-secrets; do
            kubectl -n argocd patch application "$app" --type merge \
              -p '{"operation":{"initiatedBy":{"username":"ci"},"sync":{}}}' \
              && echo "sync triggered for $app" \
              || echo "::warning::sync patch failed for $app"
          done
