name: Build & Push Agent Orchestration Images

# Builds the handoff MCP server + the self-hosted worker images for the
# agent-templates orchestration feature. NOTE: this capability is slated to move to
# FuzeAgent (see agent-templates/PORTING-TO-FUZEAGENT.md); when it ports, this
# workflow + the images go with it.

on:
  push:
    branches: [main]
    paths:
      - 'agent-templates/**'
      - '.github/workflows/agent-images.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agent-templates/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: agent-handoff
            context: agent-templates
            dockerfile: agent-templates/orchestration/handoff_mcp/Dockerfile
          - image: agent-worker
            context: agent-templates/worker
            dockerfile: agent-templates/worker/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fuzeinfra/${{ matrix.image }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
