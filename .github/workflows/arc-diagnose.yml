name: arc-diagnose
on: [workflow_dispatch]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Cluster nodes
        run: kubectl get nodes -o wide --show-labels

      - name: ARC namespaces
        run: |
          echo "=== arc-systems pods ==="
          kubectl -n arc-systems get pods -o wide 2>/dev/null || echo "namespace missing or empty"
          echo "=== arc-runners pods ==="
          kubectl -n arc-runners get pods -o wide 2>/dev/null || echo "namespace missing or empty"
          echo "=== arc-runners secrets ==="
          kubectl -n arc-runners get secrets 2>/dev/null

      - name: ARC controller logs (last 50 lines)
        run: |
          POD=$(kubectl -n arc-systems get pods -l app.kubernetes.io/name=gha-rs-controller -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "$POD" ]; then
            kubectl -n arc-systems logs "$POD" --tail=50
          else
            echo "No ARC controller pod found"
          fi

      - name: AutoscalingRunnerSet status
        run: |
          kubectl -n arc-runners get autoscalingrunnersets 2>/dev/null || echo "CRD not found"
          kubectl -n arc-runners describe autoscalingrunnersets staging 2>/dev/null || true

      - name: Listener pod status
        run: |
          echo "=== arc-systems all pods ==="
          kubectl -n arc-systems get pods -o wide
          echo "=== listener pod describe ==="
          LPOD=$(kubectl -n arc-systems get pods -o name 2>/dev/null | grep listener || echo "")
          if [ -n "$LPOD" ]; then
            kubectl -n arc-systems describe $LPOD
            echo "=== listener pod logs ==="
            kubectl -n arc-systems logs $LPOD --tail=50 2>/dev/null || echo "(no logs yet)"
          else
            echo "No listener pod found"
          fi

      - name: EphemeralRunner pods + logs
        run: |
          echo "=== EphemeralRunners (CRD) ==="
          kubectl -n arc-runners get ephemeralrunners 2>/dev/null || echo "(no EphemeralRunner CRD or none)"
          echo "=== All arc-runners pods (including Completed/Failed) ==="
          kubectl -n arc-runners get pods --all-namespaces=false -o wide 2>/dev/null
          echo "=== Runner pod logs (last 3 pods, 50 lines each) ==="
          PODS=$(kubectl -n arc-runners get pods --sort-by='.metadata.creationTimestamp' \
            -o jsonpath='{.items[-3:].metadata.name}' 2>/dev/null || echo "")
          for POD in $PODS; do
            echo "--- logs: $POD ---"
            kubectl -n arc-runners logs "$POD" --all-containers --tail=50 2>/dev/null \
              || kubectl -n arc-runners logs "$POD" --all-containers --previous --tail=50 2>/dev/null \
              || echo "(no logs)"
          done
          echo "=== ARC controller logs (last 30) ==="
          CTRL=$(kubectl -n arc-systems get pods -l app.kubernetes.io/name=gha-rs-controller \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          [ -n "$CTRL" ] && kubectl -n arc-systems logs "$CTRL" --tail=30 2>/dev/null || true

      - name: arc-runners RBAC
        run: |
          echo "=== RoleBindings in arc-runners ==="
          kubectl -n arc-runners get rolebindings -o wide 2>/dev/null
          echo "=== Roles in arc-runners ==="
          kubectl -n arc-runners get roles 2>/dev/null
