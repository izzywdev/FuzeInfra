name: arc-debug
on: [workflow_dispatch]
permissions:
  contents: read
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Runner pod env + logs
        run: |
          echo "=== EphemeralRunners ==="
          kubectl -n arc-runners get ephemeralrunners 2>/dev/null || echo "(none)"
          echo "=== All runner pods ==="
          kubectl -n arc-runners get pods -o wide 2>/dev/null
          echo "=== Runner pod JITCONFIG env check ==="
          for POD in $(kubectl -n arc-runners get pods -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- pod: $POD ---"
            kubectl -n arc-runners get pod "$POD" -o jsonpath='{range .spec.containers[*]}{.name}{"\n"}{range .env[*]}  env: {.name}={.value}{.valueFrom}{"\n"}{end}{range .envFrom[*]}  envFrom: {.secretRef}{"\n"}{end}{end}' 2>/dev/null || echo "(pod gone)"
            echo "  phase: $(kubectl -n arc-runners get pod $POD -o jsonpath='{.status.phase}' 2>/dev/null)"
            echo "  --- logs ---"
            kubectl -n arc-runners logs "$POD" --all-containers 2>/dev/null || kubectl -n arc-runners logs "$POD" --all-containers --previous 2>/dev/null || echo "  (no logs)"
          done
          echo "=== JIT secret keys in arc-runners ==="
          kubectl -n arc-runners get secrets -o jsonpath='{range .items[*]}{.metadata.name}: {range $k,$v:=.data}{$k} {end}{"\n"}{end}' 2>/dev/null || true
          echo "=== ARC controller logs (last 20) ==="
          CTRL=$(kubectl -n arc-systems get pods -l app.kubernetes.io/name=gha-rs-controller -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          [ -n "$CTRL" ] && kubectl -n arc-systems logs "$CTRL" --tail=20 2>/dev/null || echo "no controller"
