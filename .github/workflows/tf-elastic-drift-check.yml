# ===========================================================================
# tf-elastic-drift-check  —  static guard against elastic-node adoption
# ===========================================================================
# Asserts that Terraform NEVER manages instances tagged "fuzeinfra-elastic",
# which are created out-of-band by the cluster autoscaler and intentionally
# excluded from Terraform state. This workflow enforces the elastic-exclusion
# invariant via STATIC HCL analysis (no credentials, no terraform init/plan).
#
#   • Pull request touching terraform/contabo/** or modules/contabo-k3s-node/**
#     → static HCL pattern check → FAIL if dangerous patterns found, PASS otherwise.
#   • workflow_dispatch → manual trigger for verification.
#
# The invariant (see terraform/contabo/main.tf lines 23-33):
#   1. No broad instance enumeration: no `data "contabo_instance"` anywhere.
#      (Broad enumeration is the only mechanism by which TF could adopt
#      an elastic node.)
#   2. No self-tagging: no managed `resource "contabo_instance"` carries the
#      `fuzeinfra-elastic` tag.
#
# Safety / Why static analysis:
#   • Requires NO credentials, NO S3/DynamoDB/Contabo/Cloudflare auth.
#   • Requires NO terraform init/plan/backends.
#   • Runs on EVERY PR (fork PRs included) and NEVER fails open.
#   • The invariant is STRUCTURAL — it is about source code, not live state.
#   • Proof: if no data source exists in code, terraform apply cannot enumerate.
#
# Scope: terraform/contabo/** and modules/contabo-k3s-node/** only.
#
# ---------------------------------------------------------------------------

name: Terraform elastic-node drift check

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/contabo/**'
      - 'modules/contabo-k3s-node/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  elastic-drift-check:
    name: Guard elastic-node exclusion (static HCL analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Elastic-exclusion guard (static HCL check)
        run: python3 scripts-tools/check-elastic-exclusion.py
