name: Grafana Error Log Auto-Fix

# Triggered by the crit-alert-bridge CF Worker via repository_dispatch
# when Grafana fires a "CRIT Log Detected" alert (ERROR/CRIT/FATAL/PANIC).
#
# Deduplication — two layers:
#   1. concurrency group (workflow-level): serialises all runs; no two
#      executions overlap. cancel-in-progress: false means additional
#      triggers queue rather than getting cancelled.
#   2. preflight job: once a fix PR or triage issue carrying the
#      "crit-autofix" label is open, every queued run exits immediately.
#      The main job only runs when there is nothing already in flight.
#      ignore-candidate issues also carry crit-autofix, so they block
#      further alerts while awaiting the user's approval via Telegram.
#
# Flow:
#   preflight → check open crit-autofix PRs/issues → skip if found
#   analyze-and-fix (if not skipped):
#     1. Set up kubectl with KUBE_CONFIG secret
#     2. Port-forward Loki and fetch the last 30 min of ERROR/CRIT/FATAL/PANIC logs
#     3. Check suppressed patterns (.github/crit-ignore-patterns.json)
#        → if all logs match known-good patterns, exit silently
#     4. Run Claude Code headlessly — analyse logs + codebase
#     4a. action=fix:    commit, open PR (+ label), enable auto-merge
#     4b. action=issue:  open a GitHub issue (+ label) with Claude's analysis
#     4c. action=ignore: open a suppress-approval issue (+ crit-autofix label)
#                        and send a Telegram notification requesting approval.
#                        When the user closes the issue, update-ignore-list.yml
#                        appends the pattern to .github/crit-ignore-patterns.json.
#     5. Send email for fix/issue; Telegram message for ignore.
#
# Required GitHub secrets:
#   KUBE_CONFIG         — base64-encoded k3s kubeconfig
#   ANTHROPIC_API_KEY   — Claude API key
#   GMAIL_USERNAME      — Gmail address for email alerts
#   GMAIL_APP_PASSWORD  — Gmail App Password
#   TELEGRAM_BOT_TOKEN  — from @BotFather
#   TELEGRAM_CHAT_ID    — your personal Telegram user/chat ID

on:
  repository_dispatch:
    types: [grafana-crit-alert]

# Serialise all runs. cancel-in-progress: false means subsequent triggers
# queue — the preflight check in each queued run will then exit early if a
# PR or issue is already open, rather than launching a redundant investigation.
concurrency:
  group: crit-autofix
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Gate: skip if a crit-autofix PR or issue is already open ─────────────
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check for open autofix work
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure both labels exist (idempotent)
          gh label create crit-autofix \
            --color "e11d48" \
            --description "Opened by CRIT log auto-fix pipeline" \
            --repo "${{ github.repository }}" 2>/dev/null || true

          gh label create ignore-candidate \
            --color "f59e0b" \
            --description "Pending user approval to suppress this alert pattern" \
            --repo "${{ github.repository }}" 2>/dev/null || true

          OPEN_PRS=$(gh pr list \
            --label crit-autofix --state open \
            --json number,title --jq 'length' \
            --repo "${{ github.repository }}")

          OPEN_ISSUES=$(gh issue list \
            --label crit-autofix --state open \
            --json number,title --jq 'length' \
            --repo "${{ github.repository }}")

          if [ "$OPEN_PRS" -gt 0 ] || [ "$OPEN_ISSUES" -gt 0 ]; then
            REASON="skipping — ${OPEN_PRS} open fix PR(s) and ${OPEN_ISSUES} open issue(s) with label crit-autofix"
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "::notice::$REASON"
          else
            echo "skip=false"  >> "$GITHUB_OUTPUT"
            echo "reason=no open autofix work found" >> "$GITHUB_OUTPUT"
          fi

  # ── Main: investigate and fix ─────────────────────────────────────────────
  analyze-and-fix:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── kubectl access ──────────────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config set-cluster default --insecure-skip-tls-verify=true
          kubectl cluster-info --request-timeout=10s

      # ── resolve which repo owns the emitting namespace ──────────────────────
      # A CRIT log should land in the issue tracker of whoever owns the service
      # that emitted it — not always FuzeInfra. The owning repo is declared by a
      # `fuzeinfra.io/owner-repo` annotation on the namespace (consumers set it at
      # onboarding; FuzeInfra's own namespace is annotated via Argo CD). Falls back
      # to this repo when the namespace is missing, unannotated, or invalid.
      - name: Resolve owner repo from namespace annotation
        id: ownerrepo
        env:
          ALERT_LABELS: ${{ github.event.client_payload.labels }}
        run: |
          set -euo pipefail
          DEFAULT_REPO="${{ github.repository }}"
          OWNER_REPO="$DEFAULT_REPO"

          # client_payload.labels is a JSON string of the alert labels (incl.
          # namespace). Treat strictly as DATA — never interpolate into a prompt.
          printf '%s' "$ALERT_LABELS" > /tmp/alert_labels.json
          jq empty /tmp/alert_labels.json 2>/dev/null || echo '{}' > /tmp/alert_labels.json
          NS=$(jq -r '.namespace // ""' /tmp/alert_labels.json)

          if [ -z "$NS" ] || [ "$NS" = "null" ]; then
            echo "No namespace label on the alert; routing to $DEFAULT_REPO"
          else
            ANNOT=$(kubectl get ns "$NS" \
              -o jsonpath='{.metadata.annotations.fuzeinfra\.io/owner-repo}' \
              2>/dev/null || true)
            # Security gate: the value flows into `gh --repo` and Claude's prompt.
            # Accept only a strict owner/repo slug; otherwise fall back.
            if [ -n "$ANNOT" ] && printf '%s' "$ANNOT" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
              OWNER_REPO="$ANNOT"
            else
              echo "Namespace '$NS' has no valid fuzeinfra.io/owner-repo annotation; routing to $DEFAULT_REPO"
            fi
          fi

          IS_SELF=false
          [ "$OWNER_REPO" = "$DEFAULT_REPO" ] && IS_SELF=true
          echo "owner_repo=$OWNER_REPO" >> "$GITHUB_OUTPUT"
          echo "is_self=$IS_SELF"       >> "$GITHUB_OUTPUT"
          echo "::notice::CRIT issue will be filed in '$OWNER_REPO' (namespace '${NS:-<none>}')"

      # ── fetch logs from Loki ────────────────────────────────────────────────
      - name: Fetch recent error logs from Loki
        id: logs
        run: |
          kubectl port-forward -n fuzeinfra svc/fuzeinfra-loki 3100:3100 &
          PF_PID=$!
          sleep 5

          END=$(date +%s)000000000
          START=$(( $(date +%s) - 1800 ))000000000

          LOGS=$(curl -sf "http://localhost:3100/loki/api/v1/query_range" \
            --data-urlencode 'query={namespace=~".+"} |~ "(?i)(ERROR|CRIT|CRITICAL|FATAL|PANIC)"' \
            --data-urlencode "start=${START}" \
            --data-urlencode "end=${END}" \
            --data-urlencode "limit=50" \
            | jq -r '.data.result[] | (.stream.namespace // "?") + "/" + (.stream.pod // "?") + ": " + .values[][1]' \
            2>/dev/null | head -50 \
            || echo "(could not retrieve logs from Loki)")

          kill "$PF_PID" 2>/dev/null || true

          {
            echo "logs<<LOGS_EOF"
            printf '%s' "$LOGS"
            echo ""
            echo "LOGS_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── suppression check ───────────────────────────────────────────────────
      - name: Check suppressed patterns
        id: suppress
        env:
          LOG_CTX: ${{ steps.logs.outputs.logs }}
        run: python3 .github/check-suppressed.py

      - name: Skip — all errors match suppress list
        if: steps.suppress.outputs.skip == 'true'
        run: |
          echo "::notice::All log lines matched suppressed patterns (${{ steps.suppress.outputs.suppressed_count }} lines). No action needed."

      # ── run Claude Code (only when unsuppressed logs remain) ────────────────
      - name: Install Claude Code CLI
        if: steps.suppress.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code agent
        id: claude
        if: steps.suppress.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALERT_SUMMARY: ${{ github.event.client_payload.summary }}
          ALERT_DESC: ${{ github.event.client_payload.description }}
          ALERT_LABELS: ${{ github.event.client_payload.labels }}
          FIRED_AT: ${{ github.event.client_payload.fired_at }}
          LOG_CTX: ${{ steps.suppress.outputs.filtered_logs }}
        run: |
          PROMPT=$(python3 .github/gen-claude-prompt.py)

          claude --print \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep" \
            --max-turns 30 \
            -p "$PROMPT" > /tmp/claude_raw.txt 2>&1 || true

          echo "=== Claude raw output ==="
          cat /tmp/claude_raw.txt

          python3 .github/extract-claude-json.py > /tmp/claude_result.json

          cat /tmp/claude_result.json
          {
            echo "json<<JSON_EOF"
            cat /tmp/claude_result.json
            echo "JSON_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── create PR, issue, or ignore request ────────────────────────────────
      - name: Create fix PR, issue, or ignore request
        id: act
        if: steps.suppress.outputs.skip != 'true'
        env:
          # GH_TOKEN: a cross-repo PAT is required to file issues in a CONSUMER
          # repo (the default GITHUB_TOKEN is scoped to this repo only). Falls back
          # to GITHUB_TOKEN, which still works for FuzeInfra's own (is_self) crits.
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          OWNER_REPO: ${{ steps.ownerrepo.outputs.owner_repo }}
          IS_SELF: ${{ steps.ownerrepo.outputs.is_self }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FIRED_AT: ${{ github.event.client_payload.fired_at }}
          ALERT_SUMMARY: ${{ github.event.client_payload.summary }}
          LOG_CTX: ${{ steps.suppress.outputs.filtered_logs }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/grafana-crit-fix.yml
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          ACTION=$(python3 -c "import json; print(json.loads(open('/tmp/claude_result.json').read())['action'])")

          # A code-fix PR can only target THIS repo's checkout. For a consumer-owned
          # namespace we can't fix their code from here — downgrade fix→issue so it
          # gets filed (as triage) in the owner repo instead.
          if [ "$ACTION" = "fix" ] && [ "$IS_SELF" != "true" ]; then
            echo "::notice::Owner repo '$OWNER_REPO' is not this repo; downgrading fix→issue"
            ACTION="issue"
          fi

          if [ "$ACTION" = "fix" ]; then
            SUMMARY=$(python3 -c "import json; print(json.loads(open('/tmp/claude_result.json').read()).get('summary','Fix CRIT error'))")
            BRANCH="claude-crit-fix-$(date +%Y%m%d-%H%M%S)"

            git config user.email "claude-autofix@fuzeinfra"
            git config user.name "Claude Auto-Fix"
            git checkout -b "$BRANCH"
            git add -A

            if git diff --cached --quiet; then
              echo "No file changes from Claude — falling back to issue"
              ACTION="issue"
            else
              git commit -m "fix: ${SUMMARY} [crit-autofix]"
              git push origin "$BRANCH"

              python3 .github/gen-pr-body.py > /tmp/pr_body.md
              URL=$(gh pr create \
                --title "fix: ${SUMMARY}" \
                --label "crit-autofix" \
                --body-file /tmp/pr_body.md \
                --base main --head "$BRANCH")

              gh pr merge --auto --merge "$URL" || true

              # Re-run any checks that GitHub blocked as "action_required"
              # (happens on first bot-created PRs before admin approval)
              sleep 15
              PR_BRANCH="$BRANCH"
              for RUN_ID in $(gh run list \
                --repo "${{ github.repository }}" \
                --branch "$PR_BRANCH" \
                --json databaseId,conclusion \
                --jq '.[] | select(.conclusion=="action_required") | .databaseId' 2>/dev/null); do
                gh run rerun "$RUN_ID" --repo "${{ github.repository }}" 2>/dev/null || true
              done

              echo "action=fix" >> "$GITHUB_OUTPUT"
              echo "url=$URL"   >> "$GITHUB_OUTPUT"
            fi
          fi

          if [ "$ACTION" = "issue" ]; then
            TITLE=$(python3 -c "import json; print(json.loads(open('/tmp/claude_result.json').read()).get('title','CRIT alert needs attention'))")
            python3 .github/gen-issue-body.py > /tmp/issue_body.md

            # Dedup in the owner repo: the FuzeInfra preflight gate can't see a
            # consumer repo's open issues, so check here before piling on.
            EXISTING=$(gh issue list --repo "$OWNER_REPO" --label crit-autofix \
              --state open --json number --jq 'length' 2>/dev/null || echo 0)
            if [ "${EXISTING:-0}" -gt 0 ]; then
              echo "::notice::An open crit-autofix issue already exists in $OWNER_REPO; skipping"
              echo "action=issue" >> "$GITHUB_OUTPUT"
            else
              # Ensure the label exists in the (possibly consumer) repo; tolerate
              # a missing label / no label-create permission by retrying bare.
              gh label create crit-autofix --color e11d48 \
                --description "Opened by FuzeInfra CRIT log auto-fix" \
                --repo "$OWNER_REPO" 2>/dev/null || true
              URL=$(gh issue create --repo "$OWNER_REPO" \
                --title "🚨 ${TITLE}" \
                --label "bug" --label "crit-autofix" \
                --body-file /tmp/issue_body.md 2>/tmp/issue_err.txt) || {
                  echo "::warning::labelled issue create failed in $OWNER_REPO (label/token scope?); retrying without labels"
                  URL=$(gh issue create --repo "$OWNER_REPO" \
                    --title "🚨 ${TITLE}" --body-file /tmp/issue_body.md)
                }
              echo "action=issue" >> "$GITHUB_OUTPUT"
              echo "url=$URL"     >> "$GITHUB_OUTPUT"
            fi
          fi

          if [ "$ACTION" = "ignore" ]; then
            PATTERN=$(python3 -c "import json; r=json.loads(open('/tmp/claude_result.json').read()); print(r.get('pattern', r.get('title', 'unknown pattern')))")
            REASON=$(python3 -c "import json; print(json.loads(open('/tmp/claude_result.json').read()).get('reason', 'No reason provided'))")

            python3 .github/gen-ignore-body.py > /tmp/ignore_body.md

            TITLE_SHORT="${PATTERN:0:80}"
            URL=$(gh issue create \
              --title "🔕 Suppress: ${TITLE_SHORT}" \
              --label "ignore-candidate" \
              --label "crit-autofix" \
              --body-file /tmp/ignore_body.md)

            # Send Telegram approval request (jq handles all JSON/HTML escaping)
            curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg chat_id "$TELEGRAM_CHAT_ID" \
                --arg pattern "$PATTERN" \
                --arg reason "$REASON" \
                --arg url "$URL" \
                '{
                  chat_id: $chat_id,
                  parse_mode: "HTML",
                  disable_web_page_preview: true,
                  text: ("🔕 <b>Claude suggests ignoring this error</b>\n\nPattern: <code>" + $pattern + "</code>\nReason: " + $reason + "\n\n<a href=\"" + $url + "\">✅ Approve suppression</a>\nClose the GitHub issue to permanently suppress future alerts for this pattern.")
                }')" || echo "::warning::Telegram notification failed (check TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID secrets)"

            echo "action=ignore" >> "$GITHUB_OUTPUT"
            echo "url=$URL"      >> "$GITHUB_OUTPUT"
          fi

      # ── email (fix and issue actions only) ─────────────────────────────────
      - name: Prepare email subject
        id: email
        if: steps.suppress.outputs.skip != 'true' && (steps.act.outputs.action == 'fix' || steps.act.outputs.action == 'issue')
        run: |
          if [ "${{ steps.act.outputs.action }}" = "fix" ]; then
            echo "subject=🚨 FuzeInfra Alert — Fix PR Opened" >> "$GITHUB_OUTPUT"
            echo "action_line=Fix PR: ${{ steps.act.outputs.url }}" >> "$GITHUB_OUTPUT"
          else
            echo "subject=🚨 FuzeInfra Alert — Needs Attention (Issue Created)" >> "$GITHUB_OUTPUT"
            echo "action_line=GitHub Issue: ${{ steps.act.outputs.url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email
        if: steps.suppress.outputs.skip != 'true' && (steps.act.outputs.action == 'fix' || steps.act.outputs.action == 'issue')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.email.outputs.subject }}
          to: izzy.weinberg@gmail.com
          from: FuzeInfra Alerts <${{ secrets.GMAIL_USERNAME }}>
          body: |
            An ERROR/CRIT/FATAL/PANIC was detected in FuzeInfra.

            Alert:    ${{ github.event.client_payload.summary }}
            Fired at: ${{ github.event.client_payload.fired_at }}

            ${{ steps.email.outputs.action_line }}

            GHA run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            --- Log excerpt (last 30 min) ---
            ${{ steps.logs.outputs.logs }}
