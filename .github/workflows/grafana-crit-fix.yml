name: Grafana CRIT Log Auto-Fix

# Triggered by the crit-alert-bridge CF Worker via repository_dispatch
# when Grafana fires a "CRIT Log Detected" alert.
#
# Deduplication — two layers:
#   1. concurrency group (workflow-level): serialises all runs; no two
#      executions overlap. cancel-in-progress: false means additional
#      triggers queue rather than getting cancelled.
#   2. preflight job: once a fix PR or triage issue carrying the
#      "crit-autofix" label is open, every queued run exits immediately.
#      The main job only runs when there is nothing already in flight.
#
# Flow:
#   preflight → check open crit-autofix PRs/issues → skip if found
#   analyze-and-fix (if not skipped):
#     1. Set up kubectl with KUBE_CONFIG secret
#     2. Port-forward Loki and fetch the last 30 min of CRIT/FATAL/PANIC logs
#     3. Run Claude Code headlessly — analyse logs + codebase
#     4a. If Claude can make a fix: commit, open PR (+ label), enable auto-merge
#     4b. If not: open a GitHub issue (+ label) with Claude's analysis
#     5. Send email notification in both cases
#
# Required GitHub secrets:
#   KUBE_CONFIG        — base64-encoded k3s kubeconfig (set by terraform apply)
#   ANTHROPIC_API_KEY  — Claude API key
#   GMAIL_USERNAME     — izzy.weinberg@gmail.com (or any Gmail address)
#   GMAIL_APP_PASSWORD — Gmail App Password (myaccount.google.com/apppasswords)

on:
  repository_dispatch:
    types: [grafana-crit-alert]

# Serialise all runs. cancel-in-progress: false means subsequent triggers
# queue — the preflight check in each queued run will then exit early if a
# PR or issue is already open, rather than launching a redundant investigation.
concurrency:
  group: crit-autofix
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Gate: skip if a crit-autofix PR or issue is already open ─────────────
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check for open autofix work
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the label exists (idempotent)
          gh label create crit-autofix \
            --color "e11d48" \
            --description "Opened by CRIT log auto-fix pipeline" \
            --repo "${{ github.repository }}" 2>/dev/null || true

          OPEN_PRS=$(gh pr list \
            --label crit-autofix --state open \
            --json number,title --jq 'length' \
            --repo "${{ github.repository }}")

          OPEN_ISSUES=$(gh issue list \
            --label crit-autofix --state open \
            --json number,title --jq 'length' \
            --repo "${{ github.repository }}")

          if [ "$OPEN_PRS" -gt 0 ] || [ "$OPEN_ISSUES" -gt 0 ]; then
            REASON="skipping — ${OPEN_PRS} open fix PR(s) and ${OPEN_ISSUES} open issue(s) with label crit-autofix"
            echo "skip=true"   >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "::notice::$REASON"
          else
            echo "skip=false"  >> "$GITHUB_OUTPUT"
            echo "reason=no open autofix work found" >> "$GITHUB_OUTPUT"
          fi

  # ── Main: investigate and fix ─────────────────────────────────────────────
  analyze-and-fix:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── kubectl access ──────────────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info --request-timeout=10s

      # ── fetch logs from Loki ────────────────────────────────────────────────
      - name: Fetch recent CRIT logs from Loki
        id: logs
        run: |
          kubectl port-forward -n fuzeinfra svc/fuzeinfra-loki 3100:3100 &
          PF_PID=$!
          sleep 5

          END=$(date +%s)000000000
          START=$(( $(date +%s) - 1800 ))000000000

          LOGS=$(curl -sf "http://localhost:3100/loki/api/v1/query_range" \
            --data-urlencode 'query={namespace=~".+"} |~ "(?i)(CRIT|CRITICAL|FATAL|PANIC)"' \
            --data-urlencode "start=${START}" \
            --data-urlencode "end=${END}" \
            --data-urlencode "limit=50" \
            | jq -r '.data.result[] | (.stream.namespace // "?") + "/" + (.stream.pod // "?") + ": " + .values[][1]' \
            2>/dev/null | head -50 \
            || echo "(could not retrieve logs from Loki)")

          kill "$PF_PID" 2>/dev/null || true

          {
            echo "logs<<LOGS_EOF"
            printf '%s' "$LOGS"
            echo ""
            echo "LOGS_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── run Claude Code ─────────────────────────────────────────────────────
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code agent
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALERT_SUMMARY: ${{ github.event.client_payload.summary }}
          ALERT_DESC: ${{ github.event.client_payload.description }}
          ALERT_LABELS: ${{ github.event.client_payload.labels }}
          FIRED_AT: ${{ github.event.client_payload.fired_at }}
          LOG_CTX: ${{ steps.logs.outputs.logs }}
        run: |
          PROMPT=$(python3 .github/gen-claude-prompt.py)

          claude --print \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep" \
            --max-turns 30 \
            -p "$PROMPT" > /tmp/claude_raw.txt 2>&1 || true

          echo "=== Claude raw output ==="
          cat /tmp/claude_raw.txt

          python3 .github/extract-claude-json.py > /tmp/claude_result.json

          cat /tmp/claude_result.json
          {
            echo "json<<JSON_EOF"
            cat /tmp/claude_result.json
            echo "JSON_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── create PR or issue (both tagged crit-autofix for dedup) ────────────
      - name: Create fix PR or issue
        id: act
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIRED_AT: ${{ github.event.client_payload.fired_at }}
          ALERT_SUMMARY: ${{ github.event.client_payload.summary }}
          LOG_CTX: ${{ steps.logs.outputs.logs }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/grafana-crit-fix.yml
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          ACTION=$(python3 -c "import json; print(json.loads(open('/tmp/claude_result.json').read())['action'])")

          if [ "$ACTION" = "fix" ]; then
            SUMMARY=$(python3 -c "import json; print(json.loads(open('/tmp/claude_result.json').read()).get('summary','Fix CRIT error'))")
            BRANCH="claude-crit-fix-$(date +%Y%m%d-%H%M%S)"

            git config user.email "claude-autofix@fuzeinfra"
            git config user.name "Claude Auto-Fix"
            git checkout -b "$BRANCH"
            git add -A

            if git diff --cached --quiet; then
              echo "No file changes from Claude — falling back to issue"
              ACTION="issue"
            else
              git commit -m "fix: ${SUMMARY} [crit-autofix]"
              git push origin "$BRANCH"

              python3 .github/gen-pr-body.py > /tmp/pr_body.md
              URL=$(gh pr create \
                --title "fix: ${SUMMARY}" \
                --label "crit-autofix" \
                --body-file /tmp/pr_body.md \
                --base main --head "$BRANCH")

              gh pr merge --auto --merge "$URL" || true

              echo "action=fix" >> "$GITHUB_OUTPUT"
              echo "url=$URL"   >> "$GITHUB_OUTPUT"
            fi
          fi

          if [ "$ACTION" = "issue" ]; then
            TITLE=$(python3 -c "import json; print(json.loads(open('/tmp/claude_result.json').read()).get('title','CRIT alert needs attention'))")
            python3 .github/gen-issue-body.py > /tmp/issue_body.md

            URL=$(gh issue create \
              --title "🚨 ${TITLE}" \
              --label "bug" \
              --label "crit-autofix" \
              --body-file /tmp/issue_body.md)

            echo "action=issue" >> "$GITHUB_OUTPUT"
            echo "url=$URL"     >> "$GITHUB_OUTPUT"
          fi

      # ── email ───────────────────────────────────────────────────────────────
      - name: Prepare email subject
        id: email
        run: |
          if [ "${{ steps.act.outputs.action }}" = "fix" ]; then
            echo "subject=🚨 FuzeInfra CRIT Alert — Fix PR Opened" >> "$GITHUB_OUTPUT"
            echo "action_line=Fix PR: ${{ steps.act.outputs.url }}" >> "$GITHUB_OUTPUT"
          else
            echo "subject=🚨 FuzeInfra CRIT Alert — Needs Attention (Issue Created)" >> "$GITHUB_OUTPUT"
            echo "action_line=GitHub Issue: ${{ steps.act.outputs.url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.email.outputs.subject }}
          to: izzy.weinberg@gmail.com
          from: FuzeInfra Alerts <${{ secrets.GMAIL_USERNAME }}>
          body: |
            A CRIT/FATAL/PANIC error was detected in FuzeInfra.

            Alert:    ${{ github.event.client_payload.summary }}
            Fired at: ${{ github.event.client_payload.fired_at }}

            ${{ steps.email.outputs.action_line }}

            GHA run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            --- Log excerpt (last 30 min) ---
            ${{ steps.logs.outputs.logs }}
