# ===========================================================================
# terraform-contabo-cd  —  merge-to-apply Terraform CD for terraform/contabo
# ===========================================================================
# Model: the PR review IS the apply approval. No separate post-merge gate.
#   * PR touching terraform/**  -> `terraform plan -out=tfplan`, posted as a PR
#     comment (visible diff) AND uploaded as an artifact keyed by the PR head SHA.
#   * Merge to main             -> recover that PR's head SHA, download the EXACT
#     saved tfplan, and run `terraform apply tfplan`. No blind re-plan. If state
#     drifted since review, Terraform rejects the stale saved plan and fails loud.
#
# Prereqs satisfied:
#   * Remote state + locking — S3 + DynamoDB (terraform/contabo/backend.tf, partial
#     config injected at init from TF_STATE_* secrets).
#   * Least-privilege scoped creds — Cloudflare token scoped to the zone, Contabo
#     via repo secrets; injected as TF_VAR_* only at plan/apply time.
#   * Apply runs ONLY on push to main. Plan never runs with secrets on fork PRs.
#
# DEADLOCK-SAFE (companion deadlock-fix pattern): the `plan` job — the required
# status check — has NO workflow/job-level `paths:` filter, so it ALWAYS runs and
# ALWAYS reports a conclusion on every PR to main. The terraform/** filter is
# applied INSIDE the job: when no terraform files changed it succeeds immediately
# ("nothing to plan"). A non-terraform PR therefore never sits "pending" on a
# check that was skipped — it goes green. Branch protection can require
# `terraform-contabo-cd / plan` without blocking unrelated PRs.
#
# ---------------------------------------------------------------------------
# ACTIVATION (maintainer): the bot can't write under .github/workflows/, so this
# ships in docs/workflows/. To activate:
#     git mv docs/workflows/terraform-contabo-cd.yml .github/workflows/
#     git commit -m "ci: activate terraform-contabo merge-to-apply CD" && git push
# Then add the secrets/vars below and the branch-protection rule. Full runbook in
# docs/TERRAFORM_CD.md.
# ---------------------------------------------------------------------------
#
# Required repo secrets (FuzeInfra CI only):
#   # remote-state backend (S3 + DynamoDB)
#   TF_STATE_ACCESS_KEY_ID, TF_STATE_SECRET_ACCESS_KEY
#   # provider creds (least-privilege)
#   CONTABO_CLIENT_ID, CONTABO_CLIENT_SECRET, CONTABO_API_USER, CONTABO_API_PASSWORD
#   CLOUDFLARE_API_TOKEN            # scoped to the fuzefront.com zone (DNS:Edit,
#                                   #   Cloudflare Tunnel:Edit, Access:Apps&Policies:Edit)
#   CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_ZONE_ID
#   CONTABO_IMAGE_ID, CONTABO_PRODUCT_ID, NODE_SSH_PUBLIC_KEY
#   GH_PAT                         # repo+secrets write (for the KUBE_CONFIG/secret provisioners)
# Required repo variables (non-secret):
#   TF_STATE_BUCKET, TF_STATE_REGION, TF_STATE_LOCK_TABLE

name: terraform-contabo-cd

on:
  pull_request:
    branches: [main]
    # NO paths filter — see DEADLOCK-SAFE note above. The plan job self-filters.
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # post the plan comment
  actions: read          # download the saved-plan artifact across runs

concurrency:
  # Serialize everything that touches contabo state so an apply can never race a
  # plan or another apply. (Remote DynamoDB locking is the hard backstop.)
  group: terraform-contabo-cd
  cancel-in-progress: false

env:
  TF_VERSION: "1.6.6"
  WORKDIR: terraform/contabo
  PLAN_FILE: tfplan

jobs:
  # =========================================================================
  # plan — REQUIRED status check. Always runs; self-filters on terraform/**.
  # =========================================================================
  plan:
    name: plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect terraform/** changes
        id: detect
        uses: dorny/paths-filter@v3
        with:
          filters: |
            tf:
              - 'terraform/**'

      - name: No terraform changes — nothing to plan
        if: steps.detect.outputs.tf != 'true'
        run: echo "No terraform/** files changed in this PR. Plan check passes (deadlock-safe)."

      # Fork PRs have no access to secrets — never run a creds-bearing plan there.
      # Report success with a note so branch protection isn't deadlocked.
      - name: Fork PR — skip creds plan
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork == true
        run: echo "::notice::Fork PR touches terraform/** — a maintainer must run the plan from a trusted branch. Check passes to avoid deadlock; merge is still gated by review."

      - name: Set up Terraform
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (remote backend)
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        working-directory: ${{ env.WORKDIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=fuzeinfra/contabo/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}"

      - name: Terraform fmt + validate
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        working-directory: ${{ env.WORKDIR }}
        run: |
          terraform fmt -check -recursive
          terraform validate -no-color

      - name: Terraform plan (save the reviewed plan)
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        id: plan
        working-directory: ${{ env.WORKDIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
          # Provider creds injected only at plan time (TF_VAR_*).
          TF_VAR_contabo_client_id: ${{ secrets.CONTABO_CLIENT_ID }}
          TF_VAR_contabo_client_secret: ${{ secrets.CONTABO_CLIENT_SECRET }}
          TF_VAR_contabo_api_user: ${{ secrets.CONTABO_API_USER }}
          TF_VAR_contabo_api_password: ${{ secrets.CONTABO_API_PASSWORD }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_image_id: ${{ secrets.CONTABO_IMAGE_ID }}
          TF_VAR_product_id: ${{ secrets.CONTABO_PRODUCT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.NODE_SSH_PUBLIC_KEY }}
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
        run: |
          set -o pipefail
          # -lock-timeout lets a transient lock from a concurrent run clear instead
          # of failing instantly.
          terraform plan -input=false -no-color -lock-timeout=120s \
            -out="${PLAN_FILE}" | tee plan-raw.txt
          terraform show -no-color "${PLAN_FILE}" > plan-show.txt

      - name: Upload saved plan (keyed by PR head SHA)
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        uses: actions/upload-artifact@v4
        with:
          # The apply job on merge downloads THIS exact artifact by head SHA.
          name: tfplan-${{ github.event.pull_request.head.sha }}
          path: |
            ${{ env.WORKDIR }}/${{ env.PLAN_FILE }}
            ${{ env.WORKDIR }}/plan-show.txt
          retention-days: 30
          if-no-files-found: error

      - name: Post plan as a PR comment
        if: steps.detect.outputs.tf == 'true' && github.event.pull_request.head.repo.fork != true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- terraform-contabo-plan -->';
            let plan = '';
            try { plan = fs.readFileSync('${{ env.WORKDIR }}/plan-show.txt', 'utf8'); }
            catch (e) { plan = '(plan output unavailable)'; }
            const max = 60000;
            const truncated = plan.length > max
              ? plan.slice(0, max) + '\n\n... (truncated — see the full plan in the workflow logs/artifact)'
              : plan;
            const body = [
              marker,
              `### \`terraform plan\` — terraform/contabo (head \`${{ github.event.pull_request.head.sha }}\`)`,
              '',
              'Merging this PR applies **exactly this saved plan** (`apply tfplan`) — no blind re-plan.',
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              truncated,
              '```',
              '',
              '</details>',
            ].join('\n');
            const {owner, repo} = context.repo;
            const prNumber = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {owner, repo, issue_number: prNumber});
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number: prNumber, body});
            }

  # =========================================================================
  # apply — runs ONLY on push to main. Applies the SAVED, reviewed plan.
  # =========================================================================
  apply:
    name: apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve the merged PR + its head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The push to main is a merge commit; find the PR it closed and recover
          # the head SHA the plan artifact was keyed by.
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            -H "Accept: application/vnd.github.groot-preview+json")
          HEAD_SHA=$(echo "$PR_JSON" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["head"]["sha"] if d else "")')
          PR_NUM=$(echo "$PR_JSON" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["number"] if d else "")')
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "Merged PR #$PR_NUM, head SHA $HEAD_SHA"

      - name: Did this merge touch terraform/**?
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Self-filter (deadlock-safe analogue for push): only apply when the
          # merge actually changed terraform files.
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null | grep -q '^terraform/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No terraform/** changes in this merge — nothing to apply."
          fi

      - name: Set up Terraform
        if: steps.detect.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download the SAVED plan from the reviewed PR run
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          HEAD_SHA="${{ steps.pr.outputs.head_sha }}"
          if [ -z "$HEAD_SHA" ]; then
            echo "::error::Could not resolve the merged PR's head SHA. Refusing to apply without a reviewed saved plan."
            exit 1
          fi
          # Find the plan workflow run for that head SHA and pull its tfplan artifact.
          RUN_ID=$(gh run list --workflow terraform-contabo-cd.yml --commit "$HEAD_SHA" \
            --json databaseId,conclusion -q '[.[] | select(.conclusion=="success")][0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful plan run found for head SHA $HEAD_SHA. The reviewed plan must exist before apply — refusing blind re-plan."
            exit 1
          fi
          echo "Downloading tfplan-$HEAD_SHA from run $RUN_ID"
          gh run download "$RUN_ID" -n "tfplan-$HEAD_SHA" -D "${WORKDIR}"
          test -f "${WORKDIR}/${PLAN_FILE}" || { echo "::error::Saved plan file missing in artifact."; exit 1; }

      - name: Terraform init (remote backend)
        if: steps.detect.outputs.changed == 'true'
        working-directory: ${{ env.WORKDIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=fuzeinfra/contabo/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}"

      - name: Terraform apply (the SAVED, reviewed plan)
        if: steps.detect.outputs.changed == 'true'
        working-directory: ${{ env.WORKDIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
          # Apply consumes the saved plan; provider creds still required for the
          # provider RPCs (the plan file does not embed secret var values).
          TF_VAR_contabo_client_id: ${{ secrets.CONTABO_CLIENT_ID }}
          TF_VAR_contabo_client_secret: ${{ secrets.CONTABO_CLIENT_SECRET }}
          TF_VAR_contabo_api_user: ${{ secrets.CONTABO_API_USER }}
          TF_VAR_contabo_api_password: ${{ secrets.CONTABO_API_PASSWORD }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_image_id: ${{ secrets.CONTABO_IMAGE_ID }}
          TF_VAR_product_id: ${{ secrets.CONTABO_PRODUCT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.NODE_SSH_PUBLIC_KEY }}
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
        run: |
          # If state drifted since the plan was reviewed, Terraform rejects this
          # stale saved plan and this step fails loudly — by design.
          terraform apply -input=false -lock-timeout=120s "${PLAN_FILE}"
