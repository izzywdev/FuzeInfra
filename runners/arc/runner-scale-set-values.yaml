# =============================================================================
# ARC Runner Scale Set Helm values
# Chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
# Namespace: arc-runners  |  Release name: staging
#
# Registers a repo-level ephemeral runner with labels [self-hosted, staging].
# izzywdev is a personal GitHub account (not an org) — repo-scoped runners only.
# Consumers target it with:
#   runs-on: [self-hosted, staging]
# =============================================================================

# ---- GitHub target ----------------------------------------------------------
# Repo-level URL — required for personal accounts (org-level API not available).
githubConfigUrl: "https://github.com/izzywdev/FuzeInfra"

# Name of the Kubernetes Secret containing GitHub App credentials.
# Create it from runners/arc/github-secret.yaml before installing.
githubConfigSecret: arc-runner-github-app

# ---- Scale set label --------------------------------------------------------
# This value becomes the runner's primary label.  Combined with the automatic
# "self-hosted" label, workflows can target: runs-on: [self-hosted, staging]
runnerScaleSetName: staging

# ---- Scaling ----------------------------------------------------------------
# minRunners=0  → idle costs nothing; runners spin up on demand.
# maxRunners    → hard cap; tune based on cluster capacity.
minRunners: 0
maxRunners: 5

# ---- Runner pod spec --------------------------------------------------------
template:
  spec:
    # deployer ServiceAccount: grants namespaced RBAC in each consumer's
    # staging namespace via a RoleBinding the platform grants at onboarding.
    serviceAccountName: arc-runner-sa

    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        # securityContext omitted — seccompProfile.type:RuntimeDefault is not
        # guaranteed available on k3s nodes; add back once runner is stable.
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "2"
            memory: 1Gi
        env:
          # Prevent the runner from self-updating (image version is the pin).
          - name: DISABLE_RUNNER_UPDATE
            value: "1"

    # Pin runner pods to the dedicated CI node (tainted fuzeinfra.io/ci=true:NoSchedule).
    nodeSelector:
      fuzeinfra.io/pool: ci
    tolerations:
      - key: fuzeinfra.io/ci
        operator: Exists
        effect: NoSchedule

# ---- ARC controller reference -----------------------------------------------
controllerServiceAccount:
  namespace: arc-systems
  # Must match the SA created by the controller chart release.
  # Controller installed as: helm install arc-controller ... → SA = arc-controller-gha-rs-controller
  name: arc-controller-gha-rs-controller
