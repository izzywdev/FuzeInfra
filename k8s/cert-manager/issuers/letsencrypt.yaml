# =============================================================================
# Let's Encrypt ClusterIssuers for production (k3s on Contabo, or any cluster
# with a public, internet-reachable ingress-nginx).
#
# Services get a real, browser-trusted certificate "for free" by adding:
#
#   metadata:
#     annotations:
#       cert-manager.io/cluster-issuer: letsencrypt-prod
#   spec:
#     tls:
#       - hosts: [app.example.com]
#         secretName: app-tls
#
# Two issuers are provided:
#   - letsencrypt-staging : untrusted certs, high rate limits — use while testing.
#   - letsencrypt-prod    : trusted certs, strict rate limits — use once staging
#                           issues successfully.
#
# Both use the HTTP-01 solver via ingress-nginx, which requires the ingress to be
# publicly reachable on port 80. For wildcard/internal certs use a DNS-01 solver
# instead (see docs/cert-management.md).
#
# __ACME_EMAIL__ is substituted by setup-cert-manager.sh (ACME_EMAIL env var).
# If you apply this file by hand, replace __ACME_EMAIL__ with a real address
# first (Let's Encrypt uses it for expiry notices).
# =============================================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/part-of: fuzeinfra
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: __ACME_EMAIL__
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/part-of: fuzeinfra
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: __ACME_EMAIL__
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
